name: Training Agent Storyboards

on:
  pull_request:
    branches: [main]
    paths:
      - 'server/src/training-agent/**'
      - 'server/tests/manual/run-storyboards.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'static/compliance/source/**'
  push:
    branches: [main]
    paths:
      - 'server/src/training-agent/**'
      - 'server/tests/manual/run-storyboards.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'static/compliance/source/**'

concurrency:
  group: training-agent-storyboards-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  storyboards:
    name: Storyboards (${{ matrix.mode }} dispatch)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        mode: [legacy, framework]
        include:
          - mode: legacy
            flag_value: '0'
            # Baseline on main — keep in sync with the last clean run reported
            # in the PR description. Rising is fine; regressing fails CI.
            # 378→380 after bumping @adcp/client to 5.15 (5.14 fixture-wins
            # refactor exposed training-agent catalog gaps; aliased
            # outdoor_ctv_q2/local_display_dynamic products and renamed
            # two prism signal pricing ids to match the spec test-kit).
            # 380→384 / 52→53 after implementing force_create_media_buy_arm
            # in the training-agent: the create_media_buy_async storyboard
            # (#3081) now passes 4 steps instead of grading not_applicable.
            # 384→388 after bumping @adcp/client to 5.18.0 (#3191) and
            # implementing force_task_completion (#3194).
            # Passing-step asymmetry with framework mode is intentional:
            # the two modes declare different capabilities, so the
            # storyboard runner skips a different subset of steps in each.
            # Both modes pass every step they run.
            min_clean_storyboards: 53
            min_passing_steps: 388
          - mode: framework
            flag_value: '1'
            # 390→393 after bumping @adcp/client to 5.15 + seller catalog
            # alignment (see legacy-mode comment).
            # 393→370 / 52→41 after bumping @adcp/client to 5.17.0: the
            # framework dispatch tightened request-side schema validation
            # and the bundled storyboards sent additional properties their
            # own request schemas rejected (sync_plans, list_property_lists,
            # delete_property_list). Tracked at adcontextprotocol/adcp-client#940.
            # 370→374 / 41→42 after implementing force_create_media_buy_arm
            # (#3081 follow-up) — same +1 storyboard / +4 steps as legacy.
            # 374→401 / 42→53 after bumping @adcp/client to 5.18.0 (#3191)
            # which brought in adcp-client#943's schema-aware brand/account
            # injection — the upstream fix for #940. Framework parity with
            # legacy fully restored; passing-step asymmetry remains because
            # framework declares more capabilities (more steps run, all pass).
            min_clean_storyboards: 53
            min_passing_steps: 401
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Overlay in-repo compliance source onto SDK cache
        # The storyboard runner loads from @adcp/client's bundled
        # compliance cache, which is a snapshot synced from this repo's
        # static/compliance/source/ on each SDK publish. To validate
        # spec changes in this PR before waiting for an SDK republish,
        # mirror the current source tree onto the cache — both edits to
        # existing files AND new files added in this PR. mkdir -p creates
        # any new subdirectories the source introduces so the cache stays
        # in sync with whatever lands here.
        #
        # Caveat: this overlay does NOT regenerate the SDK's cache index
        # (e.g., index.json bundles enumerated at build time). New files
        # under existing protocols are picked up via directory walk, but
        # adding a brand-new top-level bundle (a new specialism / universal
        # file) may need a sync-schemas cycle on the SDK side before the
        # runner enumerates it. New files under existing scenarios/ dirs
        # are the common case and work fine.
        run: |
          SRC="static/compliance/source"
          # 5.13 moved the cache dir from `latest` to the AdCP version
          # string (e.g. `3.0.0`). Resolve whichever subdir exists so the
          # overlay step doesn't have to bump with every SDK release.
          CACHE_ROOT="node_modules/@adcp/client/compliance/cache"
          DST=$(find "$CACHE_ROOT" -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$DST" ] || [ ! -d "$DST" ]; then
            echo "::warning::SDK compliance cache not found under $CACHE_ROOT — skipping overlay"
            exit 0
          fi
          echo "Overlaying onto $DST"
          # Mirror every source file onto the cache. New files (storyboards,
          # specialisms) get added; existing files are overwritten so the
          # branch's edits always win.
          (cd "$SRC" && find . -type f) | while read -r rel; do
            target="$DST/${rel#./}"
            mkdir -p "$(dirname "$target")"
            cp "$SRC/${rel#./}" "$target"
          done
          echo "Overlay complete."

      - name: Run storyboards (${{ matrix.mode }})
        id: run
        env:
          TRAINING_AGENT_USE_FRAMEWORK: ${{ matrix.flag_value }}
          PUBLIC_TEST_AGENT_TOKEN: storyboard-ci-token
        run: |
          npx tsx server/tests/manual/run-storyboards.ts 2>&1 | tee /tmp/storyboards.log
          clean=$(grep -oE 'storyboards: [0-9]+/[0-9]+' /tmp/storyboards.log | tail -1 | grep -oE '^storyboards: [0-9]+' | grep -oE '[0-9]+$')
          passed=$(grep -oE 'steps: [0-9]+ passed' /tmp/storyboards.log | tail -1 | grep -oE '[0-9]+')
          echo "clean=${clean}" >> "$GITHUB_OUTPUT"
          echo "passed=${passed}" >> "$GITHUB_OUTPUT"

      - name: Enforce non-regression (${{ matrix.mode }})
        env:
          CLEAN: ${{ steps.run.outputs.clean }}
          PASSED: ${{ steps.run.outputs.passed }}
          MIN_CLEAN: ${{ matrix.min_clean_storyboards }}
          MIN_PASSED: ${{ matrix.min_passing_steps }}
        run: |
          echo "Mode: ${{ matrix.mode }} (flag=${{ matrix.flag_value }})"
          echo "Clean storyboards: ${CLEAN} (floor: ${MIN_CLEAN})"
          echo "Passing steps: ${PASSED} (floor: ${MIN_PASSED})"
          if [ "${CLEAN}" -lt "${MIN_CLEAN}" ]; then
            echo "::error::Regression: ${CLEAN} clean storyboards is below the ${MIN_CLEAN} floor."
            exit 1
          fi
          if [ "${PASSED}" -lt "${MIN_PASSED}" ]; then
            echo "::error::Regression: ${PASSED} passing steps is below the ${MIN_PASSED} floor."
            exit 1
          fi
