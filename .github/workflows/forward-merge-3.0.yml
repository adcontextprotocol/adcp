name: Forward-merge 3.0.x to main

# Brings 3.0.x patches back into main so 3.1.x continues to include all 3.0.x
# fixes. Direction is one-way: 3.0.x → main. Never the reverse.
#
# On every push to 3.0.x (typically a Version Packages merge or a
# cherry-picked patch), this workflow merges 3.0.x into a fresh branch
# off main and opens a PR. A human reviews and merges. If the merge has
# conflicts, the workflow fails fast and the PR is not opened — a human
# must resolve manually.
#
# The PR is opened with a GitHub App installation token (RELEASE_APP_ID),
# so its open/sync events fire required `pull_request` workflows
# (TypeScript Build, IPR Policy, Check for changeset). #3417 closed.

on:
  push:
    branches:
      - '3.0.x'
  workflow_dispatch:

concurrency:
  group: forward-merge-3.0
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  forward-merge:
    name: Forward-merge 3.0.x → main
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App installation token so the auto-opened PR fires
      # required CI workflows (TypeScript Build, IPR Policy, Check for
      # changeset). GITHUB_TOKEN-triggered events are blocked by GitHub's
      # recursion rule. Closes #3417.
      - name: Mint AAO Release Bot installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: adcontextprotocol
          repositories: adcp

      - name: Checkout main with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch 3.0.x
        run: git fetch origin 3.0.x

      - name: Skip if 3.0.x already in main
        id: ancestry
        run: |
          if git merge-base --is-ancestor origin/3.0.x origin/main; then
            echo "3.0.x is already an ancestor of main; nothing to forward-merge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create forward-merge branch and merge
        if: steps.ancestry.outputs.skip != 'true'
        run: |
          set -e
          # Create the target branch BEFORE the merge so peter-evans sees
          # commits on the branch ref it's expected to push (peter-evans
          # diffs its branch: ref against base:, not the working tree).
          git checkout -B forward-merge/3.0.x origin/main

          if ! git merge --no-ff origin/3.0.x \
              -m "Forward-merge 3.0.x@$(git rev-parse --short origin/3.0.x) → main"; then
            echo "::error::Merge conflict between 3.0.x and main. Resolve manually:"
            echo "::error::  git checkout main && git merge origin/3.0.x"
            git merge --abort
            exit 1
          fi

      - name: Create or update pull request
        if: steps.ancestry.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: forward-merge/3.0.x
          base: main
          title: "Forward-merge 3.0.x → main"
          body: |
            Auto-generated forward-merge of `3.0.x` into `main`.

            Brings 3.0.x patches into main so 3.1.x continues to include all
            3.0.x fixes. **Direction is one-way**: `3.0.x → main`. Never the
            reverse.

            ## Review checklist

            - [ ] Diff matches what you'd expect from the 3.0.x patches
            - [ ] No 3.1-line work has been pulled in by accident (would
                  indicate the merge picked up something unintended)
            - [ ] CI green

            ## Source

            See `.github/workflows/forward-merge-3.0.yml` for the trigger
            and merge logic. See `.agents/playbook.md` § Release lines for
            the cherry-pick convention.

            🤖 Generated by `.github/workflows/forward-merge-3.0.yml`
          labels: forward-merge
          # delete-branch is false so a stuck PR can be inspected. peter-evans
          # force-updates the branch on each run; if a prior run left a stale
          # branch, the next push overwrites it.
          delete-branch: false
