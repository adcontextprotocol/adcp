name: Forward-merge 3.0.x to main

# Brings 3.0.x patches back into main so 3.1.x continues to include all 3.0.x
# fixes. Direction is one-way: 3.0.x → main. Never the reverse.
#
# On every push to 3.0.x (typically a Version Packages merge or a
# cherry-picked patch), this workflow merges 3.0.x into a fresh branch
# off main and opens a PR. A human reviews and merges. If the merge has
# conflicts, the workflow fails fast and the PR is not opened — a human
# must resolve manually.
#
# Known limitation (see #3417): peter-evans/create-pull-request opens
# the PR with GITHUB_TOKEN, so required `pull_request` workflows on the
# resulting PR don't fire automatically. Until #3417 lands, the
# forward-merge PR requires admin-merge.

on:
  push:
    branches:
      - '3.0.x'
  workflow_dispatch:

concurrency:
  group: forward-merge-3.0
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  forward-merge:
    name: Forward-merge 3.0.x → main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge 3.0.x into local main
        id: merge
        run: |
          set -e
          git fetch origin 3.0.x:3.0.x

          # Skip if 3.0.x is already an ancestor of main (nothing to forward).
          if git merge-base --is-ancestor 3.0.x main; then
            echo "3.0.x is already in main; nothing to forward-merge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge --no-ff 3.0.x -m "Forward-merge 3.0.x → main"; then
            echo "::error::Merge conflict between 3.0.x and main. Resolve manually:"
            echo "::error::  git checkout main && git merge 3.0.x"
            git merge --abort
            exit 1
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.merge.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: forward-merge/3.0.x
          base: main
          title: "Forward-merge 3.0.x → main"
          body: |
            Auto-generated forward-merge of `3.0.x` into `main`.

            Brings 3.0.x patches into main so 3.1.x continues to include all
            3.0.x fixes. **Direction is one-way**: `3.0.x → main`. Never the
            reverse.

            ## Review checklist

            - [ ] Diff matches what you'd expect from the 3.0.x patches
            - [ ] No 3.1-line work has been pulled in by accident (would
                  indicate the merge picked up something unintended)
            - [ ] CI green (may require admin-merge until #3417 lands —
                  GITHUB_TOKEN-triggered events don't fire required workflows)

            ## Source

            See `.github/workflows/forward-merge-3.0.yml` for the trigger
            and merge logic. See `.agents/playbook.md` § Release lines for
            the cherry-pick convention.

            🤖 Generated by `.github/workflows/forward-merge-3.0.yml`
          labels: forward-merge
          delete-branch: false
