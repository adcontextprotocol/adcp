name: AI PR Review (Argus)

# Argus is the AAO Secretariat's review desk: an LLM PR reviewer that posts
# an `--approve`, `--comment`, or `--request-changes` review on every
# non-dependabot PR. It reads the diff, delegates to AdCP subagents when
# relevant (ad-tech-protocol-expert, security-reviewer, code-reviewer,
# etc.), and applies the WG constitution (.agents/wg/constitution.md) and
# decision records (governance/decisions/).
#
# Reviews are posted as the AAO Secretariat GitHub App, so they count
# toward the "1 review required" branch-protection check the same way a
# human approval does. Release machinery (changeset releases, forward
# merges) stays on the separate release App — distinct trust surfaces.
#
# Required secrets:
#   SECRETARIAT_APP_ID          — AAO Secretariat GitHub App ID
#   SECRETARIAT_APP_PRIVATE_KEY — AAO Secretariat App private key PEM
#   ANTHROPIC_API_KEY           — Anthropic API key for claude-code-action
#
# Branch-protection assumption: "Require approval of the most recent
# reviewable push" MUST be enabled on `main`. The bot's approval is
# attached to a specific head SHA; if a PR force-pushes to a SHA whose
# diff against the prior-approved SHA only touches trivial paths, this
# workflow's skip-check fires and Argus does NOT re-review. With the
# branch-protection setting on, the bot's stale approval is invalidated
# and the PR cannot merge until a fresh review posts. Without it, the
# stale approval persists and the PR can merge on the old review.
#
# Adapted from scope3data/agentic-api's Argus workflow.

on:
  pull_request_target:
    types:
      - opened
      - labeled
      - ready_for_review
      - synchronize
    paths-ignore:
      - '.github/workflows/ai-review.yml'
      - '.github/ai-review/**'

# Bot login that posts Argus reviews. Verifier pins on this to avoid
# treating reviews from other bots (changesets-release[bot] etc.) as
# Argus's. The App's user login in `pulls/<n>/reviews` includes the
# `[bot]` suffix (`user.login: "aao-secretariat[bot]"`, `user.type: "Bot"`).
env:
  ARGUS_BOT_LOGIN: aao-secretariat[bot]

jobs:
  code_review:
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      # Third-party actions pinned to commit SHAs to close the "force-push
      # to a moving tag ships malicious code under the App token" vector.
      #
      # This workflow uses pull_request_target so fork PRs can access the
      # review App token and Anthropic secret. Never check out the PR head or
      # execute PR-controlled code in this job. Keep the workspace pinned to the
      # trusted base SHA and inspect the PR through GitHub APIs / gh pr diff.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────────────────
      # Mint an installation token from the AAO release/triage GitHub App.
      # Reviews posted with this token appear as the App's bot user and
      # count toward branch-protection's required-approvals check.
      # ─────────────────────────────────────────────────────────────────────
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SECRETARIAT_APP_ID }}
          private-key: ${{ secrets.SECRETARIAT_APP_PRIVATE_KEY }}

      # ─────────────────────────────────────────────────────────────────────
      # Route PR classes Argus should not try to review.
      #
      # Generated Changesets release PRs are opened by the same App that posts
      # reviews. The Claude action rejects bot-initiated runs unless explicitly
      # allowlisted, and even if allowed the generated release diff is the wrong
      # shape for an LLM review. Make the human-review handoff explicit instead
      # of burning runs and posting generic "could not complete" comments.
      #
      # Backport branches can also run this default-branch workflow even when
      # the PR base does not contain the Argus prompt. Because the prompt is
      # intentionally loaded from the trusted base SHA, those PRs must be
      # handed to a human rather than falling back to default-branch prompt
      # text.
      # ─────────────────────────────────────────────────────────────────────
      - name: Classify PR for Argus routing
        id: review-route
        shell: bash
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          skip=false
          reason=""

          if [[ "$PR_AUTHOR_TYPE" == "Bot" ]] \
            && [[ "$PR_AUTHOR" == "aao-release-bot[bot]" ]] \
            && [[ "$PR_HEAD_REPO" == "$PR_BASE_REPO" ]] \
            && [[ "$PR_HEAD_REF" == changeset-release/* ]] \
            && [[ "$PR_TITLE" == Version\ Packages* ]]; then
            skip=true
            reason="generated-release"
          elif ! git cat-file -e "${BASE_SHA}:.github/ai-review/expert-adcp-reviewer.md" 2>/dev/null; then
            skip=true
            reason="prompt-missing-on-base"
          fi

          echo "skip=${skip}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Comment and skip routed human-review PRs
        if: steps.review-route.outputs.skip == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SKIP_REASON: ${{ steps.review-route.outputs.reason }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const reason = process.env.SKIP_REASON;
            const botLogin = process.env.ARGUS_BOT_LOGIN;
            const marker = `<!-- argus-skip:${reason} -->`;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            if (reviews.some((review) => review.user?.login === botLogin && review.body?.includes(marker))) {
              return;
            }

            const bodyByReason = {
              'generated-release': [
                'Argus is **not auto-reviewing** this PR because it is a generated Changesets release PR.',
                '',
                'A human release reviewer should verify CI, package/version/changelog changes, and generated `dist/**` artifacts. Argus will resume on source PRs before the next release PR is generated.',
                '',
                marker
              ].join('\n'),
              'prompt-missing-on-base': [
                'Argus is **not auto-reviewing** this PR because the target base SHA does not contain `.github/ai-review/expert-adcp-reviewer.md`.',
                '',
                'A human reviewer should review this branch. Argus will resume on branches whose base includes the review prompt.',
                '',
                marker
              ].join('\n')
            };

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body: bodyByReason[reason] || `Argus is **not auto-reviewing** this PR.\n\n${marker}`
            });

      # ─────────────────────────────────────────────────────────────────────
      # Sensitive-path modification gate.
      #
      # A human must own any PR touching paths that shape agent behavior or
      # release/CI infrastructure. These are the paths CODEOWNERS previously
      # protected, enforced here so Argus abstains from auto-approving:
      #
      #   .github/ai-review/**, .github/workflows/**  — the review system and
      #     all CI; Argus may otherwise review/approve changes to itself.
      #   .agents/**              — agent prompts & context (prompt-injection
      #     would target these to expand the agent's capabilities).
      #   static/schemas/source/** — protocol source of truth for the spec.
      #   .changeset/**           — release tooling.
      #
      # Even though pull_request_target keeps this run on the base-branch
      # prompt and workflow, a human should own these changes. Bail with a
      # --comment requiring human review.
      #
      # `paths-ignore` at the workflow level only fires when ALL changed
      # paths are ignored — this step handles the mixed case.
      # ─────────────────────────────────────────────────────────────────────
      - name: Check for sensitive-path modifications
        id: workflow-mod
        if: steps.review-route.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `gh pr diff --name-only` uses GitHub's diff endpoint, which 406s
          # for generated release PRs over 300 files. The files API paginates.
          CHANGED="$(gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/files" --jq '.[].filename')"
          MODIFIED=""
          while IFS= read -r f; do
            case "$f" in
              .github/ai-review/*|.github/workflows/ai-review.yml|.agents/*|.github/workflows/*|static/schemas/source/*|.changeset/*)
                MODIFIED="${MODIFIED}${f}"$'\n'
                ;;
            esac
          done <<< "$CHANGED"
          if [ -n "$MODIFIED" ]; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
            echo "modified_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$MODIFIED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "PR modifies review workflow files:"
            echo "$MODIFIED"
          else
            echo "modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment and skip when PR modifies sensitive paths
        if: steps.review-route.outputs.skip != 'true' && steps.workflow-mod.outputs.modified == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MODIFIED_FILES: ${{ steps.workflow-mod.outputs.modified_files }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const files = (process.env.MODIFIED_FILES || '').trim().split('\n').map(f => `\`${f}\``).join(', ');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body: `Argus is **not auto-reviewing** this PR because it modifies protected paths that require human review (${files}). A human reviewer should review and merge this PR; Argus will resume on subsequent PRs once these changes land on \`main\`.`
            });

      # ─────────────────────────────────────────────────────────────────────
      # Skip re-runs on `synchronize` when the last bot review on this PR
      # was APPROVED and the new commits only touch trivial paths (docs,
      # changesets, tests, generated files). Cuts thrash on rebases and
      # docs/test follow-up pushes. Force-pushes fall back to full review
      # because the prior SHA may be unreachable.
      # ─────────────────────────────────────────────────────────────────────
      - name: Check for skippable re-run
        id: skip-check
        if: steps.review-route.outputs.skip != 'true' && github.event.action == 'synchronize' && steps.workflow-mod.outputs.modified != 'true'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          LATEST_APPROVED="$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq "[.[] | select(.user.login == \"${ARGUS_BOT_LOGIN}\" and .state == \"APPROVED\")] | sort_by(.submitted_at) | last // {}")"
          PRIOR_SHA="$(echo "$LATEST_APPROVED" | jq -r '.commit_id // ""')"
          if [ -z "$PRIOR_SHA" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No prior Argus APPROVED review — running full review."
            exit 0
          fi
          CHANGED="$(gh api "/repos/${REPO}/compare/${PRIOR_SHA}...${HEAD_SHA}" \
            --jq '.files[]?.filename' 2>/dev/null || true)"
          if [ -z "$CHANGED" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Could not compare $PRIOR_SHA...$HEAD_SHA (likely force-pushed or fork edge case) — running full review."
            exit 0
          fi
          # Trivial paths in AdCP — re-pushes touching only these skip re-review.
          # Schemas (static/schemas/source/**) and server source are NEVER trivial.
          is_trivial() {
            case "$1" in
              .changeset/*) return 0 ;;
              *.md|*.mdx) return 0 ;;
              mintlify-docs/*) return 0 ;;
              static/schemas/cache/*) return 0 ;;
              *__tests__/*) return 0 ;;
              *.test.ts|*.test.tsx|*.test.js|*.test.cjs|*.test.mjs) return 0 ;;
              *.spec.ts|*.spec.tsx|*.spec.js) return 0 ;;
              server/tests/*) return 0 ;;
              tests/*) return 0 ;;
              package-lock.json) return 0 ;;
            esac
            return 1
          }
          NON_TRIVIAL=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! is_trivial "$f"; then
              NON_TRIVIAL="${NON_TRIVIAL}${f}"$'\n'
            fi
          done <<< "$CHANGED"
          if [ -z "$NON_TRIVIAL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "All changes since $PRIOR_SHA are trivial — skipping re-review. Changed files:"
            echo "$CHANGED"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Non-trivial changes since $PRIOR_SHA — running full review:"
            echo "$NON_TRIVIAL"
          fi

      - name: Build Argus review prompt
        if: steps.review-route.outputs.skip != 'true' && steps.workflow-mod.outputs.modified != 'true' && steps.skip-check.outputs.skip != 'true'
        id: build-prompt
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Read the prompt from the PR's base SHA, not the working tree.
          # This closes the prompt-injection vector even on PRs that don't
          # modify the prompt file directly — the prompt that runs is always
          # the version on the base branch, which the PR cannot mutate.
          # If the file doesn't exist at base.sha, the workflow-mod gate
          # above should have already caught it; fail closed if not.
          if ! git cat-file -e "${BASE_SHA}:.github/ai-review/expert-adcp-reviewer.md" 2>/dev/null; then
            echo "::error::Prompt file does not exist at base SHA ${BASE_SHA}. Workflow-mod gate should have caught this."
            exit 1
          fi
          PROMPT_BODY="$(git show "${BASE_SHA}:.github/ai-review/expert-adcp-reviewer.md")"
          # The WG constitution is also loaded from the base SHA — the PR
          # cannot mutate the rules it is reviewed under. Absent at base
          # (e.g., older maintenance lines) it is simply omitted.
          CONSTITUTION=""
          if git cat-file -e "${BASE_SHA}:.agents/wg/constitution.md" 2>/dev/null; then
            CONSTITUTION="$(git show "${BASE_SHA}:.agents/wg/constitution.md")"
          fi
          # Randomize the heredoc sentinel so a future prompt change can't
          # smuggle the static sentinel into the body and break framing.
          SENTINEL="ARGUS_$(openssl rand -hex 8)_EOF"
          {
            echo "ARGUS_PROMPT<<${SENTINEL}"
            echo "$PROMPT_BODY"
            if [ -n "$CONSTITUTION" ]; then
              echo ''
              echo '---'
              echo ''
              echo '## WG constitution (loaded from base SHA)'
              echo ''
              echo "$CONSTITUTION"
            fi
            echo ''
            echo '---'
            echo ''
            echo '## Pre-computed inputs for this PR'
            echo ''
            echo "- PR_NUMBER: $PR_NUMBER"
            echo "- REPO: $REPO"
            echo "- PR_BASE_REF: $PR_BASE_REF"
            echo "${SENTINEL}"
          } >> "$GITHUB_OUTPUT"

      - name: Run Argus PR Review
        id: ai-review
        if: steps.review-route.outputs.skip != 'true' && steps.workflow-mod.outputs.modified != 'true' && steps.skip-check.outputs.skip != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          prompt: ${{ steps.build-prompt.outputs.ARGUS_PROMPT }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          use_sticky_comment: false
          track_progress: false
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh api repos/*/pulls/*),Bash(gh api repos/*/contents/*),Bash(gh api repos/*/issues/*),Read,Glob,Grep,Task"
            --max-turns 60
            --model claude-opus-4-8
            --effort high

      - name: Verify Argus posted a review
        id: verify
        if: always() && steps.app-token.outcome == 'success' && steps.review-route.outputs.skip != 'true' && steps.workflow-mod.outputs.modified != 'true' && steps.skip-check.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Pin on the exact bot login so changesets-release[bot] or any
          # other bot's review in the last 10 minutes doesn't false-positive.
          # Exclude this workflow's own human-handoff/failure review comments;
          # only an Argus-authored review should satisfy the verifier.
          LATEST="$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq "[.[] | select(
              .user.login == \"${ARGUS_BOT_LOGIN}\"
              and (((.body // \"\") | contains(\"<!-- argus-skip:\")) | not)
              and (((.body // \"\") | contains(\"Argus is **not auto-reviewing**\")) | not)
              and (((.body // \"\") | contains(\"Argus review could not complete\")) | not)
            )] | sort_by(.submitted_at) | last // {}")"
          STATE="$(echo "$LATEST" | jq -r '.state // ""')"
          SUBMITTED="$(echo "$LATEST" | jq -r '.submitted_at // ""')"
          echo "Latest ${ARGUS_BOT_LOGIN} review — state: $STATE, submitted: $SUBMITTED"
          if [ -z "$STATE" ]; then
            echo "review_posted=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ${ARGUS_BOT_LOGIN} review found on PR #$PR_NUMBER"
            exit 0
          fi
          # ubuntu-latest only; no macOS fallback needed.
          SUBMITTED_TS="$(date -u -d "$SUBMITTED" +%s)"
          NOW_TS="$(date -u +%s)"
          if [ $((NOW_TS - SUBMITTED_TS)) -gt 600 ]; then
            echo "review_posted=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Latest ${ARGUS_BOT_LOGIN} review is older than 10 minutes — Argus didn't post in this run"
            exit 0
          fi
          echo "review_posted=true" >> "$GITHUB_OUTPUT"
          echo "review_state=$STATE" >> "$GITHUB_OUTPUT"

      - name: Comment on PR if Argus review failed
        if: steps.review-route.outputs.skip != 'true' && steps.workflow-mod.outputs.modified != 'true' && steps.skip-check.outputs.skip != 'true' && (steps.ai-review.outcome == 'failure' || steps.verify.outputs.review_posted != 'true')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const runUrl = process.env.RUN_URL;
            await github.rest.pulls.createReview({
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'COMMENT',
              body: `⚠️ **Argus review could not complete**\n\nThe automated review encountered an issue (possibly reached max turns, timed out, or failed to post the final \`gh pr review\`). A human reviewer should take this PR.\n\n[View workflow run](${runUrl})\n\n<sub>This is an automated message from the Argus AI review workflow.</sub>`
            })
