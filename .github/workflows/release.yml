name: Release

on:
  push:
    branches:
      - main
      - '3.0.x'
      - '2.6.x'
      # '2.5-maintenance' is security-only until 2026-08-01; remove after that
      # date unless we extend the v2 support window.
      - '2.5-maintenance'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # id-token: write lets cosign request a Sigstore OIDC token from the
    # Actions runner during `npm run version` — this is what binds the
    # detached signature to the workflow identity that produced it.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Mint a GitHub App installation token so events triggered by this
      # workflow (push to changeset-release/<branch>, release: published)
      # FIRE downstream workflows. GITHUB_TOKEN-triggered events are
      # silently dropped by GitHub's recursion-blocking rule, which used to
      # leave the Version Packages PR with stuck-pending CI and skip the
      # release-docs snapshot. Closes #3417.
      - name: Mint AAO Release Bot installation token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: adcontextprotocol
          repositories: adcp

      - name: Checkout Repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install Dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Verify current storyboard coverage
        if: github.ref_name == 'main'
        run: npm run test:storyboards

      - name: Verify 3.0 storyboard compatibility
        if: github.ref_name == 'main' || github.ref_name == '3.0.x'
        run: npm run test:storyboards:3.0-compat
        env:
          ADCP_RELEASE_BASE_REF: 3.0.x

      - name: Create Release Pull Request or Tag Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npx --no-install changeset tag
          commit: 'Version Packages'
          title: 'Version Packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect committed release artifacts
        id: release-artifacts
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          changed_files="$(git show --format= --name-only --no-renames "${GITHUB_SHA}")"
          if printf '%s\n' "${changed_files}" | grep -Eq "^dist/(schemas|compliance)/${VERSION}/|^dist/protocol/${VERSION}[.]"; then
            echo "has_release_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "Detected committed release artifacts for ${VERSION}."
          else
            echo "has_release_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "No committed release artifacts detected for ${VERSION}."
          fi

      # Attach the protocol tarball + signature sidecars to the GitHub
      # Release. For packages with real publish output, changesets/action may
      # create the GitHub Release first. For this private repo, Version
      # Packages commits can already contain the release artifacts while
      # changesets/action reports "All changesets are empty"; create the
      # release here if needed.
      #
      # Tarballs and sidecars (.sha256, .sig, .crt) are written to
      # dist/protocol/${VERSION}.tgz{,.sha256,.sig,.crt} by `npm run version`
      # in the Version Packages PR (build-protocol-tarball +
      # sign-protocol-tarball).
      # Without this step the artifacts ship to the repo's dist/ tree but
      # are never attached as Release assets, leaving adopters who pin via
      # release URL with a 404. v3.0.0 had assets only because they were
      # uploaded manually; v3.0.1, v3.0.2, v3.0.3 all shipped empty.
      - name: Upload protocol tarball to GitHub Release
        if: steps.changesets.outputs.published == 'true' || steps.release-artifacts.outputs.has_release_artifacts == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release-artifacts.outputs.version }}"
          TAG="v${VERSION}"
          TARBALL="dist/protocol/${VERSION}.tgz"
          if [ ! -f "${TARBALL}" ]; then
            echo "::error::Tarball not found at ${TARBALL}. Did npm run version fail upstream?"
            exit 1
          fi
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            release_args=()
            if [[ "${VERSION}" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --notes "AdCP ${VERSION}" \
              "${release_args[@]}"
          fi
          gh release upload "${TAG}" \
            "${TARBALL}" \
            "${TARBALL}.sha256" \
            "${TARBALL}.sig" \
            "${TARBALL}.crt" \
            --clobber

      - name: Publish release artifacts to R2
        if: steps.changesets.outputs.published == 'true' || steps.release-artifacts.outputs.has_release_artifacts == 'true'
        env:
          ADCP_ARTIFACT_R2_BUCKET: ${{ vars.ADCP_ARTIFACT_R2_BUCKET || 'adcp-artifacts' }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::Missing R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, or R2_SECRET_ACCESS_KEY secret."
            exit 1
          fi
          latest_args=()
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            latest_args=(--skip-latest)
          fi
          npm run backfill:cdn-artifacts -- --bucket "${ADCP_ARTIFACT_R2_BUCKET}" --quiet "${latest_args[@]}"
