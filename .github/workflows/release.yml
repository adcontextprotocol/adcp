name: Release

on:
  push:
    branches:
      - main
      - '2.6.x'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # id-token: write lets cosign request a Sigstore OIDC token from the
    # Actions runner during `npm run version` — this is what binds the
    # detached signature to the workflow identity that produced it.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install Dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Create Release Pull Request or Tag Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npx --no-install changeset tag
          commit: 'Version Packages'
          title: 'Version Packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
