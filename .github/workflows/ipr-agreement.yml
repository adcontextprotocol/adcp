name: IPR Agreement

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  # Per-repo serialization for adcp's own signature writes. GitHub Actions
  # concurrency is scoped per-repo, so this does NOT cross-serialize against
  # downstream AAO repos using the cross-repo callable workflow — that
  # contention is handled by the rebase-retry loop in
  # `scripts/ipr/check-and-record.mjs`.
  group: adcp-ipr-signature-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Skip issue comments that can't contain the sign phrase. The script
    # re-validates the exact match; this just avoids spinning up the runner for
    # every unrelated comment.
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'I have read the IPR Policy'))
    steps:
      # The default GITHUB_TOKEN authenticates as github-actions[bot], which
      # is not in the IPR-signatures ruleset bypass list — pushes to main get
      # rejected by branch protection (GH013). The aao-ipr-bot App is in the
      # bypass list, so we mint an installation token from it and use that
      # for both the checkout's persisted credentials (git push) and the
      # script's API calls. Same pattern as ipr-check-callable.yml.
      - name: Mint AAO IPR Bot installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.IPR_APP_ID }}
          private-key: ${{ secrets.IPR_APP_PRIVATE_KEY }}
          owner: adcontextprotocol
          repositories: adcp

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check and record IPR signature
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/ipr/check-and-record.mjs
