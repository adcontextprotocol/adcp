name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Semgrep
        run: pip install semgrep==1.67.0

      - name: Run Semgrep
        run: semgrep scan --config .semgrep/ --error
