name: Changeset Check

on:
  pull_request:
    branches: [main, '3.0.x', '2.6.x']

jobs:
  check:
    name: Check for changeset
    runs-on: ubuntu-latest
    # Skip changeset check on Version Packages PR (created by changesets/action)
    # for any release line: changeset-release/main, changeset-release/3.0.x, etc.
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check for changeset
        run: npx --yes @changesets/cli@^2.31.0 status --since=origin/main
