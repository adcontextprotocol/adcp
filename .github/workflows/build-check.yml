name: Build Check

on:
  pull_request:
    branches: [main, develop, '2.6.x']
  push:
    branches: [main, develop, '2.6.x']

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build
        run: npm run build

      - name: Server unit tests
        run: npm run test:server-unit

      - name: Repo unit tests
        run: npm run test:unit

      - name: Validate schemas
        run: npm run test:schemas && npm run test:json-schema && npm run test:extension-schemas && npm run test:composed

      - name: Check policy registry publication completeness
        run: npm run check:registry

      - name: Check platform-agnosticism (no vendor tokens in normative field names)
        run: npm run test:platform-agnostic

      - name: HMAC webhook conformance (verifier + signer)
        run: npm run test:hmac-vectors && npm run test:hmac-signer-conformance
