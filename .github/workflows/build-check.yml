name: Build Check

on:
  pull_request:
    branches: [main, develop, '3.1.x', '3.0.x', '2.6.x']
  push:
    branches: [main, develop, '3.1.x', '3.0.x', '2.6.x']

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    # 15-min default was right at the edge; adding the OpenAPI freshness
    # step (which re-runs the schema generator) tipped it over. 20 gives
    # headroom without masking real regressions.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Check immutable release artifacts
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="${{ github.event.before }}"
            if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
              BASE_REF="HEAD^"
            fi
          fi
          npm run test:immutable-release-artifacts
          node scripts/check-immutable-release-artifacts.cjs "${BASE_REF}"

      - name: Build
        run: npm run build

      - name: Storyboard lint tests
        run: >
          npm run test:storyboard-sample-request-schema &&
          npm run test:storyboard-response-schema &&
          npm run test:storyboard-context-output-paths &&
          npm run test:storyboard-validations-paths &&
          npm run test:refine-finalize-validation-ids &&
          npm run test:update-media-buy-affected-packages &&
          npm run test:compliance-source-authority

      - name: Assert dist/ contains every server/src runtime asset
        # PR #4769 root cause: ui-element-formats.json was added to source
        # and `require()`d by task-handlers.ts, but the build script didn't
        # copy it into dist/, so the runtime image crashlooped with
        # `Cannot find module './ui-element-formats.json'`. Prod was down
        # ~75 min. This assertion fails CI the moment a referenced asset
        # would be missing in the shipping artifact.
        run: node scripts/copy-server-assets.cjs --check

      - name: Server unit tests
        run: npm run test:server-unit

      - name: Repo unit tests
        run: npm run test:unit

      - name: Storyboard raw-mode-required lint tests
        run: npm run test:storyboard-raw-mode-required

      - name: Storyboard upstream-traffic path lint tests
        run: npm run test:storyboard-upstream-traffic-paths

      - name: Schema link plugin tests
        run: npm run test:schema-links

      - name: Validate schemas
        run: npm run test:schemas && npm run test:json-schema && npm run test:adagents-catalog-only && npm run test:extension-schemas && npm run test:composed

      - name: Canonical reference resolver fixtures
        run: npm run test:canonical-reference-resolver

      - name: OpenAPI freshness (static/openapi/registry.yaml regenerated from Zod source)
        # generate-openapi.ts transitively imports auth middleware which
        # constructs WorkOS at module load. CI doesn't ship those secrets
        # and doesn't need them — the script never makes a network call.
        # Dummy values just satisfy constructor validation.
        env:
          WORKOS_API_KEY: sk_dummy_ci_only
          WORKOS_CLIENT_ID: client_dummy_ci_only
          STRIPE_SECRET_KEY: sk_dummy_ci_only
          RESEND_API_KEY: re_dummy_ci_only
        run: npm run test:openapi

      - name: Fetch 3.0.x for error-code drift comparison
        if: github.ref != 'refs/heads/3.0.x' && github.base_ref != '3.0.x'
        run: git fetch --depth=1 origin +3.0.x:refs/remotes/origin/3.0.x

      - name: Error-code drift vs 3.0.x
        if: github.ref != 'refs/heads/3.0.x' && github.base_ref != '3.0.x'
        run: npm run test:error-code-drift

      - name: Check oneOf discriminator baseline (adcp#3917)
        run: npm run test:oneof-discriminators

      - name: Check policy registry publication completeness
        run: npm run check:registry

      - name: Check platform-agnosticism (no vendor tokens in normative field names)
        run: npm run test:platform-agnostic

      - name: Webhook conformance (HMAC + RFC 9421 vectors)
        run: npm run test:hmac-vectors && npm run test:hmac-signer-conformance && npm run test:webhook-signing-vectors

  server-integration:
    name: Server integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        # Throwaway service container; credentials live for the job only and are
        # never reachable from outside the runner. Long literal value below is to
        # satisfy GitGuardian's generic-password heuristic — not a real secret.
        image: postgres:16
        env:
          POSTGRES_USER: ci_runner
          POSTGRES_PASSWORD: ci_runner_throwaway_no_secret_value
          POSTGRES_DB: adcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_runner -d adcp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci_runner:ci_runner_throwaway_no_secret_value@127.0.0.1:5432/adcp_test
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Apply migrations to test database
        run: npx tsx server/src/db/migrate.ts

      - name: Run server integration tests
        run: npm run test:server-integration
