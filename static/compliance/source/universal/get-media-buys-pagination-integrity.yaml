id: get_media_buys_pagination_integrity
version: "1.0.0"
title: "Pagination cursor integrity — get_media_buys"
category: schema_validation
summary: "Validates the cursor↔has_more invariant on get_media_buys by walking a seeded set from a continuation page to a terminal page."
track: core
required_tools:
  - get_media_buys

narrative: |
  Pagination is cursor-based across AdCP. Every response carrying a
  `pagination` block satisfies a single invariant: when `has_more` is true the
  `cursor` MUST be present (callers need it to fetch the next page); when
  `has_more` is false the `cursor` MUST be absent (a stale token on a terminal
  page invites callers to follow it into undefined behavior).

  The runner seeds three media buys into the agent's session and lists them
  back with `max_results=2`. The first page MUST cap at two buys and
  signal continuation with `has_more=true` plus a cursor. The runner then
  follows that cursor; the second call MUST return the remaining buy and
  MUST signal `has_more=false` with no cursor. An agent that hides the third
  fixture by reporting `has_more=false` on the first page (the
  dishonest-pagination case) fails the first-page assertion. An agent that
  carries a stale cursor onto the terminal page fails the second-page
  assertion.

  The `total_count` field is allowed to be absent (some backends cannot
  compute it cheaply per the pagination-response schema) but when an agent
  volunteers it, the value MUST match the seeded fixture count of three.

agent:
  interaction_model: stateful_preloaded
  capabilities:
    - has_media_buy
  examples:
    - "Any AdCP agent that exposes a paginated get_media_buys"

caller:
  role: buyer_agent
  example: "Compliance test harness"

prerequisites:
  description: |
    The runner seeds three media buys ahead of time so a small page-size
    request reliably triggers a continuation page on the first call. Each
    fixture only needs a status, currency, and flight dates for get_media_buys
    to surface it.
  test_kit: "test-kits/acme-outdoor.yaml"
  controller_seeding: true

fixtures:
  media_buys:
    - media_buy_id: "pagination_integrity_mb_1"
      status: "active"
      currency: "USD"
    - media_buy_id: "pagination_integrity_mb_2"
      status: "active"
      currency: "USD"
    - media_buy_id: "pagination_integrity_mb_3"
      status: "active"
      currency: "USD"

phases:
  - id: capability_discovery
    title: "Capability discovery"
    narrative: |
      Confirm the agent supports the media buy protocol before exercising
      get_media_buys.
    steps:
      - id: get_capabilities
        title: "Check agent capabilities"
        narrative: |
          Verify that the agent declares media_buy in supported_protocols
          before driving paginated get_media_buys.
        task: get_adcp_capabilities
        schema_ref: "protocol/get-adcp-capabilities-request.json"
        response_schema_ref: "protocol/get-adcp-capabilities-response.json"
        doc_ref: "/protocol/get_adcp_capabilities"
        comply_scenario: capability_discovery
        stateful: false
        expected: |
          Return capabilities declaring media_buy in supported_protocols.

        sample_request:
          context:
            correlation_id: "get_media_buys_pagination--get_capabilities"
        validations:
          - check: response_schema
            description: "Response matches get-adcp-capabilities-response.json schema"
          - check: field_present
            path: "supported_protocols"
            description: "Agent declares supported protocols"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "get_media_buys_pagination--get_capabilities"
            description: "Context correlation_id returned unchanged"

  - id: pagination_walk
    title: "Walk pages with a small max_results"
    narrative: |
      With three media buys seeded and `max_results: 2`, the first call MUST
      return a continuation page (has_more=true with a cursor). The runner
      then follows the cursor; the second call MUST return the terminal
      page (has_more=false with no cursor).

    steps:
      - id: first_page
        title: "Request the first page with max_results=2"
        narrative: |
          The buyer asks for up to two media buys. The agent has three matching
          fixtures, so the request is non-terminal: callers expect
          `has_more=true` and a `cursor` they can follow to retrieve the
          remaining buy.

          The runner captures `pagination.cursor` into `$context.next_cursor`
          for the follow-up step. If the agent reports `has_more=false` on
          this page (hiding the seeded third buy behind a dishonest terminal
          signal), the field_value check on `pagination.has_more` fails —
          surfacing exactly the bug class this storyboard exists to catch.
        task: get_media_buys
        schema_ref: "media-buy/get-media-buys-request.json"
        response_schema_ref: "media-buy/get-media-buys-response.json"
        doc_ref: "/media-buy/task-reference/get_media_buys"
        comply_scenario: get_media_buys_pagination_integrity
        stateful: true
        context_outputs:
          - name: next_cursor
            path: "pagination.cursor"
        expected: |
          Return up to two media buys with:
          - pagination.has_more = true
          - pagination.cursor present (an opaque continuation token)

        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          pagination:
            max_results: 2

          context:
            correlation_id: "get_media_buys_pagination--first_page"
        validations:
          - check: response_schema
            description: "Response matches get-media-buys-response.json schema"
          - check: field_value
            path: "pagination.has_more"
            value: true
            description: "Three fixtures seeded with max_results=2 → first page is non-terminal"
          - check: field_present
            path: "pagination.cursor"
            description: "has_more=true requires a cursor — without one the caller cannot continue"
          - check: field_value_or_absent
            path: "pagination.total_count"
            allowed_values: [3]
            description: "If volunteered, total_count MUST equal the seeded set size — under-reporting hides inventory the same way a dishonest has_more does"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "get_media_buys_pagination--first_page"
            description: "Context correlation_id returned unchanged"

      - id: terminal_page
        title: "Follow the cursor to the terminal page"
        narrative: |
          The buyer follows the captured cursor. With at most one remaining
          buy the agent MUST return a terminal page: `has_more=false`
          with no `cursor` field. A cursor on `has_more=false` is a stale
          token that invites callers to follow it past the end of results.
        task: get_media_buys
        schema_ref: "media-buy/get-media-buys-request.json"
        response_schema_ref: "media-buy/get-media-buys-response.json"
        doc_ref: "/media-buy/task-reference/get_media_buys"
        comply_scenario: get_media_buys_pagination_integrity
        stateful: true
        expected: |
          Return the remaining buy with:
          - pagination.has_more = false
          - pagination.cursor absent (a stale cursor on a terminal page is a
            dishonest pagination signal)

        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          pagination:
            cursor: "$context.next_cursor"
            max_results: 2

          context:
            correlation_id: "get_media_buys_pagination--terminal_page"
        validations:
          - check: response_schema
            description: "Response matches get-media-buys-response.json schema"
          - check: field_value
            path: "pagination.has_more"
            value: false
            description: "After two pages of two items the seeded set is exhausted"
          - check: field_value_or_absent
            path: "pagination.cursor"
            allowed_values: [null]
            description: "Terminal page MUST omit cursor (null also accepted for clients that explicitly clear the field)"
          - check: field_value_or_absent
            path: "pagination.total_count"
            allowed_values: [3]
            description: "total_count (when volunteered) MUST stay stable across pages and equal the seeded set size"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "get_media_buys_pagination--terminal_page"
            description: "Context correlation_id returned unchanged"
