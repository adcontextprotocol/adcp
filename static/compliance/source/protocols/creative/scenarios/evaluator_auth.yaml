id: creative/evaluator_auth
version: "1.0.0"
title: "Creative evaluator authentication boundary"
category: creative
summary: "Verifies that build_creative evaluator pointers use the verifier allowlist, keep credentials out of payloads, and invoke accepted evaluator agents through get_creative_features."
track: creative
introduced_in: "3.1"
required_tools:
  - get_adcp_capabilities
  - build_creative

narrative: |
  `build_creative.evaluator` is an experimental buyer-attached pointer for
  best-of-N evaluation. It names or calibrates the evaluator; it does not carry
  credentials or caller-supplied trust material. External evaluator URLs must be
  on the seller's `creative_policy.accepted_verifiers[]` allowlist before the
  producing creative agent calls them. Once on-list, the producing agent
  authenticates its outbound `get_creative_features` request to the evaluator on
  the transport using request signing/JWKS, mTLS, or a pre-provisioned static
  credential.

  This storyboard exercises the observable contract:
  - a supporting agent advertises `creative.supports_evaluator` together with
    the `creative.evaluator` experimental feature id
  - off-list evaluator URLs fail with `EVALUATOR_AGENT_NOT_ACCEPTED` before any
    outbound evaluator call
  - credential- or trust-material fields inside the evaluator payload are
    advisory violations in 3.1 and should surface as `CREDENTIAL_IN_ARGS`
  - an accepted evaluator URL causes an outbound evaluator call carrying a
    get_creative_features-shaped payload and returns per-leaf `variants[].eval`
    feature values
  - an accepted evaluator that is unreachable or rejects transport
    authentication degrades to seller-default ranking with an advisory
    `errors[]` note

  The upstream-traffic checks raise the bar against accidental facades, but they
  are not cryptographic proof of transport authentication. Authentication proof
  remains a normative obligation on the producing agent and evaluator.

agent:
  interaction_model: creative_agent
  capabilities:
    - supports_generation
    - supports_evaluator
  examples:
    - "Generative creative platform that ranks best-of-N variants with an advertiser-owned quality evaluator"
    - "Creative agent that calls an accepted brand-safety evaluator before recommending variants"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    The creative agent advertises `creative.supports_evaluator: true`, lists
    `creative.evaluator` in `experimental_features`, exposes at least one
    targetable `creative.supported_formats[].capability_id`, and exposes at
    least one `governance.creative_features[].feature_id` for the account under
    test. Its sandbox `creative_policy.accepted_verifiers[]` includes
    `https://quality-evaluator.example/adcp`.

    The evaluator fixture exposes the standard `get_creative_features` contract.
    Transport authentication to that fixture is required by the protocol, but
    raw upstream-traffic attestation only proves that the accepted endpoint was
    called with a get_creative_features-shaped payload.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: capability_discovery
    title: "Discover evaluator support"
    narrative: |
      The buyer reads capabilities before sending evaluator inputs. Agents that
      do not advertise evaluator support skip the remaining evaluator-specific
      phases. Supporting agents also need a build capability id and a creative
      feature id so later phases do not hardcode fixture-specific values.

    steps:
      - id: get_capabilities
        title: "Read creative evaluator support"
        task: get_adcp_capabilities
        schema_ref: "protocol/get-adcp-capabilities-request.json"
        response_schema_ref: "protocol/get-adcp-capabilities-response.json"
        doc_ref: "/protocol/get_adcp_capabilities"
        comply_scenario: capability_discovery
        stateful: false
        expected: |
          Return the creative capability block. When `creative.supports_evaluator`
          is true, the following phases validate the evaluator boundary using
          discovered build and feature identifiers.
        sample_request:
          protocols:
            - "creative"
            - "governance"
          context:
            correlation_id: "creative_evaluator_auth--get_capabilities"
        context_outputs:
          - key: "supports_evaluator"
            path: "creative.supports_evaluator"
          - key: "build_capability_id"
            path: "creative.supported_formats[0].capability_id"
          - key: "creative_feature_id"
            path: "governance.creative_features[0].feature_id"
        validations:
          - check: response_schema
            description: "Response matches get-adcp-capabilities-response.json schema"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_evaluator_auth--get_capabilities"
            description: "Context correlation_id returned unchanged"

  - id: evaluator_capability_contract
    title: "Confirm experimental feature declaration"
    optional: true
    skip_if: "!context.supports_evaluator"
    narrative: |
      Because evaluator support is experimental, agents that set
      `creative.supports_evaluator` must also list `creative.evaluator` in
      `experimental_features` and expose the catalogs the evaluator request and
      response use.

    steps:
      - id: confirm_experimental_feature
        title: "Check evaluator feature id"
        task: get_adcp_capabilities
        schema_ref: "protocol/get-adcp-capabilities-request.json"
        response_schema_ref: "protocol/get-adcp-capabilities-response.json"
        doc_ref: "/protocol/get_adcp_capabilities"
        comply_scenario: capability_discovery
        stateful: false
        expected: |
          Return `creative.supports_evaluator: true`, include
          `creative.evaluator` in `experimental_features`, and expose both the
          build capability catalog and creative-feature vocabulary.
        sample_request:
          protocols:
            - "creative"
            - "governance"
          context:
            correlation_id: "creative_evaluator_auth--feature_contract"
        validations:
          - check: response_schema
            description: "Response matches get-adcp-capabilities-response.json schema"
          - check: field_value
            path: "creative.supports_evaluator"
            value: true
            description: "Creative evaluator support is declared"
          - check: field_contains
            path: "experimental_features"
            value: "creative.evaluator"
            description: "Experimental evaluator feature id is declared"
          - check: field_present
            path: "creative.supported_formats[0].capability_id"
            description: "A targetable build capability id is discoverable"
          - check: field_present
            path: "governance.creative_features[0].feature_id"
            description: "Creative feature vocabulary is discoverable for evaluator rank_by/eval.features"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_evaluator_auth--feature_contract"
            description: "Context correlation_id returned unchanged"

  - id: reject_off_list_evaluator
    title: "Reject an off-list evaluator URL"
    optional: true
    skip_if: "!context.supports_evaluator || !context.build_capability_id || !context.creative_feature_id"
    narrative: |
      The buyer supplies a well-formed external evaluator URL that is not in the
      seller's accepted verifier allowlist. The creative agent must reject it
      before making any outbound evaluator call.

    steps:
      - id: reject_unaccepted_agent_url
        title: "Build with an unaccepted evaluator URL"
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: true
        expect_error: true
        negative_path: payload_well_formed
        expected: |
          Return `EVALUATOR_AGENT_NOT_ACCEPTED`. The agent must reject the
          off-list URL before any outbound call to the supplied evaluator.
        sample_request:
          idempotency_key: "$generate:uuid_v4#creative_evaluator_auth_off_list"
          message: "Create two best-of-N display variants for Acme Outdoor's winter trip offer."
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "$context.build_capability_id"
          max_variants: 2
          variant_axis:
            dimension: "best_of_n"
          keep_mode: "keep_one"
          evaluator:
            agent_url: "https://unaccepted-evaluator.example/adcp"
            rank_by:
              - feature_id: "$context.creative_feature_id"
                direction: "maximize"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          brand:
            domain: "acmeoutdoor.example"
          context:
            correlation_id: "creative_evaluator_auth--off_list"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: error_code
            value: "EVALUATOR_AGENT_NOT_ACCEPTED"
            description: "Off-list evaluator URL is rejected before any outbound call"
          - check: upstream_traffic
            description: "Off-list direct evaluator URL is never called"
            min_count: 0
            endpoint_pattern: "POST https://unaccepted-evaluator.example/adcp*"

  - id: reject_off_list_feature_agent
    title: "Reject an off-list feature_agent URL"
    optional: true
    skip_if: "!context.supports_evaluator || !context.build_capability_id || !context.creative_feature_id"
    narrative: |
      The buyer supplies a well-formed `feature_agent.agent_url` alongside an
      account-arranged evaluator id. The nested feature agent uses the same
      accepted-verifier allowlist and must be rejected before any outbound call
      when it is off-list.

    steps:
      - id: reject_unaccepted_feature_agent
        title: "Build with an unaccepted feature_agent URL"
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: true
        expect_error: true
        negative_path: payload_well_formed
        expected: |
          Return `EVALUATOR_AGENT_NOT_ACCEPTED` for the nested
          `evaluator.feature_agent.agent_url` without calling the off-list
          endpoint.
        sample_request:
          idempotency_key: "$generate:uuid_v4#creative_evaluator_auth_feature_agent_off_list"
          message: "Create two best-of-N display variants for Acme Outdoor's winter trip offer."
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "$context.build_capability_id"
          max_variants: 2
          variant_axis:
            dimension: "best_of_n"
          keep_mode: "keep_one"
          evaluator:
            evaluator_id: "quality-default"
            feature_agent:
              agent_url: "https://unaccepted-evaluator.example/adcp"
              feature_id: "$context.creative_feature_id"
            rank_by:
              - feature_id: "$context.creative_feature_id"
                direction: "maximize"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          brand:
            domain: "acmeoutdoor.example"
          context:
            correlation_id: "creative_evaluator_auth--feature_agent_off_list"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: error_code
            value: "EVALUATOR_AGENT_NOT_ACCEPTED"
            description: "Off-list feature_agent URL is rejected before any outbound call"
          - check: upstream_traffic
            description: "Off-list nested feature_agent URL is never called"
            min_count: 0
            endpoint_pattern: "POST https://unaccepted-evaluator.example/adcp*"

  - id: payload_credentials_advisory
    title: "Keep evaluator credentials out of the payload"
    optional: true
    skip_if: "!context.supports_evaluator || !context.build_capability_id || !context.creative_feature_id"
    narrative: |
      The buyer attempts to pass an evaluator API key inside the evaluator
      object. The payload is schema-valid but non-conforming: evaluator
      credentials and caller-supplied trust material belong on the transport
      between the creative agent and evaluator, or in account provisioning, not
      inside the build_creative request. AdCP 3.1 says sellers SHOULD reject
      this shape and the requirement upgrades to MUST 90 days after 3.1
      publication, so these checks are advisory for the 3.1 storyboard.

    steps:
      - id: evaluator_api_key_payload
        title: "Build with a credential-shaped evaluator field"
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: true
        negative_path: payload_well_formed
        expected: |
          Prefer `CREDENTIAL_IN_ARGS` without echoing the supplied value in
          `error.field`, `error.message`, or `error.details`. A producing agent
          must not forward the smuggled credential to the evaluator.
        sample_request:
          idempotency_key: "$generate:uuid_v4#creative_evaluator_auth_payload_credential"
          message: "Create two best-of-N display variants for Acme Outdoor's winter trip offer."
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "$context.build_capability_id"
          max_variants: 2
          variant_axis:
            dimension: "best_of_n"
          keep_mode: "keep_one"
          evaluator:
            agent_url: "https://quality-evaluator.example/adcp"
            rank_by:
              - feature_id: "$context.creative_feature_id"
                direction: "maximize"
            ext:
              api_key: "not-a-real-secret"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          brand:
            domain: "acmeoutdoor.example"
          context:
            correlation_id: "creative_evaluator_auth--payload_credential"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: error_code
            value: "CREDENTIAL_IN_ARGS"
            description: "Credential-shaped evaluator payload field is rejected"
            severity: advisory
            permanent_advisory:
              reason: "AdCP 3.1 says sellers SHOULD reject credentials in args; promote when the 90-day post-3.1 MUST takes effect."
          - check: field_absent
            path: "errors[0].details"
            description: "Credential rejection does not echo secret-bearing details"
            severity: advisory
            permanent_advisory:
              reason: "AdCP 3.1 says sellers SHOULD reject credentials in args; promote when the 90-day post-3.1 MUST takes effect."
          - check: upstream_traffic
            description: "Credential-smuggling payload is not forwarded to the accepted evaluator"
            min_count: 0
            endpoint_pattern: "POST https://quality-evaluator.example/adcp*"
            severity: advisory
            permanent_advisory:
              reason: "AdCP 3.1 says sellers SHOULD reject credentials in args; promote when the 90-day post-3.1 MUST takes effect."

  - id: accepted_evaluator_invocation
    title: "Invoke an accepted evaluator"
    optional: true
    skip_if: "!context.supports_evaluator || !context.build_capability_id || !context.creative_feature_id"
    narrative: |
      The buyer supplies an accepted external evaluator URL. The creative agent
      builds variants, calls the evaluator through the `get_creative_features`
      contract using transport authentication, and returns per-leaf evaluation
      results that drive `recommended`/`rank`.

    steps:
      - id: build_with_accepted_evaluator
        title: "Build and rank with an accepted evaluator"
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: true
        expected: |
          Return a BuildCreativeVariantSuccess response with at least one
          returned variant carrying `eval.features[]`, `rank`, and
          `recommended`. The upstream traffic check asserts that the creative
          agent called the accepted endpoint with a get_creative_features-shaped
          payload; it does not cryptographically prove the transport
          authentication mechanism.
        sample_request:
          idempotency_key: "$generate:uuid_v4#creative_evaluator_auth_accepted"
          message: "Create two best-of-N display variants for Acme Outdoor's winter trip offer."
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "$context.build_capability_id"
          max_variants: 2
          variant_axis:
            dimension: "best_of_n"
          keep_mode: "keep_one"
          evaluator:
            agent_url: "https://quality-evaluator.example/adcp"
            rank_by:
              - feature_id: "$context.creative_feature_id"
                direction: "maximize"
            eval_budget:
              max_calls: 4
              max_seconds: 10
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          brand:
            domain: "acmeoutdoor.example"
          context:
            correlation_id: "creative_evaluator_auth--accepted"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: field_present
            path: "creatives[0].variants[0].eval.features"
            description: "Returned variant includes evaluator feature values"
          - check: field_present
            path: "creatives[0].variants[0].rank"
            description: "Variant ranking is populated from evaluator results"
          - check: field_present
            path: "creatives[0].variants[0].recommended"
            description: "Recommended flag is populated for keep_one"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_evaluator_auth--accepted"
            description: "Context correlation_id returned unchanged"
          - check: upstream_traffic
            description: "Creative agent invoked the accepted external evaluator endpoint with a get_creative_features-shaped payload"
            min_count: 1
            endpoint_pattern: "POST https://quality-evaluator.example/adcp*"
            attestation_mode_required: "raw"
            payload_must_contain:
              - path: "creative_manifest.assets"
                match: present

  - id: accepted_evaluator_unavailable_degrades
    title: "Degrade when an accepted evaluator is unavailable"
    optional: true
    skip_if: "!context.supports_evaluator || !context.build_capability_id || !context.creative_feature_id"
    narrative: |
      An accepted evaluator can be unreachable or can reject the producing
      agent's transport authentication. The buyer-visible build should not fail
      solely because an advisory evaluator is unavailable; it should return
      produced variants ranked by the seller default with an advisory `errors[]`
      note. This phase requires a comply_test_controller that can force the
      evaluator fixture unavailable, so validations are advisory.

    steps:
      - id: force_evaluator_unavailable
        title: "Force accepted evaluator unavailable"
        task: comply_test_controller
        schema_ref: "compliance/comply-test-controller-request.json"
        response_schema_ref: "compliance/comply-test-controller-response.json"
        doc_ref: "/building/by-layer/L3/comply-test-controller"
        comply_scenario: force_upstream_unavailable
        requires_tool: comply_test_controller
        stateful: true
        expected: |
          Controller acknowledges that the accepted evaluator fixture should be
          treated as unavailable for the following build_creative call.
        sample_request:
          scenario: force_upstream_unavailable
          params:
            tool: "build_creative"
            upstream_name: "quality-evaluator"
          account:
            sandbox: true
          context:
            correlation_id: "creative_evaluator_auth--force_unavailable"
        validations:
          - check: response_schema
            description: "Controller response matches comply-test-controller-response.json"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable being advertised in the seller's comply_test_controller scenarios. Promote to required when force_upstream_unavailable is widely adopted."
          - check: field_value
            path: "context.correlation_id"
            value: "creative_evaluator_auth--force_unavailable"
            description: "Context correlation_id returned unchanged"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable being advertised in the seller's comply_test_controller scenarios. Promote to required when force_upstream_unavailable is widely adopted."

      - id: build_with_unavailable_evaluator
        title: "Build falls back to seller-default ranking"
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        requires_tool: comply_test_controller
        stateful: true
        expected: |
          Return produced variants instead of a terminal build failure. The
          response should include an advisory `errors[]` note explaining that
          evaluator ranking was unavailable and seller-default ranking was used.
        sample_request:
          idempotency_key: "$generate:uuid_v4#creative_evaluator_auth_unavailable"
          message: "Create two best-of-N display variants for Acme Outdoor's winter trip offer."
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "$context.build_capability_id"
          max_variants: 2
          variant_axis:
            dimension: "best_of_n"
          keep_mode: "keep_one"
          evaluator:
            agent_url: "https://quality-evaluator.example/adcp"
            rank_by:
              - feature_id: "$context.creative_feature_id"
                direction: "maximize"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          brand:
            domain: "acmeoutdoor.example"
          context:
            correlation_id: "creative_evaluator_auth--unavailable_degrade"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema despite evaluator unavailability"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable runner support. Promote to required when widely adopted."
          - check: field_present
            path: "creatives[0].variants[0]"
            description: "Build returns at least one produced variant under seller-default ranking"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable runner support. Promote to required when widely adopted."
          - check: field_present
            path: "errors[0].code"
            description: "Response carries an advisory evaluator-unavailable note in errors[]"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable runner support. Promote to required when widely adopted."
          - check: field_value
            path: "context.correlation_id"
            value: "creative_evaluator_auth--unavailable_degrade"
            description: "Context correlation_id returned unchanged"
            severity: advisory
            permanent_advisory:
              reason: "Gated on force_upstream_unavailable runner support. Promote to required when widely adopted."
