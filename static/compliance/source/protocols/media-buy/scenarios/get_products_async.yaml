id: media_buy_seller/get_products_async
version: "1.0.0"
introduced_in: "3.1"
title: "Seller returns and completes async get_products discovery tasks"
category: media_buy_seller
summary: "Forces curated get_products discovery into the submitted arm, verifies the task is visible through task APIs, completes it deterministically, and observes the terminal webhook result."
track: media_buy
required_tools:
  - get_products
  - get_task_status
  - list_tasks
  - comply_test_controller

narrative: |
  Curated product discovery can take longer than a single request budget when a
  seller needs custom inventory curation, upstream lookups, or human review.
  In that case get_products returns a task envelope, not terminal products:
  status='submitted', task_id present, and no products[] or proposals[] on the
  initial response.

  This scenario makes that path deterministic. The runner uses
  comply_test_controller.force_get_products_arm to force the next brief-mode
  get_products call into the submitted arm with a known task_id. The storyboard
  then checks that the same task is visible through list_tasks, resolves the
  task with force_task_completion, polls get_task_status with include_result,
  and observes the terminal webhook payload registered on the original
  push_notification_config.

  Wholesale product feeds are intentionally out of scope. A
  buying_mode='wholesale' request is feed access and MUST NOT consume this
  directive or enter the Submitted arm.

agent:
  interaction_model: media_buy_seller
  capabilities:
    - sells_media
    - supports_test_controller
    - supports_async_discovery
  examples:
    - "Retail media networks with custom package curation"
    - "Publishers that route bespoke product discovery through sales review"

caller:
  role: compliance_runner
  example: "AdCP Verified runner with webhook receiver capability"

prerequisites:
  description: |
    Seller exposes comply_test_controller in sandbox mode and supports
    force_get_products_arm plus force_task_completion. The runner also hosts a
    webhook receiver so the submitted discovery request can register a terminal
    completion callback.
  test_kit: "test-kits/acme-outdoor.yaml"
  controller_seeding: true

phases:
  - id: force_submitted_discovery
    title: "Drive next get_products into submitted arm"
    narrative: |
      Register a one-shot directive for the caller's sandbox account. The next
      brief-mode get_products call must return the submitted task envelope with
      the deterministic task_id.

    steps:
      - id: force_get_products_submitted
        title: "Force submitted arm on next get_products"
        task: comply_test_controller
        schema_ref: "compliance/comply-test-controller-request.json"
        response_schema_ref: "compliance/comply-test-controller-response.json"
        doc_ref: "/building/implementation/comply-test-controller"
        comply_scenario: get_products_async
        stateful: true
        context_outputs:
          - name: forced_products_task_id
            path: "forced.task_id"
        expected: |
          Return a successful directive:
          - success: true
          - forced.arm: submitted
          - forced.task_id: deterministic task handle the next get_products will return
        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          scenario: "force_get_products_arm"
          params:
            arm: "submitted"
            task_id: "task_async_products_acme_q3"
            message: "Custom product curation queued; typical turnaround 10 minutes"
          context:
            correlation_id: "get_products_async--force_submitted"
        validations:
          - check: response_schema
            description: "Response matches comply-test-controller-response.json"
          - check: field_value
            path: "success"
            allowed_values: [true]
            description: "Controller accepts the directive"
          - check: field_value
            path: "forced.arm"
            value: "submitted"
            description: "Controller echoes the forced arm"
          - check: field_value
            path: "forced.task_id"
            value: "task_async_products_acme_q3"
            description: "Controller echoes the deterministic discovery task_id"

  - id: submitted_discovery_response
    title: "get_products returns submitted task envelope"
    narrative: |
      The buyer sends a normal curated product-discovery request with a webhook
      registration. The initial response is only the task envelope. The
      terminal products/proposals must be retrieved from task completion.

    steps:
      - id: get_products_submitted
        title: "Call get_products and observe the submitted envelope"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-async-response-submitted.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: get_products_async
        stateful: true
        context_outputs:
          - name: products_task_id
            path: "task_id"
        expected: |
          Return the submitted task envelope:
          - status: submitted
          - task_id: task_async_products_acme_q3
          - no products[] or proposals[] on the initial envelope
          - terminal products/proposals are delivered through task completion
        sample_request:
          buying_mode: "brief"
          brief: "Curate display and video inventory for an Acme Outdoor fall trail campaign."
          pagination:
            max_results: 5
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          push_notification_config:
            url: "{{runner.webhook_url:get_products_submitted}}"
            operation_id: "op_get_products_async_terminal"
          context:
            correlation_id: "get_products_async--get_products_submitted"
        validations:
          - check: response_schema
            description: "Response matches get-products-async-response-submitted.json"
          - check: field_value
            path: "status"
            value: "submitted"
            description: "Initial response is a task-level submitted envelope"
          - check: field_value
            path: "task_id"
            value: "$context.forced_products_task_id"
            description: "Submitted task_id matches the controller directive"
          - check: field_absent
            path: "products"
            description: "Terminal products are not returned on the submitted envelope"
          - check: field_absent
            path: "proposals"
            description: "Terminal proposals are not returned on the submitted envelope"
          - check: field_absent
            path: "result"
            description: "Terminal result is not returned on the submitted envelope"

      - id: list_products_task
        title: "Find submitted discovery task in list_tasks"
        task: list_tasks
        schema_ref: "protocol/list-tasks-request.json"
        response_schema_ref: "protocol/list-tasks-response.json"
        doc_ref: "/protocol/list_tasks"
        comply_scenario: get_products_async
        stateful: true
        expected: |
          Return the submitted get_products task with media-buy domain and
          has_webhook=true because the original request registered a webhook.
        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          filters:
            task_ids:
              - "$context.products_task_id"
            task_type: "get_products"
            has_webhook: true
          pagination:
            max_results: 1
          context:
            correlation_id: "get_products_async--list_products_task"
        validations:
          - check: response_schema
            description: "Response matches list-tasks-response.json"
          - check: field_value
            path: "query_summary.total_matching"
            value: 1
            description: "Task-id filter matches exactly one task in this account"
          - check: field_value
            path: "query_summary.returned"
            value: 1
            description: "Task-id filter returns exactly one task"
          - check: field_value
            path: "tasks[0].task_id"
            value: "$context.products_task_id"
            description: "list_tasks returns the submitted discovery task"
          - check: field_value
            path: "tasks[0].task_type"
            value: "get_products"
            description: "Task type identifies get_products"
          - check: field_value
            path: "tasks[0].domain"
            value: "media-buy"
            description: "Task is classified under the media-buy domain"
          - check: field_value
            path: "tasks[0].status"
            value: "submitted"
            description: "Task remains submitted before deterministic completion"
          - check: field_value
            path: "tasks[0].has_webhook"
            value: true
            description: "Task records the webhook registration"

      - id: list_products_task_wrong_account
        title: "Do not list get_products task from another account"
        task: list_tasks
        schema_ref: "protocol/list-tasks-request.json"
        response_schema_ref: "protocol/list-tasks-response.json"
        doc_ref: "/protocol/list_tasks"
        comply_scenario: get_products_async
        stateful: true
        expected: |
          Return an empty task list for the same task_id under a different
          sandbox account. Sellers MUST scope task reconciliation to the
          authenticated account + principal pair.
        sample_request:
          account:
            brand:
              domain: "otherbrand.example"
            operator: "other-operator.example"
            sandbox: true
          filters:
            task_ids:
              - "$context.products_task_id"
            task_type: "get_products"
          pagination:
            max_results: 1
          context:
            correlation_id: "get_products_async--wrong_account_list_tasks"
        validations:
          - check: response_schema
            description: "Response matches list-tasks-response.json"
          - check: field_value
            path: "query_summary.total_matching"
            value: 0
            description: "Cross-account task-id filter matches no tasks"
          - check: field_value
            path: "query_summary.returned"
            value: 0
            description: "Cross-account task-id filter returns no tasks"

  - id: completed_discovery_result
    title: "Task completion carries products and webhook result"
    narrative: |
      Complete the task through the controller, then verify both polling path
      and webhook delivery expose the terminal get_products result.

    steps:
      - id: complete_products_task
        title: "Force get_products task completion"
        task: comply_test_controller
        schema_ref: "compliance/comply-test-controller-request.json"
        response_schema_ref: "compliance/comply-test-controller-response.json"
        doc_ref: "/building/implementation/comply-test-controller"
        comply_scenario: get_products_async
        stateful: true
        expected: |
          Transition the submitted get_products task to completed with a
          schema-valid get-products result payload.
        sample_request:
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          scenario: "force_task_completion"
          params:
            task_id: "$context.products_task_id"
            result:
              products:
                - product_id: "async_curated_trail_display"
                  name: "Async curated trail display"
                  description: "Curated display inventory for the Acme Outdoor fall trail campaign."
                  publisher_properties:
                    - publisher_domain: "outdoormagazine.example"
                      selection_type: "all"
                  channels: ["display"]
                  delivery_type: "guaranteed"
                  format_ids:
                    - agent_url: "https://creative.adcontextprotocol.org/"
                      id: "display_300x250"
                  pricing_options:
                    - pricing_option_id: "async_curated_trail_cpm"
                      pricing_model: "cpm"
                      currency: "USD"
                      fixed_price: 14
                  reporting_capabilities:
                    available_reporting_frequencies: ["daily"]
                    expected_delay_minutes: 60
                    timezone: "UTC"
                    supports_webhooks: false
                    available_metrics: ["impressions", "clicks", "spend"]
                    date_range_support: "date_range"
              cache_scope: "public"
              context:
                correlation_id: "get_products_async--terminal_result"
          context:
            correlation_id: "get_products_async--complete_products_task"
        validations:
          - check: response_schema
            description: "Response matches comply-test-controller-response.json"
          - check: field_value
            path: "success"
            allowed_values: [true]
            description: "Controller completed the task"
          - check: field_value
            path: "current_state"
            value: "completed"
            description: "Task is now completed"

      - id: get_products_task_status_wrong_account
        title: "Reject get_products task lookup from another account"
        task: get_task_status
        expect_error: true
        negative_path: payload_well_formed
        schema_ref: "protocol/get-task-status-request.json"
        response_schema_ref: "protocol/get-task-status-response.json"
        doc_ref: "/protocol/get_task_status"
        comply_scenario: get_products_async
        stateful: true
        expected: |
          Return NOT_FOUND when the same task_id is polled from a different
          sandbox account. Sellers MUST NOT reveal whether the task exists under
          another account or principal.
        sample_request:
          task_id: "$context.products_task_id"
          include_result: true
          account:
            brand:
              domain: "otherbrand.example"
            operator: "other-operator.example"
            sandbox: true
          context:
            correlation_id: "get_products_async--wrong_account_task_status"
        validations:
          - check: error_code
            allowed_values: ["NOT_FOUND"]
            description: "Cross-account task lookup is hidden as NOT_FOUND"

      - id: get_products_task_status_completed
        title: "Poll completed get_products task with result"
        task: get_task_status
        schema_ref: "protocol/get-task-status-request.json"
        response_schema_ref: "protocol/get-task-status-response.json"
        doc_ref: "/protocol/get_task_status"
        comply_scenario: get_products_async
        stateful: true
        expected: |
          Return completed task status with the terminal get_products result.
        sample_request:
          task_id: "$context.products_task_id"
          include_result: true
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          context:
            correlation_id: "get_products_async--get_task_status_completed"
        validations:
          - check: response_schema
            description: "Response matches get-task-status-response.json"
          - check: field_value
            path: "task_id"
            value: "$context.products_task_id"
            description: "Polling returns the same task"
          - check: field_value
            path: "task_type"
            value: "get_products"
            description: "Task type remains get_products"
          - check: field_value
            path: "protocol"
            value: "media-buy"
            description: "Task protocol is media-buy"
          - check: field_value
            path: "status"
            value: "completed"
            description: "Task is completed"
          - check: field_value
            path: "has_webhook"
            value: true
            description: "Task status retains webhook registration state"
          - check: field_value
            path: "result.products[0].product_id"
            value: "async_curated_trail_display"
            description: "Terminal products are available from task completion, not the submitted envelope"
          - check: field_value
            path: "result.cache_scope"
            value: "public"
            description: "Terminal result keeps get_products response shape"

      - id: expect_products_terminal_webhook
        title: "Assert terminal get_products webhook"
        task: expect_webhook
        triggered_by: get_products_submitted
        filter:
          body:
            operation_id: "op_get_products_async_terminal"
            task_id: "task_async_products_acme_q3"
            task_type: "get_products"
            protocol: "media-buy"
            status: "completed"
            result.products.0.product_id: "async_curated_trail_display"
            result.products.0.pricing_options.0.pricing_option_id: "async_curated_trail_cpm"
            result.cache_scope: "public"
            result.context.correlation_id: "get_products_async--terminal_result"
        timeout_seconds: 30
        expect_idempotency_key: true
        webhook_payload_schema_ref: "core/mcp-webhook-payload.json"
        requires_contract: webhook_receiver_runner
        stateful: true
        expected: |
          Terminal webhook arrives for the original push_notification_config.
          Payload validates against mcp-webhook-payload.json and carries the
          expected operation_id, task_id, task_type, protocol, completed
          status, and get_products result shape.
