id: media_buy_seller/proposal_decline
version: "1.0.0"
title: "Seller handles proposal decline"
category: media_buy_seller
summary: "Validates stateful proposal decline acknowledgement, duplicate-decline idempotency, and create_media_buy rejection for a declined proposal version."
track: media_buy
required_tools:
  - get_products
  - create_media_buy

requires_capability:
  path: media_buy.supports_proposals
  equals: true

narrative: |
  Proposal versions can resolve negatively as well as positively. A buyer that
  evaluates a proposal and decides not to pursue it reports that outcome with
  get_products in refine mode using proposal-scoped action: decline. The seller
  acknowledges the exact proposal_id + proposal_version in refinement_applied,
  treats duplicate declines as idempotent, and rejects any later attempt to
  execute that declined proposal version with INVALID_STATE. This is a
  stateful conformance scenario: schema-valid payloads are not sufficient.
  The seller runtime must persist proposal version state, record terminal
  decline outcomes once, and enforce that declined versions cannot later be
  accepted.

agent:
  interaction_model: media_buy_seller
  capabilities:
    - sells_media
    - accepts_briefs
    - generates_proposals
  examples:
    - "Full-service publisher with proposal engine"
    - "Retail media network with curated packages"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    The seller must support proposals (media_buy.supports_proposals: true) and
    include proposal_version on proposals it expects buyers to resolve explicitly.
    The seller must persist proposal-version state across phases; otherwise it
    cannot prove duplicate decline idempotency or declined-version create
    rejection.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: setup
    title: "Account setup"
    steps:
      - id: sync_accounts
        title: "Establish account"
        task: sync_accounts
        schema_ref: "account/sync-accounts-request.json"
        response_schema_ref: "account/sync-accounts-response.json"
        doc_ref: "/accounts/tasks/sync_accounts"
        stateful: true
        expected: |
          Return the account with account_id and status active.

        sample_request:
          accounts:
            - brand:
                domain: "acmeoutdoor.example"
              operator: "pinnacle-agency.example"
              billing: "operator"
              payment_terms: "net_30"

          idempotency_key: "$generate:uuid_v4#media_buy_seller_proposal_decline_setup_sync_accounts"
        validations:
          - check: response_schema
            description: "Response matches sync-accounts-response.json schema"
          - check: field_present
            path: "accounts[0].account_id"
            description: "Account has a platform-assigned ID"

  - id: brief_with_versioned_proposal
    title: "Brief returns a versioned proposal"
    narrative: |
      Send a brief and capture one proposal version. The proposal_version is the
      exact offer state the buyer will decline and later attempt to execute.

    steps:
      - id: get_products_brief
        title: "Send a brief and receive a versioned proposal"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-response.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: full_sales_flow
        stateful: false
        expected: |
          Return products and at least one proposal with proposal_id and proposal_version.

        sample_request:
          buying_mode: "brief"
          brief: "Premium video and display across outdoor lifestyle and sports. Q2 flight, $50K budget. Adults 25-54, US and Canada."
          opportunity:
            opportunity_id: "opp_01HX7W8S3Q9K2M4N6P0R5T1V"
            phase: "active_sourcing"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"

        context_outputs:
          - path: "proposals[0].proposal_id"
            key: "proposal_id"
          - path: "proposals[0].proposal_version"
            key: "proposal_version"

        validations:
          - check: response_schema
            description: "Response matches get-products-response.json schema"
          - check: field_present
            path: "proposals[0].proposal_id"
            description: "Proposal has an ID"
          - check: field_present
            path: "proposals[0].proposal_version"
            description: "Proposal has a version so it can be declined exactly"

  - id: decline_proposal
    title: "Decline the proposal version"
    narrative: |
      The buyer reports that it evaluated the proposal version and is not
      pursuing it. The seller must acknowledge the same proposal_id and
      proposal_version in refinement_applied.

    steps:
      - id: get_products_decline_proposal
        title: "Decline a proposal version"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-response.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: full_sales_flow
        stateful: true
        expected: |
          Record the decline and return refinement_applied[0] with:
          - scope: proposal
          - proposal_id: the declined proposal
          - proposal_version: the declined version
          - status: applied

        sample_request:
          buying_mode: "refine"
          opportunity:
            opportunity_id: "opp_01HX7W8S3Q9K2M4N6P0R5T1V"
            phase: "active_sourcing"
          refine:
            - scope: "proposal"
              proposal_id: "$context.proposal_id"
              proposal_version: "$context.proposal_version"
              action: "decline"
              reason: "price"
              detail: "Above target CPM range"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"

        validations:
          - check: response_schema
            description: "Response matches get-products-response.json schema"
          - check: field_value
            path: "refinement_applied[0].scope"
            value: "proposal"
            description: "Decline acknowledgement is proposal-scoped"
          - check: field_value
            path: "refinement_applied[0].proposal_id"
            value: "$context.proposal_id"
            description: "Decline acknowledgement echoes proposal_id"
          - check: field_value
            path: "refinement_applied[0].proposal_version"
            value: "$context.proposal_version"
            description: "Decline acknowledgement echoes proposal_version"
          - check: field_value
            path: "refinement_applied[0].status"
            value: "applied"
            description: "Seller records the decline"

  - id: duplicate_decline
    title: "Repeat the same decline"
    narrative: |
      Repeating the same decline for the same buyer, account, proposal_id, and
      proposal_version must be idempotent. The seller must not double-count the
      feedback and should acknowledge the duplicate as already applied.

    steps:
      - id: get_products_decline_duplicate
        title: "Repeat the same proposal decline"
        task: get_products
        schema_ref: "media-buy/get-products-request.json"
        response_schema_ref: "media-buy/get-products-response.json"
        doc_ref: "/media-buy/task-reference/get_products"
        comply_scenario: full_sales_flow
        stateful: true
        expected: |
          Return a successful response and acknowledge the same decline without
          creating a second distinct loss event.

        sample_request:
          buying_mode: "refine"
          opportunity:
            opportunity_id: "opp_01HX7W8S3Q9K2M4N6P0R5T1V"
            phase: "active_sourcing"
          refine:
            - scope: "proposal"
              proposal_id: "$context.proposal_id"
              proposal_version: "$context.proposal_version"
              action: "decline"
              reason: "price"
              detail: "Above target CPM range"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"

        validations:
          - check: response_schema
            description: "Response matches get-products-response.json schema"
          - check: field_value
            path: "refinement_applied[0].scope"
            value: "proposal"
            description: "Duplicate decline acknowledgement is proposal-scoped"
          - check: field_value
            path: "refinement_applied[0].proposal_id"
            value: "$context.proposal_id"
            description: "Duplicate decline acknowledgement echoes proposal_id"
          - check: field_value
            path: "refinement_applied[0].proposal_version"
            value: "$context.proposal_version"
            description: "Duplicate decline acknowledgement echoes proposal_version"

  - id: reject_create_after_decline
    title: "Reject create after decline"
    narrative: |
      After a proposal version is declined, the buyer must not execute it. The
      seller must reject create_media_buy for that exact proposal_id +
      proposal_version with INVALID_STATE.

    steps:
      - id: create_media_buy_declined_proposal
        title: "Reject create_media_buy for declined proposal version"
        task: create_media_buy
        schema_ref: "media-buy/create-media-buy-request.json"
        response_schema_ref: "media-buy/create-media-buy-response.json"
        doc_ref: "/media-buy/task-reference/create_media_buy"
        comply_scenario: create_media_buy
        expect_error: true
        negative_path: payload_well_formed
        stateful: true
        expected: |
          Reject with:
          - code: INVALID_STATE
          - recovery: correctable
          - field: proposal_version or proposal_id

        sample_request:
          brand:
            domain: "acmeoutdoor.example"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          proposal_id: "$context.proposal_id"
          proposal_version: "$context.proposal_version"
          total_budget:
            amount: 50000
            currency: "USD"
          start_time: "asap"
          end_time: "2027-06-30T23:59:59Z"
          idempotency_key: "$generate:uuid_v4#media_buy_seller_proposal_decline_reject_create_after_decline"

        validations:
          - check: error_code
            value: "INVALID_STATE"
            description: "Declined proposal version cannot be executed"
