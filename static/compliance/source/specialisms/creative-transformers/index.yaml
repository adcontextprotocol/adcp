id: creative_transformers
version: "1.0.0"
title: "Account-scoped creative transformer agent"
protocol: creative
category: creative_transformers
summary: "Agent that exposes account-scoped transformers (voices, models, render configs) via list_transformers, then builds and refines creatives by transformer_id + typed config — with variant fan-out and strict config validation."
required_tools:
  - list_transformers
  - build_creative

# Cross-step assertion (adcp#2664). status.monotonic rejects resource status
# transitions observed across steps that aren't on the spec lifecycle graph.
#
# Cross-resource assertion (adcp#2859). impairment.coherence verifies that
# creative.rejected transitions propagate to any non-terminal media buy that
# references the creative. Grades not_applicable until #2860 wires the
# cross-resource exercise. Transformer storyboards, like generative ones,
# typically don't surface a media-buy snapshot read, so this specialism may
# stay not_applicable more often than its peers even after #2860.
invariants:
  - status.monotonic
  - impairment.coherence

narrative: |
  You run a creative agent whose render capability is account-specific: the
  buyer's configured voices, cloned/custom voices, generative models, and
  render presets. The legal set of render knobs — and their values — is not a
  global enum the buyer holds; the agent knows them, and the set changes when
  the buyer adds one. So discovery flows agent → buyer, exactly the way
  get_products surfaces account-scoped inventory.

  You expose that capability as discoverable TRANSFORMERS (the creative analog
  of a media-buy product), each with a typed config surface, selected by
  transformer_id with a typed `config` on build_creative.

  This storyboard walks the transformer flow: capability discovery, transformer
  discovery, expanding an account-scoped enumerable param's values, building
  with a selected transformer + config, producing A/B variants along an axis,
  refining a produced variant (lineage), and rejecting an out-of-range config
  value (strict validation — a normative agent obligation, since the wire schema
  leaves config open).

agent:
  interaction_model: stateless_transform
  capabilities:
    - supports_transformers
  examples:
    - "AudioStack (account voices)"
    - "Generative model agents (Veo, image models)"

caller:
  role: buyer_agent
  example: "Scope3 (DSP)"

prerequisites:
  description: |
    The caller needs an account (transformers, their enumerable option values,
    and pricing are resolved per-credential) and a brand identity. The test kit
    provides a sample brand and account.
  test_kit: "test-kits/acme-outdoor.yaml"

phases:
  - id: capability_discovery
    title: "Capability discovery"
    narrative: |
      The buyer calls get_adcp_capabilities and confirms the agent advertises
      the transformer surface (creative.supports_transformers) before
      discovering transformers.
    steps:
      - id: get_capabilities
        title: "Confirm the transformer surface is offered"
        narrative: |
          A transformer-capable agent declares creative.supports_transformers:
          true. Buyers gate the list_transformers / transformer-config build
          path on this discriminator.
        task: get_adcp_capabilities
        schema_ref: "protocol/get-adcp-capabilities-request.json"
        response_schema_ref: "protocol/get-adcp-capabilities-response.json"
        doc_ref: "/protocol/get_adcp_capabilities"
        comply_scenario: capability_discovery
        stateful: false
        expected: |
          Return capabilities declaring creative in supported_protocols with
          creative.supports_transformers: true.
        sample_request:
          context:
            correlation_id: "creative_transformers--get_capabilities"
        validations:
          - check: response_schema
            description: "Response matches get-adcp-capabilities-response.json schema"
          - check: field_present
            path: "supported_protocols"
            description: "Agent declares supported protocols"
          - check: field_value
            path: "creative.supports_transformers"
            value: true
            description: "Agent advertises the account-scoped transformer surface"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--get_capabilities"
            description: "Context correlation_id returned unchanged"

  - id: discover_transformers
    title: "Discover transformers"
    narrative: |
      The buyer asks what transformers this agent offers for their account,
      optionally narrowing with a natural-language brief. Each transformer
      carries a stable transformer_id, the formats it produces, and its typed
      config params.
    steps:
      - id: list_transformers
        title: "List account-scoped transformers"
        narrative: |
          The buyer sends a brief ("warm female Spanish-language voiceover") and
          their account. The agent returns matching transformers — each with a
          transformer_id to select in build_creative, output_format_ids, and the
          config params it exposes.
        task: list_transformers
        schema_ref: "creative/list-transformers-request.json"
        response_schema_ref: "creative/list-transformers-response.json"
        doc_ref: "/creative/task-reference/list_transformers"
        comply_scenario: creative_sync
        stateful: false
        expected: |
          Return transformers[] — each with transformer_id, name,
          output_format_ids, and params[] descriptors (field, type,
          value_source). Curate to the brief rather than dumping the full set.
        sample_request:
          brief: "warm female Spanish-language voiceover"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          context:
            correlation_id: "creative_transformers--list_transformers"
        context_outputs:
          - name: transformer_id
            path: "transformers[0].transformer_id"
        validations:
          - check: response_schema
            description: "Response matches list-transformers-response.json schema"
          - check: field_present
            path: "transformers"
            description: "Response contains a transformers array"
          - check: field_present
            path: "transformers[0].transformer_id"
            description: "Each transformer carries a stable transformer_id"
          - check: field_present
            path: "transformers[0].output_format_ids"
            description: "Each transformer declares the formats it produces"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--list_transformers"
            description: "Context correlation_id returned unchanged"

  - id: discover_transformer_options
    title: "Expand an enumerable param's values"
    narrative: |
      The default list_transformers response returns param SCHEMAS. To get the
      account-scoped VALUES of an enumerable param (e.g. the buyer's voices),
      the buyer names the field in expand_params — the agent returns the first
      page of option values on params[].options[], brief-filtered.
    steps:
      - id: list_transformers_expand
        title: "Expand the voice param's account-scoped values"
        narrative: |
          The buyer re-queries the selected transformer with
          expand_params: ["voice"]. The agent returns the voice option values
          available to this account (including any custom/cloned voices).
        task: list_transformers
        schema_ref: "creative/list-transformers-request.json"
        response_schema_ref: "creative/list-transformers-response.json"
        doc_ref: "/creative/task-reference/list_transformers"
        comply_scenario: creative_sync
        stateful: false
        expected: |
          Return the transformer with the voice param's options[] populated
          (value + optional label/metadata), brief-filtered.
        sample_request:
          transformer_ids:
            - "audiostack_voiceover"
          expand_params:
            - "voice"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          context:
            correlation_id: "creative_transformers--list_transformers_expand"
        validations:
          - check: response_schema
            description: "Response matches list-transformers-response.json schema"
          - check: field_present
            path: "transformers[0].params[0].field"
            description: "Param descriptors present (options[] populated only for the expanded enumerable field)"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--list_transformers_expand"
            description: "Context correlation_id returned unchanged"

  - id: build_with_transformer
    title: "Build with a transformer + config"
    narrative: |
      The buyer selects the discovered transformer and passes a typed config
      keyed by each param's field. The agent builds the creative using that
      transformer and returns a single-format manifest.
    steps:
      - id: build_transformer
        title: "Build a voiceover with a selected voice"
        narrative: |
          The buyer passes transformer_id, a config (voice / mastering_preset /
          speaking_rate), and a target format that is a subset of the
          transformer's output_format_ids. The agent returns a single creative
          manifest.
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: false
        expected: |
          Return a BuildCreativeSuccess: creative_manifest with a format_id
          matching the requested target, plus an optional build_variant_id so
          the build is itself refinable.
        sample_request:
          message: "Read this script in a warm tone."
          transformer_id: "audiostack_voiceover"
          config:
            voice: "isaac"
            mastering_preset: "podcast"
            speaking_rate: 1.1
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "audio_vo"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          idempotency_key: "$generate:uuid_v4#creative_transformers_build_with_transformer_build_transformer"
          context:
            correlation_id: "creative_transformers--build_transformer"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: field_present
            path: "creative_manifest.format_id"
            description: "Single-format success — manifest carries the target format_id"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--build_transformer"
            description: "Context correlation_id returned unchanged"

  - id: variant_fanout
    title: "Produce variants along an axis"
    narrative: |
      The buyer A/Bs two voices in one call: max_variants with a variant_axis
      fixing the values. The agent returns the variant shape — creatives[] is
      the produced creative group set, and variants[] is the choose-among set
      within each group, with one independently-tagged leaf per axis value.
      Each leaf is a real, independently-billed build; keep_mode is advisory.
    steps:
      - id: build_variants
        title: "Build two voice variants"
        narrative: |
          The buyer requests two variants along the voice axis (isaac, sara)
          with keep_mode keep_one. The agent returns creatives[0].variants[]
          with a build_variant_id per leaf and echoes keep_mode_applied.
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: false
        expected: |
          Return a BuildCreativeVariantSuccess: creatives[] with variants[],
          each leaf carrying a build_variant_id, plus keep_mode_applied echoing
          the request hint.
        sample_request:
          message: "A/B two voices for the same script."
          transformer_id: "audiostack_voiceover"
          max_variants: 2
          variant_axis:
            dimension: "voice"
            values:
              - "isaac"
              - "sara"
          keep_mode: "keep_one"
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "audio_vo"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          idempotency_key: "$generate:uuid_v4#creative_transformers_variant_fanout_build_variants"
          context:
            correlation_id: "creative_transformers--build_variants"
        context_outputs:
          - name: parent_build_variant_id
            path: "creatives[0].variants[0].build_variant_id"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: field_present
            path: "creatives[0].variants[0].build_variant_id"
            description: "Variant shape — each leaf carries a build_variant_id"
          - check: field_value
            path: "keep_mode_applied"
            value: "keep_one"
            description: "Agent echoes the advisory keep_mode hint it received"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--build_variants"
            description: "Context correlation_id returned unchanged"

  - id: refinement_lineage
    title: "Refine a produced variant"
    narrative: |
      The buyer refines one produced leaf: re-build from its build_variant_id
      with a natural-language instruction and a config delta. The agent returns
      a NEW lineage-linked variant whose parent_build_variant_id points back to
      the source leaf. Refinement is never a mutation — the parent is unchanged.
    steps:
      - id: refine_variant
        title: "Slow down the chosen variant"
        narrative: |
          The buyer passes refine_from_build_variant_id (the captured leaf) plus
          a config delta (speaking_rate). The transformer and target are
          inherited from the parent. The agent returns a new variant with
          parent_build_variant_id set.
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: true
        expected: |
          Return a BuildCreativeVariantSuccess whose leaf carries a new
          build_variant_id and a parent_build_variant_id linking back to the
          refined source leaf.
        sample_request:
          message: "Slow it down slightly."
          refine_from_build_variant_id: "$context.parent_build_variant_id"
          config:
            speaking_rate: 0.9
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          idempotency_key: "$generate:uuid_v4#creative_transformers_refinement_lineage_refine_variant"
          context:
            correlation_id: "creative_transformers--refine_variant"
        validations:
          - check: response_schema
            description: "Response matches build-creative-response.json schema"
          - check: field_present
            path: "creatives[0].variants[0].build_variant_id"
            description: "New lineage-linked leaf"
          - check: field_present
            path: "creatives[0].variants[0].parent_build_variant_id"
            description: "Lineage edge back to the refined parent leaf"
          - check: field_present
            path: "context"
            description: "Response echoes back the context object"
          - check: field_value
            path: "context.correlation_id"
            value: "creative_transformers--refine_variant"
            description: "Context correlation_id returned unchanged"

  - id: config_strict_rejection
    title: "Reject an out-of-range config value"
    narrative: |
      config drives a paid render, so the agent MUST validate it against the
      selected transformer's live params and reject out-of-range / unrecognized
      values with a field-attributed error — never silently ignore them. The
      wire schema leaves config open (legal keys are dynamic per transformer),
      so this rejection is a normative AGENT obligation, not schema validation:
      the payload is well-formed; the value is semantically illegal.
    steps:
      - id: reject_out_of_range_config
        title: "speaking_rate above the param's maximum is rejected"
        narrative: |
          The buyer sends speaking_rate 9.9 — a schema-valid number, but outside
          the transformer's declared range. The agent rejects with
          INVALID_REQUEST attributed to config.speaking_rate.
        task: build_creative
        schema_ref: "media-buy/build-creative-request.json"
        response_schema_ref: "media-buy/build-creative-response.json"
        doc_ref: "/creative/task-reference/build_creative"
        comply_scenario: creative_flow
        stateful: false
        expect_error: true
        negative_path: payload_well_formed
        expected: |
          Reject with INVALID_REQUEST — the payload is schema-valid (config is
          an open object) but speaking_rate is outside the transformer's range.
          error.field SHOULD identify config.speaking_rate.
        sample_request:
          message: "Read this script."
          transformer_id: "audiostack_voiceover"
          config:
            speaking_rate: 9.9
          target_format_id:
            agent_url: "https://your-agent.example.com"
            id: "audio_vo"
          account:
            brand:
              domain: "acmeoutdoor.example"
            operator: "pinnacle-agency.example"
          idempotency_key: "$generate:uuid_v4#creative_transformers_config_strict_rejection_reject_out_of_range_config"
          context:
            correlation_id: "creative_transformers--reject_out_of_range_config"
        validations:
          - check: error_code
            value: "INVALID_REQUEST"
            description: "Out-of-range config value is rejected, not silently applied"
