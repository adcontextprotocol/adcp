<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents - AgenticAdvertising.org</title>
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/design-system.css">
  <script src="/nav.js"></script>
  <script src="/dashboard-nav.js"></script>
  <style>
    body {
      background: var(--color-bg-page);
    }

    .hub-container {
      max-width: var(--container-xl);
      margin: 0 auto;
      padding: var(--space-8) var(--space-4);
    }

    /* Loading */
    .hub-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      gap: var(--space-3);
      color: var(--color-text-secondary);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-gray-200);
      border-top-color: var(--color-brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: var(--text-3xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      margin: 0;
    }

    .page-header-actions {
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    /* =========================================================================
       Agent Compliance
       ========================================================================= */
    .agent-compliance-card {
      padding: var(--space-4);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-3);
    }
    .agent-compliance-card:last-child { margin-bottom: 0; }

    .agent-compliance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .agent-hostname {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      font-size: var(--text-sm);
    }

    .agent-status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .agent-status-dot--passing { background: var(--color-success-500); }
    .agent-status-dot--degraded { background: var(--color-warning-500); }
    .agent-status-dot--failing { background: var(--color-error-500); }
    .agent-status-dot--unknown { background: var(--color-gray-400); }
    .agent-status-dot--error { background: var(--color-warning-500); }

    .agent-status-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .agent-streak {
      padding: 1px var(--space-2);
      background: var(--color-success-50);
      color: var(--color-success-700);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--font-semibold);
    }

    .agent-headline {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-2);
    }

    .agent-tracks {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-top: var(--space-2);
    }

    .agent-track {
      padding: 1px var(--space-2);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--font-semibold);
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .agent-track:hover { opacity: 0.8; }
    .agent-track.active { outline: 2px solid var(--color-primary-500); outline-offset: 1px; }

    .agent-track-detail {
      margin-top: var(--space-3);
      padding: var(--space-3);
      background: var(--color-gray-50);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
    }
    .agent-track-detail h4 { margin: 0 0 var(--space-2); font-size: var(--text-sm); }
    .track-scenario { padding: var(--space-1) 0; border-bottom: 1px solid var(--color-gray-200); }
    .track-scenario:last-child { border-bottom: none; }
    .track-scenario-name { font-weight: var(--font-semibold); }
    .track-scenario--pass .track-scenario-name::before { content: '\2713 '; color: var(--color-success-600); }
    .track-scenario--fail .track-scenario-name::before { content: '\2717 '; color: var(--color-error-600); }
    .track-scenario-steps { margin-top: var(--space-1); padding-left: var(--space-4); color: var(--color-text-muted); }
    .track-step--fail { color: var(--color-error-600); }

    .agent-history-btn {
      background: none;
      border: none;
      color: var(--color-primary-600);
      font-size: var(--text-xs);
      cursor: pointer;
      padding: 0;
    }
    .agent-history-btn:hover { text-decoration: underline; }

    .agent-history-panel {
      margin-top: var(--space-3);
      font-size: var(--text-xs);
    }
    .history-run {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-gray-200);
      cursor: pointer;
    }
    .history-run:last-child { border-bottom: none; }
    .history-run:hover { background: var(--color-gray-50); }
    .history-run-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-run-detail { display: none; padding: var(--space-2) var(--space-4); font-size: var(--text-xs); color: var(--color-text-muted); }
    .agent-track--pass { background: var(--color-success-100); color: var(--color-success-700); }
    .agent-track--fail { background: var(--color-error-100); color: var(--color-error-700); }
    .agent-track--partial { background: var(--color-warning-100); color: var(--color-warning-700); }
    .agent-track--skip { background: var(--color-gray-100); color: var(--color-gray-600); }

    .agent-sparkline {
      display: flex;
      gap: 2px;
      margin-top: var(--space-2);
      height: 16px;
      align-items: flex-end;
    }

    .agent-sparkline-bar {
      flex: 1;
      min-width: 4px;
      max-width: 16px;
      height: 100%;
      border-radius: 2px;
    }

    .agent-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-2);
    }
    .agent-action-link {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      color: var(--color-primary-600);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;

    .agent-action-link:hover {
      text-decoration: underline;
    }
    .agent-auth-section {
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: var(--border-1) solid var(--color-border);
    }
    .agent-auth-status {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .agent-connect-form {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: flex-end;
      padding: var(--space-3) 0;
    }
    .agent-connect-form label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }
    .agent-connect-form input,
    .agent-connect-form select {
      font-size: var(--text-sm);
      padding: var(--space-1) var(--space-2);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg-card);
    }
    .agent-connect-form input { min-width: 260px; }
    .agent-connect-save,
    .agent-oauth-start,
    .agent-cc-save,
    .agent-cc-test-now {
      background: var(--color-primary-600);
      color: white;
      border: none;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      cursor: pointer;
    }
    .agent-connect-save:hover,
    .agent-oauth-start:hover,
    .agent-cc-save:hover,
    .agent-cc-test-now:hover { background: var(--color-primary-700); }
    .agent-connect-save:disabled,
    .agent-oauth-start:disabled,
    .agent-cc-save:disabled,
    .agent-cc-test-now:disabled { opacity: 0.6; cursor: not-allowed; }
    .agent-oauth-start { align-self: flex-end; }
    .agent-connect-msg {
      font-size: var(--text-xs);
      margin-top: var(--space-1);
    }
    .agent-cc-field-error {
      outline: 2px solid var(--color-error-500, #ef4444);
      outline-offset: 1px;
    }

    .agent-lifecycle-select {
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      cursor: pointer;

    .agent-toggle {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      cursor: pointer;
      font-size: var(--text-xs);
      color: var(--color-text-secondary);

    .agent-toggle input { cursor: pointer; }
    .agent-toggle-label { user-select: none; }

       Storyboards
       ========================================================================= */

      background: var(--color-primary-600);
      color: white;
      border: none;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      cursor: pointer;

    .agent-storyboard-btn:hover { background: var(--color-primary-700); }

    .agent-storyboard-panel {
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-3);
      padding-top: var(--space-3);
    }

    .storyboard-picker {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .storyboard-picker-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s;

    .storyboard-picker-item:hover { border-color: var(--color-primary-500); }

    .storyboard-picker-title { font-weight: 600; font-size: var(--text-sm); }
    .storyboard-picker-summary { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: 2px; }

      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-3);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--color-border);
    }
    .storyboard-map-tools code {
      background: var(--color-gray-100);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: var(--text-xs);
    }
    .storyboard-track-group { margin-bottom: var(--space-4); }
    .storyboard-track-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      margin-bottom: var(--space-2);
      color: var(--color-text-primary);
    }
    .storyboard-track-count {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      font-weight: normal;
    }
    .storyboard-map-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-1);

    .storyboard-map-item-title { font-size: var(--text-sm); font-weight: 500; }
    .storyboard-map-item-meta { font-size: var(--text-xs); color: var(--color-text-tertiary); }
    .storyboard-map-actions { display: flex; gap: var(--space-2); align-items: center; }
    .storyboard-map-actions button {
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
    }
    .storyboard-map-actions button:hover { border-color: var(--color-primary-500); color: var(--color-primary-600); }
    .storyboard-map-actions .btn-run {
      background: var(--color-primary-600);
      color: white;
      border-color: var(--color-primary-600);
    }
    .storyboard-map-actions .btn-run:hover { background: var(--color-primary-700); }

    .step-runner { margin-top: var(--space-3); }
    .step-runner-current {
      padding: var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
    }
    .step-runner-current h4 { font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-1); }
    .step-runner-current .step-narrative { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: var(--space-2); }
    .step-runner-result {
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      margin-top: var(--space-2);
    }
    .step-runner-result--pass { background: var(--color-success-50, #ecfdf5); border: 1px solid var(--color-success-200, #a7f3d0); }
    .step-runner-result--fail { background: var(--color-error-50, #fef2f2); border: 1px solid var(--color-error-200, #fecaca); }
    .step-runner-result--skip { background: var(--color-gray-50, #f9fafb); border: 1px solid var(--color-gray-200, #e5e7eb); }
    .step-runner-actions { display: flex; gap: var(--space-2); margin-top: var(--space-2); }
    .step-runner-actions button {
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
    }
    .step-run-btn { background: var(--color-primary-600); color: white; }
    .step-run-btn:hover { background: var(--color-primary-700); }
    .step-run-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .step-next-btn { background: var(--color-gray-200); color: var(--color-text-primary); }
    .step-next-btn:hover { background: var(--color-gray-300); }

    .storyboard-phase {
      margin-bottom: var(--space-4);
    }

    .storyboard-phase-title {
      font-weight: 600;
      font-size: var(--text-sm);
      margin-bottom: var(--space-2);
      color: var(--color-text-primary);
    }

    .storyboard-phase-narrative {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3);
      line-height: 1.5;
    }

    .storyboard-step {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .storyboard-step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-2);
    }

    .storyboard-step-title { font-weight: 500; font-size: var(--text-sm); }

    .storyboard-step-result {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;

    .storyboard-step-result--pass { background: var(--color-success-100); color: var(--color-success-700); }
    .storyboard-step-result--fail { background: var(--color-error-100); color: var(--color-error-700); }
    .storyboard-step-result--pending { background: var(--color-warning-100); color: var(--color-warning-700); }

    .storyboard-step-narrative {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: 1.5;
      margin-bottom: var(--space-2);
    }

    .storyboard-step-meta {
      display: flex;
      gap: var(--space-3);
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
    }

    .storyboard-step-meta a { color: var(--color-primary-600); text-decoration: none; }
    .storyboard-step-meta a:hover { text-decoration: underline; }

    .storyboard-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .storyboard-run-btn {
      background: var(--color-primary-600);
      color: white;
      border: none;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      cursor: pointer;
    }
    .storyboard-run-btn:hover { background: var(--color-primary-700); }
    .storyboard-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .storyboard-compare-btn {
      background: transparent;
      color: var(--color-primary-600);
      border: 1px solid var(--color-primary-600);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      cursor: pointer;
    }
    .storyboard-compare-btn:hover { background: var(--color-primary-50); }
    .storyboard-compare-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .storyboard-progress {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      padding: var(--space-3) 0;
    }

    .storyboard-back-btn {
      background: none;
      border: none;
      color: var(--color-primary-600);
      font-size: var(--text-sm);
      cursor: pointer;
      padding: 0;
      margin-bottom: var(--space-3);
    }
    .storyboard-back-btn:hover { text-decoration: underline; }
  </style>

<body>
  <!-- AAO top navigation -->
  <div id="adcp-nav"></div>

  <div class="hub-container">
    <div id="hub-loading" class="hub-loading">
      <div class="spinner"></div>
      <p>Loading agents...</p>
    </div>

    <div id="hub-content" style="display: none;"></div>
  </div>

  <div id="adcp-footer"></div>

  <script>
    const config = window.__APP_CONFIG__ || {};
    if (!config.user) {
      window.location.href = '/auth/login?return_to=/dashboard/agents';
    }

    document.addEventListener('DOMContentLoaded', loadAgents);

    // Shared across the page so event handlers (e.g. retry) can re-render
    // a single card without a full reload.
    const pageState = { agents: [], complianceMap: new Map(), orgId: null };

    // Retry-aware fetch. Retries once on 429 (rate-limited) and transient
    // network failures, honoring Retry-After when present. Rate-limit hits
    // are common when the dashboard fans out 3 requests per agent on reload
    // — without retry, agents silently collapse to "not yet checked".
    // Retry-After is capped: bulkResolveRateLimiter's 60s window can ask us
    // to wait nearly a minute, which hangs the whole page behind one agent.
    // If the server wants longer than MAX_RETRY_WAIT_MS, surface the 429 to
    // the caller so the per-agent "Rate-limited — Retry" card renders.
    const MAX_RETRY_WAIT_MS = 3000;
    async function fetchWithRetry(url, opts, { retries = 1, baseDelayMs = 800 } = {}) {
      let lastErr;
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const res = await fetch(url, opts);
          if (res.status === 429 && attempt < retries) {
            const retryAfter = parseInt(res.headers.get('retry-after') || '', 10);
            if (Number.isFinite(retryAfter) && retryAfter * 1000 > MAX_RETRY_WAIT_MS) {
              return res;
            }
            const wait = Number.isFinite(retryAfter) ? retryAfter * 1000 : baseDelayMs;
            await new Promise(r => setTimeout(r, wait));
            continue;
          }
          return res;
        } catch (err) {
          lastErr = err;
          if (attempt >= retries) break;
          await new Promise(r => setTimeout(r, baseDelayMs));
        }
      }
      throw lastErr ?? new Error('fetch failed');
    }

    // Fetches compliance + history + auth for a single agent. Always returns
    // an object — on failure, loadError is populated so the renderer can
    // distinguish "server says unknown" from "we couldn't load".
    async function fetchAgentState(agent) {
      const encoded = encodeURIComponent(agent.url);
      const endpoints = [
        `/api/registry/agents/${encoded}/compliance`,
        `/api/registry/agents/${encoded}/compliance/history?limit=10`,
        `/api/registry/agents/${encoded}/auth-status`,
      ];
      const settled = await Promise.allSettled(
        endpoints.map(u => fetchWithRetry(u, { credentials: 'include' })),
      );

      const parseOrError = async (s, source) => {
        if (s.status === 'rejected') {
          return { data: null, error: { source, code: 0, message: String(s.reason?.message || s.reason || 'network') } };
        }
        const res = s.value;
        if (!res.ok) {
          return { data: null, error: { source, code: res.status, message: res.statusText || `HTTP ${res.status}` } };
        }
        try {
          return { data: await res.json(), error: null };
        } catch (err) {
          return { data: null, error: { source, code: res.status, message: String(err?.message || 'parse') } };
        }
      };

      const [statusResult, historyResult, authResult] = await Promise.all([
        parseOrError(settled[0], 'compliance'),
        parseOrError(settled[1], 'history'),
        parseOrError(settled[2], 'auth'),
      ]);

      // Only the compliance endpoint determines the primary card state.
      // History and auth errors are logged but don't block rendering.
      return {
        url: agent.url,
        status: statusResult.data,
        history: historyResult.data,
        authStatus: authResult.data,
        loadError: statusResult.error,
      };
    }

    async function loadAgents() {
      try {
        const meRes = await fetch('/api/me', { credentials: 'include' });
        if (!meRes.ok) {
          if (meRes.status === 401) {
            window.location.href = '/auth/login?return_to=/dashboard/agents';
            return;
          }
          throw new Error('Failed to load user data');
        }
        const meData = await meRes.json();
        const orgs = meData?.organizations || [];
        let { org: currentOrg } = DashboardNav.resolveOrg(orgs);
        if (!currentOrg && orgs.length > 0) {
          currentOrg = orgs.find(o => !o.is_personal) || orgs[0];
        }

        const orgParam = currentOrg?.id ? `?org=${encodeURIComponent(currentOrg.id)}` : '';
        const profileRes = await fetch(`/api/me/member-profile${orgParam}`, { credentials: 'include' });

        if (!profileRes.ok) {
          if (profileRes.status === 401) {
            window.location.href = '/auth/login?return_to=/dashboard/agents';
            return;
          }
          if (profileRes.status === 404 || profileRes.status === 403) {
            document.getElementById('hub-loading').innerHTML =
              '<p style="color:var(--color-text-secondary)">Your account is not yet associated with a member organization. ' +
              '<a href="/membership">Learn about membership</a>.</p>';
            return;
          }
          throw new Error('Failed to load profile data');
        }

        const profileData = await profileRes.json();

        const hasPersonalWorkspace = orgs.some(o => o.is_personal);
        const showSwitcher = orgs.length > 1 || !hasPersonalWorkspace;
        DashboardNav.init({
          showOrgSwitcher: showSwitcher,
          currentOrgName: currentOrg?.name || profileData?.profile?.organization_name || 'My organization',
          showAdmin: meData?.user?.isAdmin || false,
          orgId: currentOrg?.id || null,
          orgRole: currentOrg?.role || 'member',
          isPersonal: currentOrg?.is_personal || false,
        });

        if (showSwitcher) {
          DashboardNav.setOrgOptions(orgs, currentOrg?.id, (newOrgId) => {
            localStorage.setItem('selectedOrgId', newOrgId);
            const url = new URL(window.location);
            url.searchParams.set('org', newOrgId);
            window.location.href = url.toString();
          });
        }

        // Fetch compliance data for org's agents. A hard 15s ceiling guards
        // against any single fetch hanging the entire page — unresolved agents
        // fall through to the per-card "not yet checked" / error state, and
        // the user can still interact with the page.
        const agentCompliance = new Map();
        const agents = profileData?.profile?.agents || [];
        if (agents.length > 0) {
          const allSettled = Promise.allSettled(agents.map(fetchAgentState));
          const timeout = new Promise(resolve => setTimeout(() => resolve(null), 15000));
          const results = await Promise.race([allSettled, timeout]);
          if (Array.isArray(results)) {
            for (const r of results) {
              if (r.status === 'fulfilled') {
                agentCompliance.set(r.value.url, r.value);
              } else {
                console.error('Agent compliance fetch rejected:', r.reason);
              }
            }
          } else {
            console.warn('Agent compliance fetch timed out after 15s; rendering with partial data');
          }
        }

        const currentOrgId = currentOrg?.id || null;
        pageState.agents = agents;
        pageState.complianceMap = agentCompliance;
        pageState.orgId = currentOrgId;
        renderPage(agents, agentCompliance, currentOrgId);
      } catch (err) {
        console.error('Agents page load error:', err);
        document.getElementById('hub-loading').innerHTML =
          '<p>Failed to load. <a href="/dashboard/agents">Try again</a></p>';
      }
    }

    function renderPage(agents, complianceMap, orgId) {
      document.getElementById('hub-loading').style.display = 'none';
      const content = document.getElementById('hub-content');
      content.style.display = 'block';

      const addPrompt = encodeURIComponent('I want to add an agent for compliance monitoring.');

      content.innerHTML = `
        <div class="page-header">
          <h1>Agents</h1>
          <div class="page-header-actions">
            <a href="/chat?prompt=${addPrompt}" class="btn btn-primary btn-sm">+ Add agent</a>
          </div>
        </div>
        <div id="agents-list">
          ${renderAgentsSection(agents, complianceMap, orgId)}
        </div>
      `;
    }

    function buildConnectForm(escapedUrl, agentContextId) {
      const contextIdAttr = agentContextId ? ' data-agent-context-id="' + agentContextId + '"' : '';
      return '<div class="agent-connect-form" data-agent-url="' + escapedUrl + '"' + contextIdAttr + '>' +
        '<label>Auth type<select name="auth_type" class="auth-type-select">' +
          '<option value="oauth">OAuth (recommended)</option>' +
          '<option value="oauth_client_credentials">OAuth client credentials (machine-to-machine)</option>' +
          '<option value="bearer">Bearer token</option>' +
          '<option value="basic">Basic auth</option>' +
        '</select></label>' +
        '<div class="auth-token-fields" style="display:none;">' +
          '<label>Auth token<input type="password" name="auth_token" placeholder="Bearer token or API key" autocomplete="off"></label>' +
          '<button class="agent-connect-save">Save</button>' +
        '</div>' +
        '<div class="auth-oauth-fields">' +
          '<p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin:var(--space-2) 0;">Securely authorize via the agent\'s OAuth flow. No tokens to copy.</p>' +
          '<button class="agent-oauth-start">Authorize</button>' +
        '</div>' +
        '<div class="auth-cc-fields" style="display:none;">' +
          '<p style="font-size:var(--text-sm);color:var(--color-text-secondary);margin:var(--space-2) 0;">' +
            'Server-to-server OAuth (RFC 6749 §4.4). The SDK exchanges at the token endpoint before each call and refreshes on 401. ' +
            'For secrets wired through environment variables, use <code>$ENV:ADCP_OAUTH_&lt;NAME&gt;</code> references. ' +
            'The <code>ADCP_OAUTH_</code> prefix is required — other env-var names are rejected server-side so a misconfigured agent can\'t read unrelated secrets.' +
          '</p>' +
          '<label>Token endpoint<input type="url" name="cc_token_endpoint" placeholder="https://auth.example.com/oauth/token" autocomplete="off" required></label>' +
          '<p style="font-size:var(--text-xs);color:var(--color-text-secondary);margin:calc(-1 * var(--space-2)) 0 var(--space-2) 0;">' +
            'Auth0: <code>https://{tenant}.auth0.com/oauth/token</code> · Okta: <code>https://{org}.okta.com/oauth2/default/v1/token</code> · Azure AD: <code>https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token</code> · Keycloak: <code>https://{host}/realms/{realm}/protocol/openid-connect/token</code>' +
          '</p>' +
          '<label>Client ID<input type="text" name="cc_client_id" placeholder="client_abc or $ENV:ADCP_OAUTH_CLIENT_ID" autocomplete="off" required></label>' +
          '<label>Client secret<input type="password" name="cc_client_secret" placeholder="literal secret or $ENV:ADCP_OAUTH_CLIENT_SECRET" autocomplete="off" required></label>' +
          '<label>Scope <span style="color:var(--color-text-secondary);">(optional)</span><input type="text" name="cc_scope" placeholder="adcp" autocomplete="off"></label>' +
          '<label>Resource <span style="color:var(--color-text-secondary);">(optional, RFC 8707)</span><input type="text" name="cc_resource" placeholder="https://agent.example.com" autocomplete="off"></label>' +
          '<p style="font-size:var(--text-xs);color:var(--color-text-secondary);margin:calc(-1 * var(--space-2)) 0 var(--space-2) 0;">The agent URL the token is for. Okta and Keycloak typically use <code>resource</code>.</p>' +
          '<label>Audience <span style="color:var(--color-text-secondary);">(optional)</span><input type="text" name="cc_audience" placeholder="https://agent.example.com" autocomplete="off"></label>' +
          '<p style="font-size:var(--text-xs);color:var(--color-text-secondary);margin:calc(-1 * var(--space-2)) 0 var(--space-2) 0;">Auth0\'s name for the same thing (the <code>aud</code> claim). Use either <code>resource</code> OR <code>audience</code> — not both unless your IdP asks for it.</p>' +
          '<label>Auth method<select name="cc_auth_method">' +
            '<option value="">Basic (default — HTTP Basic header)</option>' +
            '<option value="basic">Basic (HTTP Basic header)</option>' +
            '<option value="body">Body (client_id/client_secret as form fields)</option>' +
          '</select></label>' +
          '<button class="agent-cc-save">Save credentials</button>' +
        '</div>' +
      '</div>';
    }

    function renderAgentsSection(agents, complianceMap, orgId) {
      if (!agents || agents.length === 0) {
        return `
          <div style="text-align: center; padding: var(--space-8) var(--space-6);">
            <div style="font-size: var(--text-2xl); margin-bottom: var(--space-3);">🤖</div>
            <p style="font-weight: var(--font-medium); color: var(--color-text-heading); margin-bottom: var(--space-2);">Monitor your agents' protocol compliance</p>
            <p style="font-size: var(--text-sm); color: var(--color-text-secondary); max-width: 400px; margin: 0 auto var(--space-4);">Register your buyer or seller agents to get automated compliance checks, public trust badges, and storyboard testing — included with your membership.</p>
            <a href="/chat?prompt=${encodeURIComponent('I want to add an agent for compliance monitoring.')}" class="btn btn-primary btn-sm">Register your first agent</a>
          </div>
        `;
      }

      return agents.map(agent => {
        const data = complianceMap?.get(agent.url);
        const cs = data?.status;
        const history = data?.history;
        const hostname = (() => {
          try {
            const u = new URL(agent.url);
            return u.hostname + u.pathname + u.search + u.hash;
          } catch {
            return agent.url;
          }
        })();
        const authInfo = data?.authStatus;
        const loadError = data?.loadError;
        const hasData = cs && cs.status && cs.status !== 'unknown';
        const hasAuth = authInfo?.has_auth;

        const cardId = 'agent-' + encodeURIComponent(agent.url).replace(/%/g, '_');

        if (loadError) {
          const isRateLimited = loadError.code === 429;
          const errMsg = isRateLimited
            ? 'Rate-limited — too many requests. Retry in a moment.'
            : 'Couldn\'t load compliance data. The service may be temporarily unavailable.';
          return `
          <div class="agent-compliance-card" id="${cardId}">
            <div class="agent-compliance-header">
              <div style="display: flex; align-items: center; gap: var(--space-2); min-width: 0;">
                <span class="agent-status-dot agent-status-dot--error"></span>
                <span class="agent-hostname">${escapeHtml(hostname)}</span>
                <span class="agent-status-label" style="color: var(--color-warning-700, var(--color-text-secondary));">couldn't load</span>
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;">
                <button class="agent-reload-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}">Retry</button>
              </div>
            </div>
            <div style="padding: var(--space-3) 0; color: var(--color-text-secondary); font-size: var(--text-sm);">
              ${escapeHtml(errMsg)}
            </div>
          </div>`;
        }

        if (!hasData) {
          return `
          <div class="agent-compliance-card" id="${cardId}">
            <div class="agent-compliance-header">
              <div style="display: flex; align-items: center; gap: var(--space-2); min-width: 0;">
                <span class="agent-status-dot agent-status-dot--unknown"></span>
                <span class="agent-hostname">${escapeHtml(hostname)}</span>
                <span class="agent-status-label" style="color: var(--color-text-secondary);">not yet checked</span>
              </div>
            </div>
            ${hasAuth
              ? '<div style="padding: var(--space-4) 0; color: var(--color-text-secondary); font-size: var(--text-sm);">Auth configured' + (authInfo?.auth_type === 'oauth' ? ' via OAuth' : authInfo?.auth_type === 'oauth_client_credentials' ? ' via OAuth client credentials' : '') + '. Compliance check will run on the next heartbeat cycle.</div>'
              : buildConnectForm(escapeHtml(agent.url), authInfo?.agent_context_id)}
            <div class="agent-meta-row">
              <span></span>
              <button class="agent-storyboard-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}">Test your agent</button>
            </div>
            <div class="agent-storyboard-panel" id="${cardId}-storyboard" style="display:none;"></div>
          </div>`;
        }

        const statusClass = cs.status;
        const statusLabel = cs.status;
        const tracks = cs.tracks || {};

        const clickableTrackPills = Object.entries(tracks)
          .filter(([, status]) => status !== 'skip' && status !== 'expected')
          .map(([track, status]) => {
          const cls = status === 'pass' ? 'agent-track--pass'
            : status === 'fail' ? 'agent-track--fail'
            : status === 'partial' ? 'agent-track--partial'
            : 'agent-track--skip';
          return '<button class="agent-track ' + cls + '" data-track="' + escapeHtml(track) + '" data-agent-url="' + escapeHtml(agent.url) + '">' + escapeHtml(track) + '</button>';
        }).join('');

        const runs = history?.runs || [];
        const sparkline = runs.length > 0 ? '<div class="agent-sparkline">' +
          runs.slice().reverse().map(r => {
            const color = r.overall_status === 'passing' ? 'var(--color-success-500)'
              : r.overall_status === 'failing' ? 'var(--color-error-500)'
              : 'var(--color-warning-500)';
            return '<div class="agent-sparkline-bar" style="background:' + color + ';" title="' + escapeHtml(r.overall_status) + ' — ' + new Date(r.tested_at).toLocaleDateString() + '"></div>';
          }).join('') + '</div>' : '';

        const lastChecked = cs.last_checked_at
          ? timeAgo(new Date(cs.last_checked_at))
          : 'never';

        const isPublic = !(cs.compliance_opt_out ?? false);

        return `
          <div class="agent-compliance-card" id="${cardId}">
            <div class="agent-compliance-header">
              <div style="display: flex; align-items: center; gap: var(--space-2); min-width: 0;">
                <span class="agent-status-dot agent-status-dot--${escapeHtml(statusClass)}"></span>
                <span class="agent-hostname">${escapeHtml(hostname)}</span>
                <span class="agent-status-label">${escapeHtml(statusLabel)}</span>
                ${cs.streak_days > 0 ? '<span class="agent-streak">' + parseInt(cs.streak_days, 10) + 'd streak</span>' : ''}
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0;">
                <label class="agent-toggle" title="Show compliance on public registry">
                  <input type="checkbox" class="registry-visibility-toggle" ${isPublic ? 'checked' : ''} data-agent-url="${escapeHtml(agent.url)}">
                  <span class="agent-toggle-label">Show on registry</span>
                </label>
              </div>
            </div>
            ${cs.headline ? '<div class="agent-headline">' + escapeHtml(cs.headline) + '</div>' : ''}
            ${clickableTrackPills ? '<div class="agent-tracks">' + clickableTrackPills + '</div>' : ''}
            <div class="agent-track-detail" id="${cardId}-track-detail" style="display:none;"></div>
            ${sparkline}
            <div class="agent-monitoring-controls" style="display: flex; align-items: center; gap: var(--space-3); padding: var(--space-2) 0; border-top: 1px solid var(--border-subtle); margin-top: var(--space-3);">
              <label class="agent-toggle" title="Pause automated compliance and health checks">
                <input type="checkbox" class="monitoring-pause-toggle" data-agent-url="${escapeHtml(agent.url)}" ${cs.monitoring_paused ? 'checked' : ''}>
                <span class="agent-toggle-label">Pause automated checks</span>
              </label>
              <label style="display: flex; align-items: center; gap: var(--space-1); font-size: var(--text-sm); color: var(--text-secondary);">
                Check every
                <select class="monitoring-interval-select" data-agent-url="${escapeHtml(agent.url)}" ${cs.monitoring_paused ? 'disabled' : ''} style="font-size: var(--text-sm); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm, 4px); border: 1px solid var(--border-subtle);${cs.monitoring_paused ? ' opacity: 0.4;' : ''}">
                  <option value="6" ${(cs.check_interval_hours || 12) === 6 ? 'selected' : ''}>6h</option>
                  <option value="12" ${(cs.check_interval_hours || 12) === 12 ? 'selected' : ''}>12h</option>
                  <option value="24" ${(cs.check_interval_hours || 12) === 24 ? 'selected' : ''}>24h</option>
                  <option value="48" ${(cs.check_interval_hours || 12) === 48 ? 'selected' : ''}>48h</option>
                  <option value="72" ${(cs.check_interval_hours || 12) === 72 ? 'selected' : ''}>72h</option>
                  <option value="168" ${(cs.check_interval_hours || 12) === 168 ? 'selected' : ''}>Weekly</option>
                </select>
              </label>
              ${cs.monitoring_paused ? '<span style="font-size: var(--text-xs); color: var(--color-warning-700, #b45309);">Compliance status will not update while paused</span>' : ''}
            </div>
            <div class="agent-meta-row">
              <span>Last checked: ${escapeHtml(lastChecked)}</span>
              <div style="display: flex; gap: var(--space-3); align-items: center;">
                <button class="agent-connect-toggle agent-action-link" data-card-id="${cardId}" data-agent-url="${escapeHtml(agent.url)}">${hasAuth ? 'Update auth' : 'Connect agent'}</button>
                <button class="agent-storyboard-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}" data-agent-tracks="${escapeHtml(JSON.stringify(tracks))}">Test your agent</button>
                <button class="agent-history-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}">View history</button>
                <button class="agent-requests-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}">View requests</button>
              </div>
            </div>
            <div id="${cardId}-connect" style="display:none;border-top:1px solid var(--color-border);margin-top:var(--space-3);padding-top:var(--space-3);">
              ${buildConnectForm(escapeHtml(agent.url), authInfo?.agent_context_id)}
            </div>
            <div class="agent-storyboard-panel" id="${cardId}-storyboard" style="display:none;"></div>
            <div class="agent-history-panel" id="${cardId}-history" style="display:none;"></div>
            <div class="agent-requests-panel" id="${cardId}-requests" style="display:none;"></div>
          </div>
        `;
      }).join('');
    }

    function timeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    // Registry visibility toggle
    document.addEventListener('change', async function(e) {
      const checkbox = e.target.closest('.registry-visibility-toggle');
      if (checkbox) {
        const agentUrl = checkbox.dataset.agentUrl;
        try {
          const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/compliance/opt-out`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ opt_out: !checkbox.checked }),
          });
          if (!res.ok) {
            checkbox.checked = !checkbox.checked;
          }
        } catch {
          checkbox.checked = !checkbox.checked;
        }
      }
    });

    // Retry a single agent's compliance fetch after a load error.
    document.addEventListener('click', async function(e) {
      const retryBtn = e.target.closest('.agent-reload-btn');
      if (!retryBtn) return;
      const agentUrl = retryBtn.dataset.agentUrl;
      const cardId = retryBtn.dataset.cardId;
      if (!agentUrl || !cardId) return;
      const card = document.getElementById(cardId);
      if (!card) return;

      retryBtn.disabled = true;
      retryBtn.textContent = 'Retrying...';
      try {
        const state = await fetchAgentState({ url: agentUrl });
        pageState.complianceMap.set(agentUrl, state);
        const agent = pageState.agents.find(a => a.url === agentUrl) || { url: agentUrl };
        const newHtml = renderAgentsSection([agent], pageState.complianceMap, pageState.orgId);
        const wrapper = document.createElement('div');
        wrapper.innerHTML = newHtml.trim();
        const newCard = wrapper.firstElementChild;
        if (newCard) card.replaceWith(newCard);
      } catch (err) {
        console.error('Retry failed:', err);
        retryBtn.disabled = false;
        retryBtn.textContent = 'Retry';
      }
    });

    // Connect agent toggle
    document.addEventListener('click', function(e) {
      const toggle = e.target.closest('.agent-connect-toggle');
      if (!toggle) return;
      const cardId = toggle.dataset.cardId;
      const panel = document.getElementById(cardId + '-connect');
      if (panel) {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }
    });

    // Connect agent save
    document.addEventListener('click', async function(e) {
      const saveBtn = e.target.closest('.agent-connect-save');
      if (!saveBtn) return;
      const form = saveBtn.closest('.agent-connect-form');
      if (!form) return;

      const agentUrl = form.dataset.agentUrl;
      const authToken = form.querySelector('[name="auth_token"]').value.trim();
      const authType = form.querySelector('[name="auth_type"]').value;

      if (!authToken) {
        form.querySelector('[name="auth_token"]').focus();
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const body = { auth_token: authToken, auth_type: authType };

        const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/connect', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Failed to connect');
        }

        // Replace the form with a success message and reload after a moment
        form.innerHTML = '<div class="agent-connect-msg" style="color:var(--color-success-600);">Connected. Compliance check will run on the next heartbeat cycle.</div>';
        setTimeout(() => location.reload(), 1500);
      } catch (err) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
        let msg = form.querySelector('.agent-connect-msg');
        if (!msg) {
          msg = document.createElement('div');
          msg.className = 'agent-connect-msg';
          form.appendChild(msg);
        }
        msg.style.color = 'var(--color-error-600)';
        msg.textContent = err.message;
      }
    });

    // Auth type toggle — show exactly one of the three field groups.
    document.addEventListener('change', function(e) {
      const select = e.target.closest('.auth-type-select');
      if (!select) return;
      const form = select.closest('.agent-connect-form');
      if (!form) return;
      const tokenFields = form.querySelector('.auth-token-fields');
      const oauthFields = form.querySelector('.auth-oauth-fields');
      const ccFields = form.querySelector('.auth-cc-fields');
      tokenFields.style.display = select.value === 'bearer' || select.value === 'basic' ? '' : 'none';
      oauthFields.style.display = select.value === 'oauth' ? '' : 'none';
      ccFields.style.display = select.value === 'oauth_client_credentials' ? '' : 'none';
    });

    // OAuth client-credentials save handler (PUT /oauth-client-credentials).
    // Parallel to the bearer/basic "Save" handler, different endpoint.
    document.addEventListener('click', async function(e) {
      const saveBtn = e.target.closest('.agent-cc-save');
      if (!saveBtn) return;
      const form = saveBtn.closest('.agent-connect-form');
      if (!form) return;

      const agentUrl = form.dataset.agentUrl;
      const tokenEndpoint = form.querySelector('[name="cc_token_endpoint"]').value.trim();
      const clientId = form.querySelector('[name="cc_client_id"]').value.trim();
      const clientSecret = form.querySelector('[name="cc_client_secret"]').value;
      const scope = form.querySelector('[name="cc_scope"]').value.trim();
      const resource = form.querySelector('[name="cc_resource"]').value.trim();
      const audience = form.querySelector('[name="cc_audience"]').value.trim();
      const authMethod = form.querySelector('[name="cc_auth_method"]').value;

      if (!tokenEndpoint) { form.querySelector('[name="cc_token_endpoint"]').focus(); return; }
      if (!clientId) { form.querySelector('[name="cc_client_id"]').focus(); return; }
      if (!clientSecret) { form.querySelector('[name="cc_client_secret"]').focus(); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const body = { token_endpoint: tokenEndpoint, client_id: clientId, client_secret: clientSecret };
        if (scope) body.scope = scope;
        if (resource) body.resource = resource;
        if (audience) body.audience = audience;
        if (authMethod) body.auth_method = authMethod;

        const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/oauth-client-credentials', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          // Structured 400 from parseOAuthClientCredentialsInput: code + field
          // drive a friendly message and an outlined-and-scrolled input.
          // Other failure statuses (401/403/500) fall back to data.error.
          if (res.status === 400 && data.code) {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save credentials';
            ccSaveHighlightField(form, data.field);
            let msg = form.querySelector('.agent-connect-msg');
            if (!msg) {
              msg = document.createElement('div');
              msg.className = 'agent-connect-msg';
              form.appendChild(msg);
            }
            msg.style.color = 'var(--color-error-600)';
            msg.textContent = ccSaveFriendlyMessage(data.code, data.field, data.error);
            return;
          }
          throw new Error(data.error || 'Failed to save credentials');
        }

        // Clear any lingering field highlights on success — the form is
        // about to be replaced, but this keeps the DOM state clean for any
        // mid-flight handler that inspects it before the innerHTML swap.
        ccSaveHighlightField(form, null);

        // Replace the form with a save-confirmation + a "Test now" button.
        // The test endpoint exchanges at the AS and discards the token, so
        // the operator gets same-second confirmation instead of waiting for
        // the next compliance heartbeat. See #2809.
        //
        // Button has no data-agent-url of its own — the handler reads from
        // the parent form's already-escaped dataset. Prevents any chance of
        // attribute-breakout if a future caller passes an un-escaped URL.
        form.innerHTML =
          '<div class="agent-connect-msg" style="color:var(--color-success-600);">Credentials saved.</div>' +
          '<div style="display:flex;gap:var(--space-2);align-items:center;margin-top:var(--space-2);">' +
            '<button class="agent-cc-test-now">Test now</button>' +
            '<span style="font-size:var(--text-sm);color:var(--color-text-secondary);">Exchanges a token at the AS and discards it.</span>' +
          '</div>' +
          '<div class="agent-cc-test-result" style="margin-top:var(--space-2);"></div>';
      } catch (err) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save credentials';
        let msg = form.querySelector('.agent-connect-msg');
        if (!msg) {
          msg = document.createElement('div');
          msg.className = 'agent-connect-msg';
          form.appendChild(msg);
        }
        msg.style.color = 'var(--color-error-600)';
        msg.textContent = err.message;
      }
    });

    // Map save-endpoint rejection codes to operator-friendly prose + the form
    // field the user should fix. Server returns { error, code, field } on
    // 400; UI renders the friendly message and red-outlines the field. Fall
    // back to the raw error string when we don't recognize the code.
    const CC_SAVE_FIELD_TO_INPUT = {
      token_endpoint: 'cc_token_endpoint',
      client_id: 'cc_client_id',
      client_secret: 'cc_client_secret',
      scope: 'cc_scope',
      resource: 'cc_resource',
      audience: 'cc_audience',
      auth_method: 'cc_auth_method',
    };
    function ccSaveFriendlyMessage(code, field, rawError) {
      if (code === 'invalid_blob_shape') return 'Credentials payload had an unexpected shape. Refresh and try again.';
      if (code === 'missing_field') return 'Required field is missing: ' + (field || 'unknown') + '.';
      if (code === 'invalid_field_type') return 'Field has the wrong type: ' + (field || 'unknown') + '. Must be text.';
      if (code === 'field_too_long') return 'Value is too long for ' + (field || 'this field') + '. Shorten it and retry.';
      if (code === 'invalid_url') return 'Token endpoint must be https:// (http://localhost is allowed in development). Cloud-metadata and private-network hosts are blocked.';
      if (code === 'invalid_env_reference') return 'Environment-variable references must use the ADCP_OAUTH_ prefix (e.g. $ENV:ADCP_OAUTH_CLIENT_SECRET). Other names are rejected so a misconfigured agent can\'t read unrelated secrets.';
      if (code === 'invalid_auth_method_value') return 'Auth method must be "basic" or "body".';
      return rawError || 'Failed to save credentials.';
    }
    function ccSaveHighlightField(form, field) {
      // Clear any prior highlights before setting the new one — otherwise
      // repeated save attempts accumulate outlines on fields the user has
      // since fixed.
      form.querySelectorAll('.agent-cc-field-error').forEach(el => el.classList.remove('agent-cc-field-error'));
      if (!field) return;
      const name = CC_SAVE_FIELD_TO_INPUT[field];
      if (!name) return;
      const el = form.querySelector('[name="' + name + '"]');
      if (el) {
        el.classList.add('agent-cc-field-error');
        el.focus();
        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }

    // One-line actionable hints keyed off the SDK's ClientCredentialsExchangeError
    // kind / oauth_error. Aimed at a non-engineer ad-ops operator: "here's the
    // first thing to check." The primary (technical) line stays intact so
    // engineers can copy-paste into issues; the hint is a muted second line.
    function ccTestHint(err) {
      const byOAuth = {
        invalid_client: 'Check client_id and client_secret for typos or trailing whitespace.',
        invalid_scope: 'Remove the scope field or confirm the value with the AS operator.',
        unauthorized_client: 'This client isn\'t allowed to use the client_credentials grant. Ask the AS operator.',
        invalid_request: 'The AS rejected the request shape. Double-check token_endpoint and auth_method (Basic vs Body).',
        invalid_grant: 'The grant was rejected. Common cause: credentials revoked or the audience/resource is wrong.',
      };
      if (err.oauth_error && byOAuth[err.oauth_error]) return byOAuth[err.oauth_error];
      if (err.kind === 'network') return 'Check that token_endpoint is correct and the AS is reachable from this server.';
      if (err.kind === 'malformed') return 'The AS response wasn\'t valid OAuth. Confirm token_endpoint points at the token URL, not the authorize URL.';
      return '';
    }

    // "Test now" button: POST to /oauth-client-credentials/test and show the
    // typed result inline (success latency, or SDK ClientCredentialsExchangeError
    // kind + message + oauth_error if the AS returned one).
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('.agent-cc-test-now');
      if (!btn) return;
      const form = btn.closest('.agent-connect-form');
      if (!form) return;
      // Read from the parent form's already-escaped data attribute rather
      // than re-embedding the URL in the button's own HTML.
      const agentUrl = form.dataset.agentUrl;
      const resultEl = form.querySelector('.agent-cc-test-result');
      if (!resultEl) return;

      btn.disabled = true;
      btn.textContent = 'Testing...';
      resultEl.textContent = '';
      resultEl.innerHTML = '';

      const setResult = (primary, hint, color, extraHtml) => {
        resultEl.style.color = color;
        const primaryNode = document.createElement('div');
        primaryNode.textContent = primary;
        resultEl.appendChild(primaryNode);
        if (hint) {
          const hintNode = document.createElement('div');
          hintNode.style.fontSize = 'var(--text-xs)';
          hintNode.style.color = 'var(--color-text-secondary)';
          hintNode.style.marginTop = '2px';
          hintNode.textContent = hint;
          resultEl.appendChild(hintNode);
        }
        if (extraHtml) {
          const extra = document.createElement('div');
          extra.style.marginTop = 'var(--space-1)';
          extra.innerHTML = extraHtml;
          resultEl.appendChild(extra);
        }
      };

      try {
        const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/oauth-client-credentials/test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));

        if (res.status === 429) {
          setResult('Testing too fast — wait a moment and retry.', '', 'var(--color-error-600)', '');
        } else if (!res.ok) {
          setResult(data.error || ('Request failed: ' + res.status), '', 'var(--color-error-600)', '');
        } else if (data.ok) {
          // Subtle exit affordance on success so operators can return to the
          // dashboard (which reloads the compliance card with fresh auth
          // state). No auto-reload — the retest loop stays available.
          setResult(
            '✅ Token exchange succeeded in ' + data.latency_ms + 'ms.',
            '',
            'var(--color-success-600)',
            '<a href="#" class="agent-cc-reload" style="font-size:var(--text-sm);">Reload to refresh the dashboard →</a>',
          );
        } else {
          // Typed failure from the SDK.
          const err = data.error || {};
          let text = '❌ ' + (err.message || 'Exchange failed') + ' (' + (err.kind || 'unknown') + ')';
          if (err.oauth_error) {
            text += ' — AS returned ' + err.oauth_error;
            if (err.oauth_error_description) text += ': ' + err.oauth_error_description;
          }
          if (err.http_status) text += ' [HTTP ' + err.http_status + ']';
          setResult(text, ccTestHint(err), 'var(--color-error-600)', '');
        }
      } catch (err) {
        setResult('Test request failed: ' + err.message, '', 'var(--color-error-600)', '');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Test now';
      }
    });

    // Reload handler for the success-state "Reload to refresh" link.
    document.addEventListener('click', function(e) {
      const link = e.target.closest('.agent-cc-reload');
      if (!link) return;
      e.preventDefault();
      location.reload();
    });

    // OAuth authorize button
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('.agent-oauth-start');
      if (!btn) return;
      const form = btn.closest('.agent-connect-form');
      if (!form) return;

      const agentUrl = form.dataset.agentUrl;
      let agentContextId = form.dataset.agentContextId;

      btn.disabled = true;
      btn.textContent = 'Starting OAuth...';

      try {
        // Ensure agent context exists (connect without token) so the OAuth
        // flow below has a persistent `agent_context_id` to bind tokens to.
        if (!agentContextId) {
          const connectRes = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/connect', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({}),
          });
          if (!connectRes.ok) {
            const data = await connectRes.json().catch(() => ({}));
            throw new Error(data.error || 'Failed to create agent context');
          }
          const connectData = await connectRes.json();
          agentContextId = connectData.agent_context_id;
          if (!agentContextId) {
            throw new Error('Failed to create agent context');
          }
        }

        // Redirect to OAuth flow, asking it to return us here after completion
        const returnTo = window.location.pathname + window.location.search + window.location.hash;
        window.location.href = '/api/oauth/agent/start'
          + '?agent_context_id=' + encodeURIComponent(agentContextId)
          + '&return_to=' + encodeURIComponent(returnTo);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Authorize';
        let msg = form.querySelector('.agent-connect-msg');
        if (!msg) {
          msg = document.createElement('div');
          msg.className = 'agent-connect-msg';
          form.appendChild(msg);
        }
        msg.style.color = 'var(--color-error-600)';
        msg.textContent = err.message;
      }
    });

    // OAuth "Authorize with agent" button surfaced inline in storyboard panels
    // when the server returns needs_oauth. Mirrors the connect-form flow:
    // ensure agent_context, then redirect to /api/oauth/agent/start.
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('.agent-oauth-challenge-btn');
      if (!btn) return;

      const agentUrl = btn.dataset.agentUrl;
      let agentContextId = btn.dataset.agentContextId;

      btn.disabled = true;
      const originalLabel = btn.textContent;
      btn.textContent = 'Starting OAuth...';

      try {
        if (!agentContextId) {
          const connectRes = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/connect', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({}),
          });
          if (!connectRes.ok) {
            const data = await connectRes.json().catch(() => ({}));
            throw new Error(data.error || 'Failed to create agent context');
          }
          const connectData = await connectRes.json();
          agentContextId = connectData.agent_context_id;
          if (!agentContextId) throw new Error('Failed to create agent context');
        }

        const returnTo = window.location.pathname + window.location.search + window.location.hash;
        window.location.href = '/api/oauth/agent/start'

      } catch (err) {

    });

    // Monitoring pause toggle
    document.addEventListener('change', async function(e) {
      const toggle = e.target.closest('.monitoring-pause-toggle');
      if (toggle) {
        const agentUrl = toggle.dataset.agentUrl;
        const controlsRow = toggle.closest('.agent-monitoring-controls');
        const intervalSelect = controlsRow ? controlsRow.querySelector('.monitoring-interval-select') : null;

        try {
          const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/monitoring/pause`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ paused: toggle.checked }),
          });
          if (!res.ok) {
            toggle.checked = !toggle.checked;
          } else {
            // Update interval dropdown disabled state
            if (intervalSelect) {
              intervalSelect.disabled = toggle.checked;
              intervalSelect.style.opacity = toggle.checked ? '0.4' : '1';
            }
            // Show/hide pause warning
            if (controlsRow) {
              let warning = controlsRow.querySelector('.pause-warning');
              if (toggle.checked && !warning) {
                warning = document.createElement('span');
                warning.className = 'pause-warning';
                warning.style.cssText = 'font-size: var(--text-xs); color: var(--color-warning-700, #b45309);';
                warning.textContent = 'Compliance status will not update while paused';
                controlsRow.appendChild(warning);
              } else if (!toggle.checked && warning) {
                warning.remove();
              }
            }
          }
        } catch {
          toggle.checked = !toggle.checked;
        }
      }
    });

    // Capture initial value for interval selects on focus (before change fires)
    document.addEventListener('focus', function(e) {
      const select = e.target.closest('.monitoring-interval-select');
      if (select) {
        select.dataset.previousValue = select.value;
      }
    }, true);

    // Monitoring interval change
    document.addEventListener('change', async function(e) {
      const select = e.target.closest('.monitoring-interval-select');
      if (select) {
        const agentUrl = select.dataset.agentUrl;
        const previousValue = select.dataset.previousValue;
        select.dataset.previousValue = select.value;
        try {
          const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/monitoring/interval`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },

          select.value = previousValue;
        }
      }
    });

    // View outbound requests log
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('.agent-requests-btn');
      if (!btn) return;

      const agentUrl = btn.dataset.agentUrl;
      const cardId = btn.dataset.cardId;
      const panel = document.getElementById(cardId + '-requests');
      if (!panel) return;

      if (panel.style.display !== 'none') {
        panel.style.display = 'none';
        return;
      }

      panel.style.display = 'block';
      panel.innerHTML = '<div style="padding: var(--space-3); color: var(--text-secondary);">Loading requests...</div>';

      try {
        const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/monitoring/requests?limit=50`, {
          credentials: 'include',
        });
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();

        if (data.requests.length === 0) {
          panel.innerHTML = '<div style="padding: var(--space-3); color: var(--text-secondary);">No outbound requests recorded yet.</div>';
          return;
        }

        const rows = data.requests.map(function(r) {
          const time = new Date(r.created_at).toLocaleString();
          const status = r.success
            ? '<span style="color: var(--green-600);">OK</span>'
            : '<span style="color: var(--red-600);">ERR</span>';
          const duration = r.response_time_ms != null ? r.response_time_ms + 'ms' : '-';
          const ua = r.user_agent ? r.user_agent.split(' ')[0] : '-';
          return '<tr>'
            + '<td style="padding: 4px 8px;">' + escapeHtml(time) + '</td>'
            + '<td style="padding: 4px 8px;">' + escapeHtml(r.request_type) + '</td>'
            + '<td style="padding: 4px 8px;" title="' + escapeHtml(r.user_agent || '') + '">' + escapeHtml(ua) + '</td>'
            + '<td style="padding: 4px 8px;">' + status + '</td>'
            + '<td style="padding: 4px 8px;">' + escapeHtml(duration) + '</td>'
            + (r.error_message ? '<td style="padding: 4px 8px; color: var(--text-secondary); font-size: var(--text-xs);">' + escapeHtml(r.error_message) + '</td>' : '<td></td>')
            + '</tr>';
        }).join('');

        panel.innerHTML = '<div style="padding: var(--space-3);"><div style="font-weight: 600; margin-bottom: var(--space-2);">Outbound Requests (' + escapeHtml(String(data.total)) + ' total)</div>'
          + '<table style="width: 100%; font-size: var(--text-sm); border-collapse: collapse;">'
          + '<thead><tr style="text-align: left; color: var(--text-secondary);"><th style="padding: 4px 8px;">Time</th><th style="padding: 4px 8px;">Type</th><th style="padding: 4px 8px;">User-Agent</th><th style="padding: 4px 8px;">Status</th><th style="padding: 4px 8px;">Duration</th><th style="padding: 4px 8px;">Error</th></tr></thead>'
          + '<tbody>' + rows + '</tbody></table></div>';
      } catch {
        panel.innerHTML = '<div style="padding: var(--space-3); color: var(--red-600);">Failed to load requests.</div>';
      }
    });

    // Track pill click — fetch history and show scenario details for that track
    document.addEventListener('click', async function(e) {
      const trackBtn = e.target.closest('.agent-track[data-track]');
      if (trackBtn) {
        const track = trackBtn.dataset.track;
        const agentUrl = trackBtn.dataset.agentUrl;
        const card = trackBtn.closest('.agent-compliance-card');
        const detailEl = card?.querySelector('.agent-track-detail');
        if (!detailEl) return;

        if (trackBtn.classList.contains('active')) {
          trackBtn.classList.remove('active');
          detailEl.style.display = 'none';

        card.querySelectorAll('.agent-track').forEach(b => b.classList.remove('active'));
        trackBtn.classList.add('active');
        detailEl.style.display = 'block';
        detailEl.innerHTML = '<em>Loading...</em>';

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/compliance/history?limit=1', { credentials: 'include' });
          const data = await res.json();
          const run = data.runs?.[0];
          if (!run || !run.tracks_json) {
            detailEl.innerHTML = '<em>No detailed data available for this run.</em>';
            return;
          }
          const trackData = run.tracks_json.find(t => t.track === track);
          if (!trackData) {
            detailEl.innerHTML = '<em>Track "' + escapeHtml(track) + '" not found in latest run.</em>';
            return;
          }

          const statusLabel = trackData.status === 'pass' ? 'Passing'
            : trackData.status === 'fail' ? 'Failing'
            : trackData.status === 'partial' ? 'Partial' : trackData.status;

          let html = '<h4>' + escapeHtml(track) + ' — ' + escapeHtml(statusLabel) + '</h4>';
          html += '<div>' + parseInt(trackData.passed_count, 10) + ' of ' + parseInt(trackData.scenario_count, 10) + ' scenarios passing';
          if (trackData.duration_ms) html += ' (' + (trackData.duration_ms / 1000).toFixed(1) + 's)';
          html += '</div>';

          if (trackData.scenarios) {
            for (const s of trackData.scenarios) {
              const cls = s.overall_passed ? 'track-scenario--pass' : 'track-scenario--fail';

              }

        const cardId = historyBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-history');
        if (!panel) return;

        if (panel.style.display !== 'none') {
          panel.style.display = 'none';
          return;
        }
        panel.style.display = 'block';
        panel.innerHTML = '<em>Loading history...</em>';

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/compliance/history?limit=10', { credentials: 'include' });
          const data = await res.json();

          if (!data.runs || data.runs.length === 0) {
            panel.innerHTML = '<em>No compliance history yet.</em>';

          let html = '<div style="font-weight:var(--font-semibold);margin-bottom:var(--space-2);">Compliance History</div>';
          for (const run of data.runs) {

      // Shared: render a "Connect via OAuth" prompt when an agent 401s with

      function renderOAuthChallenge(agentUrl, agentContextId, reason) {
        const safeReason = reason
          ? '<div style="margin-bottom:var(--space-3);font-size:var(--text-sm);color:var(--color-text-secondary);">' + escapeHtml(String(reason)) + '</div>'
          : '<div style="margin-bottom:var(--space-3);font-size:var(--text-sm);color:var(--color-text-secondary);">This agent requires OAuth authorization before storyboards can run.</div>';
