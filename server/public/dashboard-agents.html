      // Shared: render the storyboard map into a panel
      async function renderStoryboardPicker(panel, agentUrl, cardId, agentTracks) {
        panel.style.display = 'block';
        panel.innerHTML = '<em>Discovering agent capabilities...</em>';
        if (agentTracks) panel.dataset.agentTracks = JSON.stringify(agentTracks);

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/applicable-storyboards', { credentials: 'include' });

          if (res.ok) {
            const data = await res.json();
            const bundles = Array.isArray(data.bundles) ? data.bundles : [];
            const supportedProtocols = Array.isArray(data.supported_protocols) ? data.supported_protocols : [];
            const specialisms = Array.isArray(data.specialisms) ? data.specialisms : [];
            let html = '';

            if (data.capabilities_probe_error) {
              html += '<div style="padding:var(--space-2) var(--space-3);margin-bottom:var(--space-2);background:var(--color-warning-50);border:1px solid var(--color-warning-200);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--color-warning-800);">';
              html += 'Capabilities probe warning: ' + escapeHtml(String(data.capabilities_probe_error));
              html += '</div>';
            }

            if (supportedProtocols.length > 0 || specialisms.length > 0) {
              html += '<div class="storyboard-map-tools" style="font-size:var(--text-xs);color:var(--color-text-secondary);margin-bottom:var(--space-2);">';
              if (supportedProtocols.length > 0) {
                html += 'Protocols: ' + supportedProtocols.map(p => '<code>' + escapeHtml(String(p)) + '</code>').join(' ');
              }
              if (specialisms.length > 0) {
                html += (supportedProtocols.length > 0 ? ' &nbsp;·&nbsp; ' : '') + 'Specialisms: ';
                html += specialisms.map(s => '<code>' + escapeHtml(String(s)) + '</code>').join(' ');
              }
              html += '</div>';
            }

            const totalStoryboards = typeof data.total_storyboards === 'number'
              ? data.total_storyboards
              : bundles.reduce((n, b) => n + (Array.isArray(b.storyboards) ? b.storyboards.length : 0), 0);

            if (totalStoryboards === 0) {
              html += '<div style="padding:var(--space-4) 0;color:var(--color-text-secondary);font-size:var(--text-sm);">';
              html += specialisms.length === 0
                ? 'No applicable storyboards found. Your agent has not declared any AdCP specialisms yet.'
                : 'Your agent declared specialisms, but no storyboards matched them.';
              html += '</div>';
              panel.innerHTML = html;
              return;
            }

            for (const bundle of bundles) {
              const storyboards = Array.isArray(bundle.storyboards) ? bundle.storyboards : [];
              if (storyboards.length === 0) continue;
              const kindLabel = bundle.kind === 'specialism' ? 'Specialism' : bundle.kind === 'protocol' ? 'Protocol' : (bundle.kind || 'Bundle');
              const label = kindLabel + (bundle.id ? ': ' + bundle.id : '');
              html += '<div class="storyboard-track-group">';
              html += '<div class="storyboard-track-header"><span>' + escapeHtml(label) + '</span><span class="storyboard-track-count">' + storyboards.length + ' storyboard' + (storyboards.length === 1 ? '' : 's') + '</span></div>';

              for (const sb of storyboards) {
                html += '<div class="storyboard-map-item">';
                html += '<div>';
                html += '<div class="storyboard-map-item-title">' + escapeHtml(sb.title || sb.id) + '</div>';
                if (sb.summary) html += '<div class="storyboard-map-item-meta">' + escapeHtml(sb.summary) + '</div>';
                html += '<div class="storyboard-map-item-meta">' + (sb.step_count || 0) + ' steps</div>';
                html += '</div>';
                html += '<div class="storyboard-map-actions">';
                html += '<button class="storyboard-picker-item" data-storyboard-id="' + escapeHtml(sb.id) + '" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '" style="border:none;background:none;padding:0;font-size:var(--text-xs);color:var(--color-primary-600);cursor:pointer;">Preview</button>';
                html += '<button class="storyboard-step-btn btn-run" data-storyboard-id="' + escapeHtml(sb.id) + '" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">Run step by step</button>';
                html += '</div>';
                html += '</div>';
              }
              html += '</div>';
            }

            panel.innerHTML = html;
            return;
          }

          // Non-2xx — surface specific reason before falling back
          const errBody = await res.json().catch(() => ({}));

          if (errBody.needs_oauth) {
            panel.innerHTML = renderOAuthChallenge(agentUrl, errBody.agent_context_id, errBody.error);
            return;
          }

          if (errBody.needs_auth) {
            panel.innerHTML = '<div style="padding:var(--space-4) 0;color:var(--color-text-secondary);font-size:var(--text-sm);">Your agent requires authentication to discover tools. Authorize or save an auth token using the connect form above, then try again.</div>';
            return;
          }

          if (errBody.unknown_specialism && Array.isArray(errBody.declared_specialisms)) {
            let html = '<div style="padding:var(--space-3);background:var(--color-error-50);border:1px solid var(--color-error-200);border-radius:var(--radius-md);color:var(--color-error-700);font-size:var(--text-sm);">';
            html += '<strong>Unknown specialism.</strong> Your agent declared specialisms that aren\'t in the compliance cache:';
            html += '<div style="margin-top:var(--space-2);font-family:var(--font-mono);font-size:var(--text-xs);">';
            html += errBody.declared_specialisms.map(s => escapeHtml(String(s))).join(', ');
            html += '</div>';
            if (Array.isArray(errBody.known_specialisms) && errBody.known_specialisms.length > 0) {
              html += '<details style="margin-top:var(--space-2);"><summary style="cursor:pointer;font-size:var(--text-xs);">Known specialisms (' + errBody.known_specialisms.length + ')</summary>';
              html += '<div style="margin-top:var(--space-2);font-family:var(--font-mono);font-size:var(--text-xs);">';
              html += errBody.known_specialisms.map(s => escapeHtml(String(s))).join(', ');
              html += '</div></details>';
            }
            html += '</div>';
            panel.innerHTML = html;
            return;
          }

          const reasonText = errBody.reason ? ' (' + errBody.reason + ')' : '';
          const msg = errBody.error || ('HTTP ' + res.status);
          let html = '<div style="padding:var(--space-3);background:var(--color-error-50);border:1px solid var(--color-error-200);border-radius:var(--radius-md);color:var(--color-error-700);font-size:var(--text-sm);margin-bottom:var(--space-3);">';
          html += '<strong>Could not probe agent capabilities.</strong> ' + escapeHtml(String(msg) + reasonText);
          html += '</div>';

          try {
            const fallback = await fetch('/api/storyboards', { credentials: 'include' });
            if (fallback.ok) {
              const fdata = await fallback.json();
              if (fdata.storyboards && fdata.storyboards.length > 0) {
                html += '<div style="font-size:var(--text-xs);color:var(--color-text-secondary);margin-bottom:var(--space-2);">Showing all available storyboards:</div>';
                html += '<div class="storyboard-picker">';
                for (const sb of fdata.storyboards) {
                  html += '<div class="storyboard-picker-item" data-storyboard-id="' + escapeHtml(sb.id) + '" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">';
                  html += '<div>';
                  html += '<div class="storyboard-picker-title">' + escapeHtml(sb.title) + '</div>';
                  html += '<div class="storyboard-picker-summary">' + escapeHtml(sb.summary) + '</div>';
                  html += '</div>';
                  html += '<span style="font-size:var(--text-xs);color:var(--color-text-tertiary);">' + sb.step_count + ' steps</span>';
                  html += '</div>';
                }
                html += '</div>';
              }
            }
          } catch (fallbackErr) {
            console.error('Storyboard fallback failed:', fallbackErr);
          }

          panel.innerHTML = html;
        } catch (err) {
          console.error('Failed to load storyboards:', err);
          const msg = err instanceof Error ? err.message : String(err);
          panel.innerHTML = '<div style="padding:var(--space-3);color:var(--color-error-700);font-size:var(--text-sm);">Failed to load storyboards: ' + escapeHtml(msg) + '</div>';
        }
      }

      // Storyboard "Test your agent" button
      const storyboardBtn = e.target.closest('.agent-storyboard-btn');
      if (storyboardBtn) {
        const agentUrl = storyboardBtn.dataset.agentUrl;
        const cardId = storyboardBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        if (panel.style.display !== 'none') {
          panel.style.display = 'none';
          return;
        }
        let agentTracks = null;
        try { agentTracks = JSON.parse(storyboardBtn.dataset.agentTracks || 'null'); } catch {}
        await renderStoryboardPicker(panel, agentUrl, cardId, agentTracks);
        return;
      }

      // Storyboard picker item click — show storyboard detail
      const pickerItem = e.target.closest('.storyboard-picker-item');
      if (pickerItem) {
        const storyboardId = pickerItem.dataset.storyboardId;
        const agentUrl = pickerItem.dataset.agentUrl;
        const cardId = pickerItem.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        panel.innerHTML = '<em>Loading storyboard...</em>';

        try {
          const res = await fetch('/api/storyboards/' + encodeURIComponent(storyboardId), { credentials: 'include' });
          const data = await res.json();
          const sb = data.storyboard;
          if (!sb) {
            panel.innerHTML = '<em>Storyboard not found.</em>';
            return;
          }

          let html = '<button class="storyboard-back-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">&larr; Back to storyboards</button>';
          html += '<div style="margin-bottom:var(--space-3);"><strong>' + escapeHtml(sb.title) + '</strong></div>';
          html += '<div class="storyboard-phase-narrative" style="margin-bottom:var(--space-4);">' + escapeHtml(sb.narrative).replace(/\n/g, '<br>') + '</div>';

          for (const phase of sb.phases) {
            html += '<div class="storyboard-phase">';
            html += '<div class="storyboard-phase-title">' + escapeHtml(phase.title) + '</div>';
            html += '<div class="storyboard-phase-narrative">' + escapeHtml(phase.narrative).replace(/\n/g, '<br>') + '</div>';

            for (const step of phase.steps) {
              html += '<div class="storyboard-step">';
              html += '<div class="storyboard-step-header">';
              html += '<span class="storyboard-step-title">' + escapeHtml(step.title) + '</span>';
              html += '<code style="font-size:var(--text-xs);color:var(--color-text-tertiary);">' + escapeHtml(step.task) + '</code>';
              html += '</div>';
              html += '<div class="storyboard-step-narrative">' + escapeHtml(step.narrative).replace(/\n/g, '<br>') + '</div>';
              html += '<div class="storyboard-step-meta">';
              if (step.doc_ref) {
                html += '<a href="/docs' + escapeHtml(step.doc_ref) + '" target="_blank">Docs</a>';
              }
              if (step.schema_ref) {
                html += '<span>Schema: ' + escapeHtml(step.schema_ref) + '</span>';
              }
              html += '</div>';
              html += '</div>';
            }

            html += '</div>';
          }

          html += '<div class="storyboard-actions">';
          html += '<button class="storyboard-run-btn" data-storyboard-id="' + escapeHtml(storyboardId) + '" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">Run storyboard</button>';
          html += '<button class="storyboard-compare-btn" data-storyboard-id="' + escapeHtml(storyboardId) + '" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">Compare with reference</button>';
          html += '</div>';

          panel.innerHTML = html;
        } catch {
          panel.innerHTML = '<em>Failed to load storyboard.</em>';
        }
        return;
      }

      // Back button in storyboard view
      const backBtn = e.target.closest('.storyboard-back-btn');
      if (backBtn) {
        const agentUrl = backBtn.dataset.agentUrl;
        const cardId = backBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (panel) {
          let tracks = null;
          try { tracks = JSON.parse(panel.dataset.agentTracks || 'null'); } catch {}
          await renderStoryboardPicker(panel, agentUrl, cardId, tracks);
        }
        return;
      }

      // Step-by-step storyboard button (from map view)
      const stepBtn = e.target.closest('.storyboard-step-btn');
      if (stepBtn) {
        const storyboardId = stepBtn.dataset.storyboardId;
        const agentUrl = stepBtn.dataset.agentUrl;
        const cardId = stepBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        // Fetch first step preview
        panel.innerHTML = '<em>Loading first step...</em>';
        try {
          const res = await fetch('/api/storyboards/' + encodeURIComponent(storyboardId) + '/first-step', { credentials: 'include' });
          const data = await res.json();
          if (!res.ok) { panel.innerHTML = '<em>' + escapeHtml(data.error || 'Failed') + '</em>'; return; }

          renderStepRunner(panel, agentUrl, cardId, storyboardId, data.storyboard.title, data.step, null);
        } catch {
          panel.innerHTML = '<em>Failed to load storyboard step.</em>';
        }
        return;
      }

      // Run step button (inside step runner)
      const runStepBtn = e.target.closest('.step-run-btn');
      if (runStepBtn) {
        const agentUrl = runStepBtn.dataset.agentUrl;
        const cardId = runStepBtn.dataset.cardId;
        const storyboardId = runStepBtn.dataset.storyboardId;
        const stepId = runStepBtn.dataset.stepId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        let context = null;
        try { context = JSON.parse(runStepBtn.dataset.context || 'null'); } catch {}

        runStepBtn.disabled = true;
        runStepBtn.textContent = 'Running...';

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/storyboard/' + encodeURIComponent(storyboardId) + '/step/' + encodeURIComponent(stepId), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ context, dry_run: true }),
          });
          const result = await res.json();
          if (!res.ok) {
            runStepBtn.disabled = false;
            runStepBtn.textContent = 'Run this step';
            const resultEl = panel.querySelector('.step-runner-result');
            if (resultEl) { resultEl.className = 'step-runner-result step-runner-result--fail'; resultEl.innerHTML = '<strong>Error:</strong> ' + escapeHtml(result.error || 'Request failed'); }
            return;
          }

          if (result.needs_oauth) {
            panel.innerHTML = renderOAuthChallenge(agentUrl, result.agent_context_id, result.error);
            return;
          }

          // Render result and next step
          const resultEl = panel.querySelector('.step-runner-result');
          const cls = result.skipped ? 'skip' : result.passed ? 'pass' : 'fail';
          const label = result.skipped ? 'SKIPPED' : result.passed ? 'PASS' : 'FAIL';
          if (resultEl) {
            let rhtml = '<strong>' + label + '</strong> (' + result.duration_ms + 'ms)';
            if (result.error) rhtml += '<div style="margin-top:var(--space-1);color:var(--color-error-700);">' + escapeHtml(result.error) + '</div>';
            if (result.validations) {
              for (const v of result.validations) {
                if (!v.passed) {
                  rhtml += '<div style="margin-top:2px;color:var(--color-error-600);">' + escapeHtml(v.description || v.check);
                  if (v.error) rhtml += ': ' + escapeHtml(v.error);
                  rhtml += '</div>';
                }
              }
            }
            resultEl.className = 'step-runner-result step-runner-result--' + cls;
            resultEl.innerHTML = rhtml;
          }

          // Show next step button or "done"
          const actionsEl = panel.querySelector('.step-runner-actions');
          if (actionsEl) {
            if (result.next) {
              actionsEl.innerHTML = '<button class="step-next-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '" data-storyboard-id="' + escapeHtml(storyboardId) + '" data-next-step=\'' + JSON.stringify(result.next).replace(/'/g, '&#39;') + '\' data-context=\'' + JSON.stringify(result.context || {}).replace(/'/g, '&#39;') + '\'>Next: ' + escapeHtml(result.next.title) + ' →</button>';
            } else {
              actionsEl.innerHTML = '<span style="font-size:var(--text-xs);color:var(--color-success-600);font-weight:600;">Storyboard complete</span>';
            }
          }
        } catch {
          runStepBtn.disabled = false;
          runStepBtn.textContent = 'Run this step';
        }
        return;
      }

      // Next step button (inside step runner)
      const nextStepBtn = e.target.closest('.step-next-btn');
      if (nextStepBtn) {
        const agentUrl = nextStepBtn.dataset.agentUrl;
        const cardId = nextStepBtn.dataset.cardId;
        const storyboardId = nextStepBtn.dataset.storyboardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        let nextStep = null;
        let context = null;
        try { nextStep = JSON.parse(nextStepBtn.dataset.nextStep || 'null'); } catch {}
        try { context = JSON.parse(nextStepBtn.dataset.context || 'null'); } catch {}

        if (nextStep) {
          renderStepRunner(panel, agentUrl, cardId, storyboardId, null, nextStep, context);
        }
        return;
      }

      // Run storyboard button
      const runBtn = e.target.closest('.storyboard-run-btn');
      if (runBtn) {
        const storyboardId = runBtn.dataset.storyboardId;
        const agentUrl = runBtn.dataset.agentUrl;
        const cardId = runBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';

        const progressEl = document.createElement('div');
        progressEl.className = 'storyboard-progress';
        progressEl.textContent = 'Running storyboard evaluation against your agent. This may take up to 90 seconds...';
        runBtn.parentElement.after(progressEl);

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/storyboard/' + encodeURIComponent(storyboardId) + '/run', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
          });

          if (res.status === 429) {
            progressEl.textContent = 'Rate limit exceeded. You can run 5 evaluations per hour. Please try again later.';
            runBtn.disabled = false;
            runBtn.textContent = 'Run storyboard';
            return;
          }

          const data = await res.json();
          progressEl.remove();

          if (res.status === 422 && data.needs_oauth) {
            panel.innerHTML = renderOAuthChallenge(agentUrl, data.agent_context_id, data.error);
            return;
          }

          let html = '<button class="storyboard-back-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">&larr; Back to storyboards</button>';
          html += '<div style="margin-bottom:var(--space-3);"><strong>' + escapeHtml(data.storyboard.title) + '</strong> — Results</div>';
          html += '<div style="margin-bottom:var(--space-3);font-size:var(--text-sm);color:var(--color-text-secondary);">' + escapeHtml(data.summary.headline) + ' (' + (data.total_duration_ms / 1000).toFixed(1) + 's)</div>';

          for (const phase of data.phases) {
            html += '<div class="storyboard-phase">';
            html += '<div class="storyboard-phase-title">' + escapeHtml(phase.title) + '</div>';

            for (const step of phase.steps) {
              const resultClass = step.result.passed === true ? 'pass'
                : step.result.passed === false ? 'fail' : 'pending';
              const resultLabel = step.result.passed === true ? 'Pass'
                : step.result.passed === false ? 'Fail' : 'N/A';

              html += '<div class="storyboard-step">';
              html += '<div class="storyboard-step-header">';
              html += '<span class="storyboard-step-title">' + escapeHtml(step.title) + '</span>';
              html += '<span class="storyboard-step-result storyboard-step-result--' + resultClass + '">' + resultLabel + '</span>';
              html += '</div>';
              html += '<div class="storyboard-step-narrative">' + escapeHtml(step.narrative).replace(/\n/g, '<br>') + '</div>';

              if (step.result.scenarios) {
                for (const s of step.result.scenarios) {
                  if (!s.overall_passed && s.steps) {
                    html += '<div style="margin-top:var(--space-2);padding:var(--space-2);background:var(--color-error-50);border-radius:var(--radius-sm);font-size:var(--text-xs);">';
                    for (const st of s.steps) {
                      if (!st.passed) {
                        html += '<div style="color:var(--color-error-700);">' + escapeHtml(st.step || st.name || 'Step');
                        if (st.error) html += ': ' + escapeHtml(String(st.error).substring(0, 300));
                        html += '</div>';
                      }
                    }
                    html += '</div>';
                  }
                }
              }

              html += '</div>';
            }
            html += '</div>';
          }

          if (data.observations && data.observations.length > 0) {
            html += '<div style="margin-top:var(--space-3);">';
            html += '<div style="font-weight:var(--font-semibold);font-size:var(--text-sm);margin-bottom:var(--space-2);">Observations</div>';
            for (const obs of data.observations) {
              const color = obs.severity === 'error' ? 'var(--color-error-600)'
                : obs.severity === 'warning' ? 'var(--color-warning-600)'
                : 'var(--color-text-secondary)';
              html += '<div style="font-size:var(--text-xs);color:' + color + ';margin-bottom:var(--space-1);">';
              html += '<strong>' + escapeHtml(obs.severity) + '</strong>: ' + escapeHtml(obs.message);
              html += '</div>';
            }
            html += '</div>';
          }

          panel.innerHTML = html;
          panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch {
          progressEl.textContent = 'Failed to run storyboard evaluation.';
          runBtn.disabled = false;
          runBtn.textContent = 'Run storyboard';
        }
        return;
      }

      // Compare with reference button
      const compareBtn = e.target.closest('.storyboard-compare-btn');
      if (compareBtn) {
        const storyboardId = compareBtn.dataset.storyboardId;
        const agentUrl = compareBtn.dataset.agentUrl;
        const cardId = compareBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-storyboard');
        if (!panel) return;

        compareBtn.disabled = true;
        compareBtn.textContent = 'Comparing...';

        const progressEl = document.createElement('div');
        progressEl.className = 'storyboard-progress';
        progressEl.textContent = 'Running comparison against your agent and the reference test agent...';
        compareBtn.parentElement.after(progressEl);

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/storyboard/' + encodeURIComponent(storyboardId) + '/compare', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
          });

          if (res.status === 429) {
            progressEl.textContent = 'Rate limit exceeded. Please try again later.';
            compareBtn.disabled = false;
            compareBtn.textContent = 'Compare with reference';
            return;
          }

          const data = await res.json();
          progressEl.remove();

          let html = '<button class="storyboard-back-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">&larr; Back to storyboards</button>';
          html += '<div style="margin-bottom:var(--space-3);"><strong>' + escapeHtml(data.storyboard.title) + '</strong> — Comparison</div>';

          html += '<div style="display:flex;gap:var(--space-4);margin-bottom:var(--space-4);font-size:var(--text-sm);">';
          html += '<div><strong>Your agent:</strong> ' + escapeHtml(data.user_agent.summary.headline) + '</div>';
          html += '<div><strong>Reference:</strong> ' + escapeHtml(data.reference_agent.summary.headline) + '</div>';
          html += '</div>';

          for (const phase of data.phases) {
            html += '<div class="storyboard-phase">';
            html += '<div class="storyboard-phase-title">' + escapeHtml(phase.title) + '</div>';

            for (const step of phase.steps) {
              const userClass = step.user_result.passed === true ? 'pass' : step.user_result.passed === false ? 'fail' : 'pending';
              const refClass = step.reference_result.passed === true ? 'pass' : step.reference_result.passed === false ? 'fail' : 'pending';

              html += '<div class="storyboard-step">';
              html += '<div class="storyboard-step-header">';
              html += '<span class="storyboard-step-title">' + escapeHtml(step.title) + '</span>';
              html += '<div style="display:flex;gap:var(--space-2);">';
              html += '<span class="storyboard-step-result storyboard-step-result--' + userClass + '">You: ' + (step.user_result.passed === true ? 'Pass' : step.user_result.passed === false ? 'Fail' : 'N/A') + '</span>';
              html += '<span class="storyboard-step-result storyboard-step-result--' + refClass + '">Ref: ' + (step.reference_result.passed === true ? 'Pass' : step.reference_result.passed === false ? 'Fail' : 'N/A') + '</span>';
              html += '</div></div>';
              html += '<div class="storyboard-step-narrative">' + escapeHtml(step.narrative).replace(/\n/g, '<br>') + '</div>';
              html += '</div>';
            }
            html += '</div>';
          }

          panel.innerHTML = html;
          panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch {
          progressEl.textContent = 'Failed to run comparison.';
          compareBtn.disabled = false;
          compareBtn.textContent = 'Compare with reference';
        }
        return;
      }
    });

    function renderStepRunner(panel, agentUrl, cardId, storyboardId, storyboardTitle, step, context) {
      let html = '<button class="storyboard-back-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '">&larr; Back to storyboards</button>';
      if (storyboardTitle) {
        html += '<div style="margin-bottom:var(--space-3);"><strong>' + escapeHtml(storyboardTitle) + '</strong> — Step by step</div>';
      }
      html += '<div class="step-runner">';
      html += '<div class="step-runner-current">';
      html += '<h4>' + escapeHtml(step.title) + '</h4>';
      html += '<div style="font-size:var(--text-xs);color:var(--color-text-tertiary);margin-bottom:var(--space-1);">Task: <code>' + escapeHtml(step.task) + '</code></div>';
      if (step.narrative) {
        html += '<div class="step-narrative">' + escapeHtml(step.narrative).replace(/\n/g, '<br>') + '</div>';
      }
      if (step.expected) {
        html += '<details style="margin-top:var(--space-2);"><summary style="font-size:var(--text-xs);cursor:pointer;color:var(--color-text-tertiary);">Expected response</summary>';
        html += '<div style="font-size:var(--text-xs);color:var(--color-text-secondary);padding:var(--space-1) 0;white-space:pre-wrap;">' + escapeHtml(step.expected) + '</div>';
        html += '</details>';
      }
      if (step.sample_request && Object.keys(step.sample_request).length > 0) {
        html += '<details style="margin-top:var(--space-1);"><summary style="font-size:var(--text-xs);cursor:pointer;color:var(--color-text-tertiary);">Sample request</summary>';
        html += '<pre style="font-size:var(--text-xs);background:var(--color-gray-50);padding:var(--space-2);border-radius:var(--radius-sm);overflow-x:auto;max-height:200px;">' + escapeHtml(JSON.stringify(step.sample_request, null, 2)) + '</pre>';
        html += '</details>';
      }
      html += '<div class="step-runner-result"></div>';
      html += '<div class="step-runner-actions">';
      html += '<button class="step-run-btn" data-agent-url="' + escapeHtml(agentUrl) + '" data-card-id="' + escapeHtml(cardId) + '" data-storyboard-id="' + escapeHtml(storyboardId) + '" data-step-id="' + escapeHtml(step.step_id) + '" data-context=\'' + JSON.stringify(context || {}).replace(/'/g, '&#39;') + '\'>Run this step</button>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      panel.innerHTML = html;
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      // textContent → innerHTML escapes &, <, > but leaves " and ' intact,
      // which is unsafe in double-quoted attribute contexts — this file uses
      // escapeHtml both for text and for data-* attributes.
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
