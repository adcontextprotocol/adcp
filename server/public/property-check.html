<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property check | AgenticAdvertising.org</title>
  <meta name="description" content="Check your property list against the registry. See which domains and apps are ready for agent-based transactions.">
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/design-system.css">
  <link rel="stylesheet" href="/layout.css">
  <style>
    body { padding-top: var(--nav-height); }

    .check-container {
      max-width: var(--container-lg);
      margin: 0 auto;
      padding: 0 var(--space-4) var(--space-10);
    }

    .check-header {
      margin-bottom: var(--space-6);
    }
    .check-header h1 {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-2);
    }
    .check-header p {
      color: var(--color-text-muted);
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
    }

    /* Input area */
    .input-area {
      margin-bottom: var(--space-6);
    }
    .input-area textarea {
      width: 100%;
      min-height: 200px;
      padding: var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      resize: vertical;
      background: var(--color-bg-card);
      color: var(--color-text-body);
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--color-primary-400);
      box-shadow: 0 0 0 3px var(--color-primary-50);
    }
    .input-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }
    .btn-check {
      padding: 10px 24px;
      background: var(--color-primary-600);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      cursor: pointer;
      transition: var(--transition-colors);
    }
    .btn-check:hover { background: var(--color-primary-700); }
    .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-hint {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* Summary pills */
    .summary-bar {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition-colors);
    }
    .pill.active { border-color: var(--color-text-heading); }
    .pill-ready { background: var(--color-success-50, #ecfdf5); color: var(--color-success-700, #047857); }
    .pill-known { background: var(--color-warning-50, #fffbeb); color: var(--color-warning-700, #b45309); }
    .pill-ad_infra { background: var(--color-danger-50, #fef2f2); color: var(--color-danger-700, #b91c1c); }
    .pill-unknown { background: var(--color-gray-100); color: var(--color-gray-600); }
    .pill-count { font-weight: var(--font-bold); }

    /* Results */
    .results-area { display: none; }
    .results-area.visible { display: block; }

    .results-actions {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .btn-secondary {
      padding: 6px 14px;
      background: var(--color-bg-card);
      color: var(--color-text-body);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      cursor: pointer;
      transition: var(--transition-colors);
    }
    .btn-secondary:hover { background: var(--color-gray-100); }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }
    .results-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
      color: var(--color-text-muted);
      border-bottom: 2px solid var(--color-border);
    }
    .results-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text-body);
    }
    .results-table tr:hover td { background: var(--color-gray-50); }

    .verdict-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
    }
    .verdict-ready { background: var(--color-success-50, #ecfdf5); color: var(--color-success-700, #047857); }
    .verdict-known { background: var(--color-warning-50, #fffbeb); color: var(--color-warning-700, #b45309); }
    .verdict-ad_infra { background: var(--color-danger-50, #fef2f2); color: var(--color-danger-700, #b91c1c); }
    .verdict-unknown { background: var(--color-gray-100); color: var(--color-gray-600); }

    .action-text {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .loading {
      text-align: center;
      padding: var(--space-8);
      color: var(--color-text-muted);
    }

    .error-msg {
      padding: var(--space-4);
      background: var(--color-danger-50, #fef2f2);
      color: var(--color-danger-700, #b91c1c);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
      display: none;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="check-container">
    <div class="check-header">
      <h1>Property check</h1>
      <p>Paste domains, app bundle IDs, or app store IDs to see what the registry knows about them. One per line, up to 10,000.</p>
    </div>

    <div class="error-msg" id="error"></div>

    <div class="input-area" id="inputArea">
      <textarea id="identifiers" placeholder="nytimes.com
cnn.com
com.spotify.music
331786748
GOOGLE_PLAY_STORE,com.pandora.android"></textarea>
      <div class="input-actions">
        <button class="btn-check" id="checkBtn" onclick="runCheck()">Check properties</button>
        <span class="input-hint">Accepts domains, Android packages, iOS bundles, Apple/Google store IDs, or CSV format</span>
      </div>
    </div>

    <div class="results-area" id="resultsArea">
      <div class="summary-bar" id="summaryBar"></div>

      <div class="results-actions">
        <button class="btn-secondary" onclick="shareReport()">Copy share link</button>
        <button class="btn-secondary" onclick="downloadCsv()">Download CSV</button>
        <button class="btn-secondary" onclick="resetCheck()">New check</button>
      </div>

      <table class="results-table">
        <thead>
          <tr>
            <th>Identifier</th>
            <th>Type</th>
            <th>Verdict</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div class="loading" id="loading" style="display:none">Checking properties...</div>
  </div>

  <script>
    let currentResult = null;
    let currentReportId = null;
    let activeFilter = null;

    async function runCheck() {
      const textarea = document.getElementById('identifiers');
      const lines = textarea.value.split('\n').filter(l => l.trim());
      if (lines.length === 0) return;
      if (lines.length > 10000) {
        showError('Maximum 10,000 identifiers per check');
        return;
      }

      hideError();
      document.getElementById('checkBtn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('resultsArea').classList.remove('visible');

      try {
        const csrfCookie = document.cookie.match(/csrf-token=([^;]+)/)?.[1] || '';
        const resp = await fetch('/api/properties/check/bulk', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfCookie,
          },
          body: JSON.stringify({ identifiers: lines }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        currentResult = data;
        currentReportId = data.report_id;
        renderResults(data);
      } catch (e) {
        showError(e.message);
      } finally {
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderResults(data) {
      activeFilter = null;

      // Summary pills
      const bar = document.getElementById('summaryBar');
      bar.innerHTML = '';
      for (const [verdict, label] of [['ready', 'Ready'], ['known', 'Known'], ['ad_infra', 'Ad infra'], ['unknown', 'Unknown']]) {
        const count = data.summary[verdict] || 0;
        const pill = document.createElement('span');
        pill.className = `pill pill-${verdict}`;
        pill.innerHTML = `<span>${label}</span> <span class="pill-count">${count.toLocaleString()}</span>`;
        pill.onclick = () => toggleFilter(verdict);
        bar.appendChild(pill);
      }

      renderTable(data.entries);

      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('resultsArea').classList.add('visible');
    }

    function renderTable(entries) {
      const tbody = document.getElementById('resultsBody');
      const filtered = activeFilter ? entries.filter(e => e.verdict === activeFilter) : entries;

      tbody.innerHTML = filtered.map(e => `
        <tr>
          <td><code>${escHtml(e.input)}</code></td>
          <td>${e.identifier ? escHtml(e.identifier.type) : '-'}</td>
          <td><span class="verdict-badge verdict-${escHtml(e.verdict)}">${escHtml(e.verdict.replace('_', ' '))}</span></td>
          <td class="action-text">${escHtml(e.action)}</td>
        </tr>
      `).join('');
    }

    function toggleFilter(verdict) {
      activeFilter = activeFilter === verdict ? null : verdict;

      document.querySelectorAll('.pill').forEach(p => {
        p.classList.toggle('active', p.classList.contains(`pill-${activeFilter}`));
      });

      if (currentResult) renderTable(currentResult.entries);
    }

    function shareReport() {
      if (!currentReportId) return;
      const url = `${location.origin}/tools/property-check?report=${currentReportId}`;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy share link'; }, 2000);
      });
    }

    function downloadCsv() {
      if (!currentResult) return;
      const rows = [['input', 'type', 'verdict', 'classification', 'source', 'property_rid', 'action']];
      for (const e of currentResult.entries) {
        rows.push([
          e.input,
          e.identifier?.type || '',
          e.verdict,
          e.classification || '',
          e.source || '',
          e.property_rid || '',
          e.action,
        ]);
      }
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'property-check.csv';
      a.click();
    }

    function resetCheck() {
      currentResult = null;
      currentReportId = null;
      activeFilter = null;
      document.getElementById('inputArea').style.display = '';
      document.getElementById('resultsArea').classList.remove('visible');
    }

    function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('error').style.display = 'none'; }
    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Load report from URL if ?report=UUID
    async function loadReport() {
      const params = new URLSearchParams(location.search);
      const reportId = params.get('report');
      if (!reportId) return;

      document.getElementById('loading').style.display = 'block';
      document.getElementById('inputArea').style.display = 'none';

      try {
        const resp = await fetch(`/api/properties/check/bulk/${encodeURIComponent(reportId)}`);
        if (!resp.ok) throw new Error('Report not found or expired');
        const data = await resp.json();
        currentResult = data;
        currentReportId = reportId;
        renderResults(data);
      } catch (e) {
        showError(e.message);
        document.getElementById('inputArea').style.display = '';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    loadReport();
  </script>
  <script src="/nav.js"></script>
</body>
</html>
