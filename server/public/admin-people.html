<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <title>Admin - People - AgenticAdvertising.org</title>
  <link rel="stylesheet" href="/design-system.css">
  <script src="/nav.js"></script>
  <script src="/admin-sidebar.js"></script>
  <style>
    body {
      background: var(--color-bg-page);
      min-height: 100vh;
    }
    .container {
      max-width: var(--container-xl);
      margin: var(--space-8) auto;
      padding: 0 var(--space-5);
    }
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-bottom: var(--space-5);
      box-shadow: var(--shadow-xs);
    }
    h1 { margin-bottom: var(--space-2_5); color: var(--color-text-heading); }
    .subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      gap: var(--space-4);
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .stat-card {
      background: var(--color-bg-subtle);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: var(--transition-all);
    }
    .stat-card:hover { background: var(--color-brand-bg); }
    .stat-card.active {
      background: var(--color-brand-bg);
      border: 2px solid var(--color-brand);
    }
    .stat-value {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-brand);
    }
    .stat-label {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: var(--space-2_5);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input,
    .filter-bar select {
      padding: var(--space-2) var(--space-3);
      border: var(--border-1) solid var(--color-gray-200);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
    }
    .filter-bar input { min-width: 220px; }

    /* Table */
    .people-table {
      width: 100%;
      border-collapse: collapse;
    }
    .people-table th,
    .people-table td {
      padding: var(--space-3);
      text-align: left;
      border-bottom: var(--border-1) solid var(--color-gray-200);
    }
    .people-table th {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      background: var(--color-bg-subtle);
      font-size: var(--text-sm);
    }
    .people-table tr { cursor: pointer; }
    .people-table tr:hover { background: var(--color-bg-subtle); }
    .person-name {
      font-weight: var(--font-medium);
      color: var(--color-brand);
    }
    .person-email {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .empty-state {
      text-align: center;
      padding: var(--space-10);
      color: var(--color-text-secondary);
    }

    /* Badges */
    .stage-badge {
      display: inline-block;
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
    }
    .stage-prospect { background: var(--color-bg-subtle); color: var(--color-text); }
    .stage-welcomed { background: var(--color-info-100); color: var(--color-info-700); }
    .stage-exploring { background: var(--color-primary-100); color: var(--color-primary-700); }
    .stage-participating { background: var(--color-success-100); color: var(--color-success-700); }
    .stage-contributing { background: var(--color-warning-100); color: var(--color-warning-700); }
    .stage-leading { background: #9c27b020; color: #9c27b0; }

    .channel-icon {
      font-size: var(--text-sm);
    }

    /* Health indicator */
    .health-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: var(--space-1);
      vertical-align: middle;
    }
    .health-good { background: var(--color-success-500); }
    .health-caution { background: var(--color-warning-500); }
    .health-risk { background: var(--color-error-500); }
    .health-opted-out { background: var(--color-gray-400); }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-5);
    }
    .pagination-info {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }
    .pagination-buttons {
      display: flex;
      gap: var(--space-2);
    }
    .btn {
      padding: var(--space-2) var(--space-4);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: var(--transition-all);
    }
    .btn-secondary { background: var(--color-bg-button-secondary); color: var(--color-text-heading); }
    .btn-secondary:hover { background: var(--color-bg-button-secondary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
    }
    .detail-overlay.open { display: block; }
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 600px;
      max-width: 90vw;
      background: var(--color-bg-card);
      box-shadow: var(--shadow-lg);
      z-index: 201;
      overflow-y: auto;
      padding: var(--space-6);
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-5);
      padding-bottom: var(--space-4);
      border-bottom: var(--border-1) solid var(--color-gray-200);
    }
    .detail-close {
      background: none;
      border: none;
      font-size: var(--text-xl);
      cursor: pointer;
      color: var(--color-text-secondary);
      padding: var(--space-1);
    }
    .detail-close:hover { color: var(--color-text-heading); }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .detail-stat {
      background: var(--color-bg-subtle);
      padding: var(--space-3);
      border-radius: var(--radius-sm);
    }
    .detail-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-stat-value {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
    }

    /* Timeline */
    .timeline { margin-top: var(--space-5); }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
    }
    .timeline-header h3 { margin: 0; color: var(--color-text-heading); }
    .timeline-item {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: var(--border-1) solid var(--color-gray-100);
    }
    .timeline-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      flex-shrink: 0;
    }
    .timeline-icon.sent { background: var(--color-primary-100); }
    .timeline-icon.received { background: var(--color-success-100); }
    .timeline-icon.stage { background: var(--color-warning-100); }
    .timeline-icon.skipped { background: var(--color-bg-subtle); }
    .timeline-icon.system { background: var(--color-info-100); }
    .timeline-content { flex: 1; min-width: 0; }
    .timeline-title {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-heading);
    }
    .timeline-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .timeline-data {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      background: var(--color-bg-subtle);
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      margin-top: var(--space-1);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="adcp-nav"></div>
  <div class="container">
    <div class="header-bar">
      <div>
        <h1>People</h1>
        <p class="subtitle">Unified view of all people Addie interacts with</p>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="card">
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search by name, email, or Slack ID...">
        <select id="stageFilter">
          <option value="">All stages</option>
          <option value="prospect">Prospect</option>
          <option value="welcomed">Welcomed</option>
          <option value="exploring">Exploring</option>
          <option value="participating">Participating</option>
          <option value="contributing">Contributing</option>
          <option value="leading">Leading</option>
        </select>
      </div>

      <table class="people-table">
        <thead>
          <tr>
            <th></th>
            <th>Person</th>
            <th>Stage</th>
            <th>Channel</th>
            <th>Last contact</th>
            <th>Interactions</th>
            <th>Unreplied</th>
          </tr>
        </thead>
        <tbody id="peopleBody"></tbody>
      </table>

      <div class="pagination">
        <span class="pagination-info" id="paginationInfo"></span>
        <div class="pagination-buttons">
          <button class="btn btn-secondary" id="prevBtn" onclick="prevPage()" disabled>Previous</button>
          <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail slide-out panel -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()">
    <div class="detail-panel" onclick="event.stopPropagation()">
      <div class="detail-header">
        <div>
          <h2 id="detailName" style="margin: 0; color: var(--color-text-heading);"></h2>
          <p id="detailEmail" style="margin: var(--space-1) 0 0; color: var(--color-text-secondary); font-size: var(--text-sm);"></p>
          <div id="detailBadges" style="margin-top: var(--space-2);"></div>
        </div>
        <button class="detail-close" onclick="closeDetail()">&times;</button>
      </div>

      <div class="detail-stats" id="detailStats"></div>

      <div id="detailSignInActions" style="margin-top: var(--space-4);"></div>

      <div class="timeline">
        <div class="timeline-header">
          <h3>Activity timeline</h3>
        </div>
        <div id="timelineBody"></div>
      </div>
    </div>
  </div>

  <div id="adcp-footer"></div>
  <script>
    const PAGE_SIZE = 50;
    let currentOffset = 0;
    let totalCount = 0;
    let currentStage = '';
    let searchTimeout = null;

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function relativeTime(dateStr) {
      if (!dateStr) return 'Never';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString();
    }

    function healthClass(person) {
      if (person.opted_out) return 'health-opted-out';
      if (person.unreplied_outreach_count >= 3) return 'health-risk';
      if (person.unreplied_outreach_count >= 1) return 'health-caution';
      return 'health-good';
    }

    function channelIcon(ch) {
      if (ch === 'slack') return '<span class="channel-icon" title="Slack">&#x1F4AC;</span>';
      if (ch === 'email') return '<span class="channel-icon" title="Email">&#x1F4E7;</span>';
      if (ch === 'web') return '<span class="channel-icon" title="Web">&#x1F310;</span>';
      return '';
    }

    async function loadStats() {
      try {
        const res = await AdminSidebar.fetch('/api/admin/relationships/stats');
        const data = await res.json();
        const row = document.getElementById('statsRow');

        const total = data.stages.reduce((s, r) => s + r.count, 0);
        let html = `<div class="stat-card ${!currentStage ? 'active' : ''}" onclick="filterStage('')">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total</div>
        </div>`;

        for (const s of data.stages) {
          html += `<div class="stat-card ${currentStage === s.stage ? 'active' : ''}" onclick="filterStage('${s.stage}')">
            <div class="stat-value">${s.count}</div>
            <div class="stat-label">${escapeHtml(s.stage)}</div>
          </div>`;
        }
        row.innerHTML = html;
      } catch (e) {
        console.error('Failed to load stats', e);
      }
    }

    async function loadPeople() {
      try {
        const search = document.getElementById('searchInput').value;
        const stage = document.getElementById('stageFilter').value;
        const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentOffset });
        if (stage) params.set('stage', stage);
        if (search) params.set('search', search);

        const res = await AdminSidebar.fetch('/api/admin/relationships?' + params);
        const data = await res.json();
        totalCount = data.total;

        const tbody = document.getElementById('peopleBody');
        if (data.people.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No people found</td></tr>';
        } else {
          tbody.innerHTML = data.people.map(p => `
            <tr onclick="openDetail('${escapeHtml(p.id)}')">
              <td><span class="health-dot ${healthClass(p)}"></span></td>
              <td>
                <div class="person-name">${escapeHtml(p.display_name || 'Unknown')}</div>
                <div class="person-email">${escapeHtml(p.email || p.slack_user_id || '')}</div>
              </td>
              <td><span class="stage-badge stage-${p.stage}">${escapeHtml(p.stage)}</span></td>
              <td>${channelIcon(p.last_interaction_channel)}</td>
              <td title="${p.last_person_message_at || ''}">${relativeTime(p.last_person_message_at || p.last_addie_message_at)}</td>
              <td>${p.interaction_count || 0}</td>
              <td>${p.unreplied_outreach_count || 0}</td>
            </tr>
          `).join('');
        }

        // Pagination
        document.getElementById('paginationInfo').textContent =
          `Showing ${currentOffset + 1}-${Math.min(currentOffset + PAGE_SIZE, totalCount)} of ${totalCount}`;
        document.getElementById('prevBtn').disabled = currentOffset === 0;
        document.getElementById('nextBtn').disabled = currentOffset + PAGE_SIZE >= totalCount;
      } catch (e) {
        console.error('Failed to load people', e);
        document.getElementById('peopleBody').innerHTML =
          '<tr><td colspan="7" class="empty-state">Failed to load data</td></tr>';
      }
    }

    function filterStage(stage) {
      currentStage = stage;
      document.getElementById('stageFilter').value = stage;
      currentOffset = 0;
      loadStats();
      loadPeople();
    }

    function prevPage() {
      currentOffset = Math.max(0, currentOffset - PAGE_SIZE);
      loadPeople();
    }

    function nextPage() {
      currentOffset += PAGE_SIZE;
      loadPeople();
    }

    async function openDetail(personId) {
      try {
        const res = await AdminSidebar.fetch('/api/admin/relationships/' + personId);
        const data = await res.json();
        const r = data.relationship;

        document.getElementById('detailName').textContent = r.display_name || 'Unknown';
        document.getElementById('detailEmail').textContent = [r.email, r.slack_user_id].filter(Boolean).join(' \u00b7 ');
        document.getElementById('detailBadges').innerHTML = `
          <span class="stage-badge stage-${r.stage}">${escapeHtml(r.stage)}</span>
          ${r.opted_out ? '<span class="stage-badge" style="background:var(--color-error-100);color:var(--color-error-700);margin-left:var(--space-1);">opted out</span>' : ''}
          ${r.sentiment_trend ? '<span style="margin-left:var(--space-2);font-size:var(--text-sm);">' + escapeHtml(r.sentiment_trend) + '</span>' : ''}
        `;

        document.getElementById('detailStats').innerHTML = `
          <div class="detail-stat">
            <div class="detail-stat-label">Messages sent</div>
            <div class="detail-stat-value">${data.counts.messages_sent}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-label">Messages received</div>
            <div class="detail-stat-value">${data.counts.messages_received}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-label">Unreplied outreach</div>
            <div class="detail-stat-value">${r.unreplied_outreach_count}</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-label">Stage changes</div>
            <div class="detail-stat-value">${data.counts.stage_changes}</div>
          </div>
        `;

        // Sign-in credentials (Phase 2b admin tools)
        const signInActions = document.getElementById('detailSignInActions');
        if (r.workos_user_id) {
          await renderSignInCredentials(signInActions, r);
        } else {
          signInActions.innerHTML = '';
        }

        // Load timeline
        const tlRes = await AdminSidebar.fetch('/api/admin/relationships/' + personId + '/timeline?limit=100');
        const tlData = await tlRes.json();
        renderTimeline(tlData.events);

        document.getElementById('detailOverlay').classList.add('open');
      } catch (e) {
        console.error('Failed to load person detail', e);
      }
    }

    async function renderSignInCredentials(container, r) {
      const targetLabel = r.display_name || r.email || 'this user';
      try {
        const res = await AdminSidebar.fetch(`/api/admin/users/${encodeURIComponent(r.workos_user_id)}/credentials`);
        const data = res.ok ? await res.json() : { credentials: [] };
        const creds = data.credentials || [];
        const credRows = creds.map(c => {
          const label = c.email || '(no email)';
          const subtitle = [c.first_name, c.last_name].filter(Boolean).join(' ');
          const primaryBadge = c.is_primary
            ? '<span class="stage-badge" style="background:var(--color-success-100);color:var(--color-success-700);">primary</span>'
            : '';
          const removeBtn = c.is_primary
            ? ''
            : `<button class="btn btn-secondary unbind-cred-btn" style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2);"
                       data-cred-id="${escapeHtml(c.workos_user_id)}"
                       data-cred-email="${escapeHtml(c.email || '')}"
                       data-host-id="${escapeHtml(r.workos_user_id)}"
                       data-target-label="${escapeHtml(targetLabel)}">Remove</button>`;
          return `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-2) 0; border-bottom: 1px solid var(--color-gray-200);">
              <div>
                <div style="font-size: var(--text-sm);">${escapeHtml(label)} ${primaryBadge}</div>
                <div style="font-size: var(--text-xs); color: var(--color-text-secondary); font-family: monospace;">${escapeHtml(c.workos_user_id)}${subtitle ? ' · ' + escapeHtml(subtitle) : ''}</div>
              </div>
              ${removeBtn}
            </div>
          `;
        }).join('');

        container.innerHTML = `
          <h3 style="margin: 0 0 var(--space-2); font-size: var(--text-base);">Sign-in credentials</h3>
          <p style="margin: 0 0 var(--space-2); color: var(--color-text-secondary); font-size: var(--text-sm);">
            Each row is a WorkOS user that can sign in to <strong>${escapeHtml(targetLabel)}</strong>'s workspace.
          </p>
          <div style="margin-bottom: var(--space-3);">${credRows || '<p class="empty-state" style="padding: var(--space-3) 0;">No bindings.</p>'}</div>
          <div style="display: flex; gap: var(--space-2); flex-wrap: wrap;">
            <button class="btn btn-secondary" id="bindEmailBtn"
                    data-workos-user-id="${escapeHtml(r.workos_user_id)}"
                    data-target-name="${escapeHtml(r.display_name || '')}"
                    data-target-email="${escapeHtml(r.email || '')}">
              + Add sign-in email
            </button>
            <button class="btn btn-secondary" id="linkExistingBtn"
                    data-workos-user-id="${escapeHtml(r.workos_user_id)}"
                    data-target-name="${escapeHtml(r.display_name || '')}"
                    data-target-email="${escapeHtml(r.email || '')}">
              + Link existing WorkOS user
            </button>
          </div>
        `;

        document.getElementById('bindEmailBtn').addEventListener('click', (ev) => {
          const btn = ev.currentTarget;
          bindAnotherEmail(btn.dataset.workosUserId, btn.dataset.targetName, btn.dataset.targetEmail);
        });
        document.getElementById('linkExistingBtn').addEventListener('click', (ev) => {
          const btn = ev.currentTarget;
          linkExistingWorkosUser(btn.dataset.workosUserId, btn.dataset.targetName, btn.dataset.targetEmail);
        });
        container.querySelectorAll('.unbind-cred-btn').forEach(btn => {
          btn.addEventListener('click', (ev) => {
            const b = ev.currentTarget;
            unbindCredential(b.dataset.hostId, b.dataset.credId, b.dataset.credEmail, b.dataset.targetLabel);
          });
        });
      } catch (e) {
        container.innerHTML = `<p class="empty-state">Failed to load credentials: ${escapeHtml(e.message || String(e))}</p>`;
      }
    }

    async function linkExistingWorkosUser(workosUserId, targetName, targetEmail) {
      const targetLabel = targetName ? `${targetName} (${targetEmail || 'no email'})` : (targetEmail || 'this user');
      const credId = prompt(`Bind an existing WorkOS user to ${targetLabel}.\n\nEnter the WorkOS user id (starts with "user_"). Find it in the WorkOS Dashboard → Users.\n\nThis is for cases where the email already has a WorkOS user (e.g., a prior merge left it alive). Any app-state on that WorkOS user moves to ${targetLabel}.`);
      if (!credId) return;
      const trimmed = credId.trim();
      if (!trimmed.startsWith('user_')) {
        alert('That doesn\'t look like a WorkOS user id (should start with "user_").');
        return;
      }
      if (targetEmail) {
        const typed = prompt(`To confirm: type the target user's existing primary email exactly.\n\n  Target user: ${targetLabel}\n  WorkOS user to bind: ${trimmed}\n\nThis grants permanent sign-in access. Any app-state on the bound WorkOS user is moved to the target.`);
        if (typed === null) return;
        if (typed.trim().toLowerCase() !== targetEmail.trim().toLowerCase()) {
          alert('Confirmation email did not match. Cancelled.');
          return;
        }
      } else {
        if (!confirm(`Bind ${trimmed} to ${targetLabel}?`)) return;
      }
      try {
        const res = await AdminSidebar.fetch(`/api/admin/users/${encodeURIComponent(workosUserId)}/credentials`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workos_user_id: trimmed }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || data.error || `Link failed (${res.status})`);
          return;
        }
        alert(data.message || 'WorkOS user linked.');
      } catch (e) {
        alert('Network error: ' + (e && e.message ? e.message : String(e)));
      }
    }

    async function unbindCredential(hostId, credId, credEmail, targetLabel) {
      if (!confirm(`Remove sign-in credential ${credEmail || credId} from ${targetLabel}?\n\nThe WorkOS user stays alive in WorkOS but will no longer be associated with this account. Sign-ins via that email will reach an empty workspace.\n\nThis cannot be undone via this UI (you'd need to re-bind manually).`)) return;
      try {
        const res = await AdminSidebar.fetch(`/api/admin/users/${encodeURIComponent(hostId)}/credentials/${encodeURIComponent(credId)}`, {
          method: 'DELETE',
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || data.error || `Unbind failed (${res.status})`);
          return;
        }
        alert(data.message || 'Credential unbound.');
      } catch (e) {
        alert('Network error: ' + (e && e.message ? e.message : String(e)));
      }
    }

    async function bindAnotherEmail(workosUserId, targetName, targetEmail) {
      const targetLabel = targetName ? `${targetName} (${targetEmail || 'no email'})` : (targetEmail || 'this user');
      const email = prompt(`Enter a new sign-in email for ${targetLabel}.\n\nA fresh WorkOS account will be created at that email and bound to this user's identity. They will be able to sign in with either email.\n\nOnly use this when you've confirmed the email belongs to this person.`);
      if (!email) return;
      const trimmed = email.trim().toLowerCase();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) {
        alert('That doesn\'t look like a valid email address.');
        return;
      }
      // Require typing the target user's existing primary email to confirm.
      // Defends against an admin acting on the wrong row (left the panel open
      // on someone else, hit refresh wrong, etc.).
      if (targetEmail) {
        const typed = prompt(`To confirm: type the user's existing primary email exactly.\n\n  Target user: ${targetLabel}\n  New sign-in email: ${trimmed}\n\nThis will grant permanent sign-in access to the target account at the new email.`);
        if (typed === null) return;
        if (typed.trim().toLowerCase() !== targetEmail.trim().toLowerCase()) {
          alert('Confirmation email did not match. Cancelled.');
          return;
        }
      } else {
        if (!confirm(`Bind ${trimmed} as a sign-in email for ${targetLabel}?\n\nThis grants permanent sign-in access.`)) return;
      }
      try {
        const res = await AdminSidebar.fetch(`/api/admin/users/${encodeURIComponent(workosUserId)}/linked-emails`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: trimmed }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || data.error || `Bind failed (${res.status})`);
          return;
        }
        alert(data.message || 'Sign-in email bound.');
      } catch (e) {
        alert('Network error: ' + (e && e.message ? e.message : String(e)));
      }
    }

    function eventIcon(type) {
      const map = {
        message_sent: { icon: '\u2197\uFE0F', cls: 'sent' },
        message_received: { icon: '\u2199\uFE0F', cls: 'received' },
        stage_changed: { icon: '\u2B50', cls: 'stage' },
        outreach_skipped: { icon: '\u23ED\uFE0F', cls: 'skipped' },
        outreach_decided: { icon: '\u{1F3AF}', cls: 'system' },
        opted_out: { icon: '\u{1F6D1}', cls: 'skipped' },
      };
      return map[type] || { icon: '\u2022', cls: 'system' };
    }

    function renderTimeline(events) {
      const body = document.getElementById('timelineBody');
      if (!events || events.length === 0) {
        body.innerHTML = '<p class="empty-state">No events recorded yet</p>';
        return;
      }

      body.innerHTML = events.map(e => {
        const ei = eventIcon(e.event_type);
        const dataStr = e.data && Object.keys(e.data).length > 0
          ? `<div class="timeline-data">${escapeHtml(JSON.stringify(e.data, null, 2))}</div>`
          : '';
        return `
          <div class="timeline-item">
            <div class="timeline-icon ${ei.cls}">${ei.icon}</div>
            <div class="timeline-content">
              <div class="timeline-title">${escapeHtml(e.event_type.replace(/_/g, ' '))}</div>
              <div class="timeline-meta">${relativeTime(e.occurred_at)} ${e.channel ? '\u00b7 ' + escapeHtml(e.channel) : ''}</div>
              ${dataStr}
            </div>
          </div>
        `;
      }).join('');
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
    }

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    // Search debounce
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentOffset = 0;
        loadPeople();
      }, 300);
    });

    document.getElementById('stageFilter').addEventListener('change', () => {
      currentStage = document.getElementById('stageFilter').value;
      currentOffset = 0;
      loadStats();
      loadPeople();
    });

    // Init
    loadStats();
    loadPeople();
  </script>
</body>
</html>
