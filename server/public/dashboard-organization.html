            : trackData.status === 'partial' ? 'Partial' : trackData.status;

          let html = '<h4>' + escapeHtml(track) + ' — ' + escapeHtml(statusLabel) + '</h4>';
          html += '<div>' + parseInt(trackData.passed_count, 10) + ' of ' + parseInt(trackData.scenario_count, 10) + ' scenarios passing';
          if (trackData.duration_ms) html += ' (' + (trackData.duration_ms / 1000).toFixed(1) + 's)';
          html += '</div>';

          // If the run has scenario-level details (from tracks_json with scenarios)
          if (trackData.scenarios) {
            for (const s of trackData.scenarios) {
              const cls = s.overall_passed ? 'track-scenario--pass' : 'track-scenario--fail';
              html += '<div class="track-scenario ' + cls + '">';
              html += '<div class="track-scenario-name">' + escapeHtml(s.name) + '</div>';
              if (!s.overall_passed && s.steps) {
                html += '<div class="track-scenario-steps">';
                for (const st of s.steps) {
                  if (!st.passed) {
                    html += '<div class="track-step--fail">' + escapeHtml(st.name);
                    if (st.error) html += ': ' + escapeHtml(String(st.error).substring(0, 200));
                    html += '</div>';
                  }
                }
                html += '</div>';
              }
              html += '</div>';
            }
          }

          detailEl.innerHTML = html;
        } catch {
          detailEl.innerHTML = '<em>Failed to load track details.</em>';
        }
        return;
      }

      // History button click
      const historyBtn = e.target.closest('.agent-history-btn');
      if (historyBtn) {
        const agentUrl = historyBtn.dataset.agentUrl;
        const cardId = historyBtn.dataset.cardId;
        const panel = document.getElementById(cardId + '-history');
        if (!panel) return;

        if (panel.style.display !== 'none') {
          panel.style.display = 'none';
          return;
        }
        panel.style.display = 'block';
        panel.innerHTML = '<em>Loading history...</em>';

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/compliance/history?limit=10', { credentials: 'include' });
          const data = await res.json();

          if (!data.runs || data.runs.length === 0) {
            panel.innerHTML = '<em>No compliance history yet.</em>';
            return;
          }

          let html = '<div style="font-weight:var(--font-semibold);margin-bottom:var(--space-2);">Compliance History</div>';
          for (const run of data.runs) {
            const dotColor = run.overall_status === 'passing' ? 'var(--color-success-500)'
              : run.overall_status === 'failing' ? 'var(--color-error-500)'
              : 'var(--color-warning-500)';
            const date = new Date(run.tested_at).toLocaleString();

            // Track pills for this run
            let runTracks = '';
            if (run.tracks_json) {
              for (const t of run.tracks_json) {
                const cls = t.status === 'pass' ? 'agent-track--pass'
                  : t.status === 'fail' ? 'agent-track--fail'
                  : t.status === 'partial' ? 'agent-track--partial'
                  : 'agent-track--skip';
                runTracks += '<span class="agent-track ' + cls + '" style="cursor:default;">' + escapeHtml(t.track) + '</span>';
              }
            }

            html += '<div class="history-run">';
            html += '<span class="history-run-dot" style="background:' + dotColor + ';"></span>';
            html += '<span>' + escapeHtml(date) + '</span>';
            html += '<span>' + escapeHtml(run.overall_status) + '</span>';
            html += '<span>' + parseInt(run.tracks_passed, 10) + '/' + (parseInt(run.tracks_passed, 10) + parseInt(run.tracks_failed, 10) + parseInt(run.tracks_partial, 10)) + ' tracks</span>';
            html += '</div>';
            if (runTracks) {
              html += '<div style="padding:var(--space-1) 0 var(--space-2) var(--space-5);display:flex;gap:3px;flex-wrap:wrap;">' + runTracks + '</div>';
            }
          }
          panel.innerHTML = html;
        } catch {
          panel.innerHTML = '<em>Failed to load history.</em>';
        }
      }
    });

    // Store current org ID
    let currentOrgId = null;

    async function openBillingPortal(orgId) {
      try {
        const res = await fetch(`/api/organizations/${orgId}/billing/portal`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.error || 'Unable to open billing portal. Please try again.');
          return;
        }
        const data = await res.json();
        if (data.portal_url) window.location.href = data.portal_url;
      } catch (e) {
        alert('Unable to open billing portal. Please try again.');
      }
    }

    // Event delegation for nudge buttons (avoids inline onclick XSS risk)
    document.addEventListener('click', async function(e) {
      const btn = e.target.closest('.nudge-btn');
      if (!btn) return;

      const targetUserId = btn.dataset.userId;
      if (!targetUserId) return;

      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch('/api/me/org-health/nudge', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target_user_id: targetUserId, topic: 'certification' }),
        });
        if (res.ok) {
          btn.textContent = 'Sent';
          btn.style.color = 'var(--color-success-500)';
        } else {
          const err = await res.json().catch(() => ({}));
          btn.textContent = 'Failed';
          btn.disabled = false;
          console.error('Nudge failed:', err);
        }
      } catch (e) {
        btn.textContent = 'Failed';
        btn.disabled = false;
        console.error('Nudge error:', e);
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function fmtDate(s) {
      try { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch { return String(s); }
    }

    function relDate(s) {
      try {
        const d = Math.floor((Date.now() - new Date(s)) / 86400000);
        if (d === 0) return 'Today';
        if (d === 1) return '1 day ago';
        if (d < 7)  return d + ' days ago';
        if (d < 30) return Math.floor(d / 7) + 'w ago';
        if (d < 365) return Math.floor(d / 30) + 'mo ago';
        return fmtDate(s);
      } catch { return String(s); }
    }
  </script>
</body>
</html>
