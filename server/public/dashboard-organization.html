<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member settings - AgenticAdvertising.org</title>
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/design-system.css">
  <script src="/nav.js"></script>
  <script src="/dashboard-nav.js"></script>
  <style>
    body {
      background: var(--color-bg-page);
    }

    .hub-container {
      max-width: var(--container-xl);
      margin: 0 auto;
      padding: var(--space-8) var(--space-4);
    }

    /* =========================================================================
       Header
       ========================================================================= */
    .hub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
      flex-wrap: wrap;
    }

    .hub-header-left { flex: 1; min-width: 0; }

    .hub-header h1 {
      font-size: var(--text-3xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      margin-bottom: var(--space-2);
    }

    .hub-header-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      background: var(--color-primary-100);
      color: var(--color-brand);
    }
    .level-badge-founding {
      background: var(--color-warning-100);
      color: var(--color-warning-700);
    }

    .level-badge-num {
      font-size: var(--text-xs);
      opacity: 0.7;
    }

    .stage-desc {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    /* Score ring */
    .score-ring {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--color-gray-200); stroke-width: 6; }
    .score-ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s var(--ease-out); }
    .score-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-ring-value { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--color-text-heading); line-height: var(--leading-none); }
    .score-ring-caption { font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wider); }

    /* Health score layout */
    .health-score-layout {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      margin-bottom: var(--space-5);
    }
    .health-score-number {
      text-align: center;
      min-width: 80px;
    }
    .health-score-value {
      font-size: var(--text-4xl);
      font-weight: var(--font-bold);
      line-height: var(--leading-none);
    }
    .health-score-label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }
    .health-score-status {
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
      margin-top: var(--space-1);
    }
    .health-signal-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
    }
    .health-signal-card {
      padding: var(--space-3);
      background: var(--color-bg-subtle);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .health-signal-value {
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
    }
    .health-signal-label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }
    .health-action-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .health-action-label {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-heading);
    }
    .health-action-impact {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* People table */
    .people-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
    .people-table thead tr { border-bottom: 2px solid var(--color-border); text-align: left; }
    .people-table th { padding: var(--space-2) var(--space-3); color: var(--color-text-secondary); font-weight: var(--font-medium); }
    .people-table tbody tr { border-bottom: 1px solid var(--color-border); }
    .people-table tbody td { padding: var(--space-2) var(--space-3); }
    .people-table tbody tr:hover { background: var(--color-bg-subtle); }

    /* Champions */
    .champion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--space-3);
    }
    .champion-card {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--color-success-50);
      border: 1px solid var(--color-success-200);
      border-radius: var(--radius-lg);
    }
    .champion-name {
      font-weight: var(--font-medium);
      color: var(--color-text-heading);
    }
    .champion-highlights {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    /* =========================================================================
       Journey card with levels
       ========================================================================= */
    .journey-card {
      background: var(--color-bg-card);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--card-radius);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .journey-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .journey-card-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
    }

    .next-level-hint {
      font-size: var(--text-sm);
      color: var(--color-brand);
    }

    /* Level stepper */
    .level-stepper {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: var(--space-6);
      overflow-x: auto;
      padding-bottom: var(--space-2);
      -webkit-overflow-scrolling: touch;
    }

    .level-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 72px;
      position: relative;
    }

    .level-step-dot {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      border: var(--border-2) solid var(--color-gray-300);
      background: var(--color-bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-muted);
      transition: var(--transition-all);
    }

    .level-step--completed .level-step-dot {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: white;
    }

    .level-step--current .level-step-dot {
      background: var(--color-brand);
      border-color: var(--color-brand);
      color: white;
      box-shadow: 0 0 0 4px var(--color-primary-100);
    }

    .level-step-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-2);
      text-align: center;
      text-transform: capitalize;
    }

    .level-step--completed .level-step-label,
    .level-step--current .level-step-label {
      color: var(--color-text-heading);
      font-weight: var(--font-medium);
    }

    .level-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: calc(50% + 16px);
      right: calc(-50% + 16px);
      height: 2px;
      background: var(--color-gray-200);
      z-index: 0;
    }

    .level-step--completed:not(:last-child)::after { background: var(--color-brand); }

    /* Achievements grid */
    .achievements-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .achievement {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      transition: var(--transition-all);
    }

    .achievement--earned {
      background: var(--color-success-50);
      border: var(--border-1) solid var(--color-success-200);
    }

    .achievement--locked {
      background: var(--color-bg-subtle);
      border: var(--border-1) dashed var(--color-border);
    }

    .achievement-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      flex-shrink: 0;
    }

    .achievement--earned .achievement-icon {
      background: var(--color-success-100);
    }

    .achievement--locked .achievement-icon {
      background: var(--color-gray-100);
      filter: grayscale(1);
      opacity: 0.5;
    }

    .achievement-body { flex: 1; min-width: 0; }

    .achievement-name {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      margin-bottom: 2px;
    }

    .achievement--locked .achievement-name { color: var(--color-text-secondary); }

    .achievement-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .achievement-unlocks {
      font-size: var(--text-xs);
      color: var(--color-brand);
      font-weight: 500;
      margin-top: 2px;
    }

    .achievement-action {
      font-size: var(--text-xs);
      color: var(--color-brand);
      text-decoration: none;
      font-weight: var(--font-medium);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .achievement-action:hover { text-decoration: underline; }

    /* =========================================================================
       Grid
       ========================================================================= */
    .hub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }

    /* =========================================================================
       Cards
       ========================================================================= */
    .hub-card {
      background: var(--color-bg-card);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--card-radius);
      padding: var(--space-6);
    }

    .hub-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
    }

    .hub-card-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
    }

    .hub-card-link {
      font-size: var(--text-sm);
      color: var(--color-brand);
      text-decoration: none;
      font-weight: var(--font-medium);
    }

    .hub-card-link:hover { text-decoration: underline; }

    /* =========================================================================
       Agent Compliance
       ========================================================================= */
    .agent-compliance-card {
      padding: var(--space-4);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-3);
    }
    .agent-compliance-card:last-child { margin-bottom: 0; }

    .agent-compliance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .agent-hostname {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      font-size: var(--text-sm);
    }

    .agent-status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .agent-status-dot--passing { background: var(--color-success-500); }
    .agent-status-dot--degraded { background: var(--color-warning-500); }
    .agent-status-dot--failing { background: var(--color-error-500); }
    .agent-status-dot--unknown { background: var(--color-gray-400); }

    .agent-status-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .agent-streak {
      padding: 1px var(--space-2);
      background: var(--color-success-50);
      color: var(--color-success-700);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--font-semibold);
    }

    .agent-headline {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-2);
    }

    .agent-tracks {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-top: var(--space-2);
    }

    .agent-track {
      padding: 1px var(--space-2);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--font-semibold);
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .agent-track:hover { opacity: 0.8; }
    .agent-track.active { outline: 2px solid var(--color-primary-500); outline-offset: 1px; }

    .agent-track-detail {
      margin-top: var(--space-3);
      padding: var(--space-3);
      background: var(--color-gray-50);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
    }
    .agent-track-detail h4 { margin: 0 0 var(--space-2); font-size: var(--text-sm); }
    .track-scenario { padding: var(--space-1) 0; border-bottom: 1px solid var(--color-gray-200); }
    .track-scenario:last-child { border-bottom: none; }
    .track-scenario-name { font-weight: var(--font-semibold); }
    .track-scenario--pass .track-scenario-name::before { content: '\2713 '; color: var(--color-success-600); }
    .track-scenario--fail .track-scenario-name::before { content: '\2717 '; color: var(--color-error-600); }
    .track-scenario-steps { margin-top: var(--space-1); padding-left: var(--space-4); color: var(--color-text-muted); }
    .track-step--fail { color: var(--color-error-600); }

    .agent-history-btn {
      background: none;
      border: none;
      color: var(--color-primary-600);
      font-size: var(--text-xs);
      cursor: pointer;
      padding: 0;
    }
    .agent-history-btn:hover { text-decoration: underline; }

    .agent-history-panel {
      margin-top: var(--space-3);
      font-size: var(--text-xs);
    }
    .history-run {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-gray-200);
      cursor: pointer;
    }
    .history-run:last-child { border-bottom: none; }
    .history-run:hover { background: var(--color-gray-50); }
    .history-run-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-run-detail { display: none; padding: var(--space-2) var(--space-4); font-size: var(--text-xs); color: var(--color-text-muted); }
    .agent-track--pass { background: var(--color-success-100); color: var(--color-success-700); }
    .agent-track--fail { background: var(--color-error-100); color: var(--color-error-700); }
    .agent-track--partial { background: var(--color-warning-100); color: var(--color-warning-700); }
    .agent-track--skip { background: var(--color-gray-100); color: var(--color-gray-600); }

    .agent-sparkline {
      display: flex;
      gap: 2px;
      margin-top: var(--space-2);
      height: 16px;
      align-items: flex-end;
    }

    .agent-sparkline-bar {
      flex: 1;
      min-width: 4px;
      max-width: 16px;
      height: 100%;
      border-radius: 2px;
    }

    .agent-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-2);
    }
    .agent-action-link {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      color: var(--color-primary-600);
      text-decoration: none;
    }
    .agent-action-link:hover {
      text-decoration: underline;
    }
    .agent-auth-section {
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: var(--border-1) solid var(--color-border);
    }
    .agent-auth-status {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .agent-lifecycle-select {
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border: var(--border-1) solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .agent-toggle {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      cursor: pointer;
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    .agent-toggle input { cursor: pointer; }
    .agent-toggle-label { user-select: none; }

    /* =========================================================================
       Persona
       ========================================================================= */
    .persona-display { text-align: center; padding: var(--space-4) 0; }

    .persona-icon {
      width: 56px; height: 56px;
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-2xl);
      margin: 0 auto var(--space-4);
    }

    .persona--molecule_builder  { --p-bg: var(--color-primary-100); --p-text: var(--color-primary-700); }
    .persona--data_decoder      { --p-bg: var(--color-success-100); --p-text: var(--color-success-700); }
    .persona--pureblood_protector { --p-bg: var(--color-error-100); --p-text: var(--color-error-700); }
    .persona--resops_integrator { --p-bg: var(--color-warning-100); --p-text: var(--color-warning-700); }
    .persona--ladder_climber    { --p-bg: var(--color-info-100); --p-text: var(--color-info-700); }
    .persona--simple_starter    { --p-bg: var(--color-gray-100); --p-text: var(--color-gray-600); }
    .persona--pragmatic_builder { --p-bg: var(--color-warning-50); --p-text: var(--color-warning-600); }

    .persona-icon { background: var(--p-bg, var(--color-gray-100)); color: var(--p-text, var(--color-gray-600)); }

    .persona-name { font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--color-text-heading); margin-bottom: var(--space-1); }
    .persona-desc { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--space-3); }
    .persona-source { font-size: var(--text-xs); color: var(--color-text-muted); }
    .persona-aspiration { font-size: var(--text-xs); color: var(--color-brand); margin-top: var(--space-2); }

    .persona-cta { text-align: center; padding: var(--space-6) var(--space-4); }
    .persona-cta-icon {
      width: 56px; height: 56px;
      border-radius: var(--radius-xl);
      background: var(--color-gray-100);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-2xl);
      margin: 0 auto var(--space-4);
      color: var(--color-text-muted);
    }
    .persona-cta p { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--space-4); }

    /* =========================================================================
       Group recommendations
       ========================================================================= */
    .group-rec-count { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--space-4); }

    .group-rec-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: var(--border-1) solid var(--color-border);
    }
    .group-rec-item:last-child { border-bottom: none; }

    .group-rec-info { flex: 1; min-width: 0; }
    .group-rec-name { font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-text-heading); margin-bottom: var(--space-0.5); }
    .group-rec-reason { font-size: var(--text-xs); color: var(--color-text-muted); }

    .group-rec-badge {
      display: inline-flex;
      padding: var(--space-0.5) var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
      background: var(--color-gray-100); color: var(--color-gray-600);
      flex-shrink: 0;
    }

    .group-rec-link { font-size: var(--text-xs); color: var(--color-brand); text-decoration: none; font-weight: var(--font-medium); white-space: nowrap; flex-shrink: 0; }
    .group-rec-link:hover { text-decoration: underline; }

    /* =========================================================================
       Public profile card
       ========================================================================= */
    .profile-card-body { display: flex; flex-direction: column; gap: var(--space-4); }

    .profile-completeness { margin-bottom: var(--space-2); }

    .profile-completeness-label {
      display: flex; justify-content: space-between;
      font-size: var(--text-xs); color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .profile-completeness-bar {
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--color-gray-200);
      overflow: hidden;
    }

    .profile-completeness-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-brand);
      transition: width 0.6s var(--ease-out);
    }

    .profile-completeness-fill--full { background: var(--color-success-500); }

    .profile-field {
      display: flex; gap: var(--space-3); align-items: flex-start;
    }

    .profile-field-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      min-width: 64px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .profile-field-value {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-field-value--empty { color: var(--color-text-muted); font-style: italic; }

    .profile-logo-preview {
      display: flex; gap: var(--space-2); align-items: center;
    }

    .profile-logo-preview img {
      max-height: 28px;
      max-width: 80px;
      object-fit: contain;
    }

    .profile-logo-placeholder {
      width: 48px; height: 28px;
      background: var(--color-gray-100);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xs); color: var(--color-text-muted);
    }

    .profile-offerings {
      display: flex; flex-wrap: wrap; gap: var(--space-1);
    }

    .profile-offering-tag {
      display: inline-flex;
      padding: 2px var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 11px;
      background: var(--color-primary-100);
      color: var(--color-primary-700);
    }

    /* =========================================================================
       Activity
       ========================================================================= */
    .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

    .activity-metric {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--color-bg-subtle);
    }

    .activity-metric:nth-child(1) { background: var(--color-primary-50); }
    .activity-metric:nth-child(2) { background: var(--color-success-50); }
    .activity-metric:nth-child(3) { background: var(--color-warning-50); }
    .activity-metric:nth-child(4) { background: var(--color-info-50); }

    .activity-value { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading); line-height: var(--leading-tight); margin-bottom: var(--space-1); }
    .activity-label { font-size: var(--text-xs); color: var(--color-text-secondary); }

    /* =========================================================================
       Timeline
       ========================================================================= */
    .timeline { position: relative; padding-left: var(--space-6); }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--color-gray-200); }

    .timeline-entry { position: relative; padding-bottom: var(--space-5); }
    .timeline-entry:last-child { padding-bottom: 0; }

    .timeline-dot {
      position: absolute;
      left: calc(-1 * var(--space-6) + 4px); top: 2px;
      width: 10px; height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-brand);
      border: var(--border-2) solid var(--color-bg-card);
    }

    .timeline-date { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: var(--space-1); }
    .timeline-transition { font-size: var(--text-sm); color: var(--color-text-heading); font-weight: var(--font-medium); margin-bottom: var(--space-0.5); }
    .timeline-trigger { font-size: var(--text-xs); color: var(--color-text-secondary); }
    .timeline-empty { font-size: var(--text-sm); color: var(--color-text-muted); text-align: center; padding: var(--space-6) 0; }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: capitalize; letter-spacing: var(--tracking-wide);
      background: var(--color-primary-100); color: var(--color-brand);
    }

    /* =========================================================================
       Content contributions
       ========================================================================= */
    .content-table { width: 100%; border-collapse: collapse; }
    .content-table th {
      text-align: left; font-size: var(--text-xs); font-weight: var(--font-semibold);
      color: var(--color-text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wide);
      padding: var(--space-2) var(--space-3); border-bottom: var(--border-2) solid var(--color-border);
    }
    .content-table td { font-size: var(--text-sm); color: var(--color-text-secondary); padding: var(--space-3); border-bottom: var(--border-1) solid var(--color-border); }
    .content-table tr:last-child td { border-bottom: none; }
    .content-title { font-weight: var(--font-medium); color: var(--color-text-heading); }

    .status-badge {
      display: inline-flex;
      padding: var(--space-0.5) var(--space-2);
      border-radius: var(--badge-radius);
      font-size: 10px; font-weight: var(--font-semibold);
      text-transform: uppercase; letter-spacing: var(--tracking-wide);
    }
    .status-badge--published { background: var(--color-success-100); color: var(--color-success-700); }
    .status-badge--pending_review { background: var(--color-warning-100); color: var(--color-warning-700); }
    .status-badge--draft { background: var(--color-gray-100); color: var(--color-gray-600); }

    /* =========================================================================
       Loading / empty
       ========================================================================= */
    .hub-loading {
      text-align: center; padding: var(--space-16); color: var(--color-text-muted);
    }
    .hub-loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--color-border); border-top-color: var(--color-brand);
      border-radius: var(--radius-full);
      animation: spin 1s linear infinite;
      margin: 0 auto var(--space-4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hub-empty { text-align: center; padding: var(--space-6); color: var(--color-text-muted); font-size: var(--text-sm); }
    .hub-empty a { color: var(--color-brand); text-decoration: none; font-weight: var(--font-medium); }
    .hub-empty a:hover { text-decoration: underline; }

    /* =========================================================================
       Responsive
       ========================================================================= */
    @media (max-width: 768px) {
      .hub-grid { grid-template-columns: 1fr; }
      .hub-header { flex-direction: column; align-items: flex-start; }
      .score-ring { align-self: flex-start; }
      .achievements-grid { grid-template-columns: 1fr; }
      .activity-grid { grid-template-columns: 1fr 1fr; }

      .content-table thead { display: none; }
      .content-table, .content-table tbody, .content-table tr, .content-table td { display: block; }
      .content-table tr { padding: var(--space-3) 0; border-bottom: var(--border-1) solid var(--color-border); }
      .content-table td { padding: var(--space-1) var(--space-3); border-bottom: none; }
      .content-table td::before { content: attr(data-label); font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); display: block; margin-bottom: var(--space-0.5); }

      .health-score-layout { flex-direction: column; align-items: flex-start; }
      .health-signal-grid { grid-template-columns: repeat(2, 1fr); }

      .people-table thead { display: none; }
      .people-table, .people-table tbody, .people-table tr, .people-table td { display: block; }
      .people-table tr { padding: var(--space-3) 0; border-bottom: var(--border-1) solid var(--color-border); }
      .people-table td { padding: var(--space-1) var(--space-3); border-bottom: none; }
      .people-table td::before { content: attr(data-label); font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wide); display: block; margin-bottom: var(--space-0.5); }

      .champion-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- AAO top navigation -->
  <div id="adcp-nav"></div>

  <div class="hub-container">
    <div id="hub-loading" class="hub-loading">
      <div class="spinner"></div>
      <p>Loading your member hub...</p>
    </div>

    <div id="hub-content" style="display: none;"></div>
  </div>

  <div id="adcp-footer"></div>

  <script>
    const config = window.__APP_CONFIG__ || {};
    if (!config.user) {
      window.location.href = '/auth/login?return_to=/organization';
    }

    document.addEventListener('DOMContentLoaded', loadHub);

    async function loadHub() {
      try {
        // Fetch user data first to resolve which org to show
        const meRes = await fetch('/api/me', { credentials: 'include' });
        if (!meRes.ok) {
          if (meRes.status === 401) {
            window.location.href = '/auth/login?return_to=/organization';
            return;
          }
          throw new Error('Failed to load user data');
        }
        const meData = await meRes.json();
        const orgs = meData?.organizations || [];
        let { org: currentOrg } = DashboardNav.resolveOrg(orgs);
        // On the org dashboard, default to the first non-personal org
        if (!currentOrg && orgs.length > 0) {
          currentOrg = orgs.find(o => !o.is_personal) || orgs[0];
        }

        // Now fetch engagement + profile + health scoped to the selected org
        const orgParam = currentOrg?.id ? `?org=${encodeURIComponent(currentOrg.id)}` : '';
        const [engRes, profileRes, healthRes] = await Promise.all([
          fetch(`/api/me/engagement${orgParam}`, { credentials: 'include' }),
          fetch(`/api/me/member-profile${orgParam}`, { credentials: 'include' }),
          fetch('/api/me/org-health', { credentials: 'include' }),
        ]);

        if (!engRes.ok) {
          if (engRes.status === 401) {
            window.location.href = '/auth/login?return_to=/organization';
            return;
          }
          if (engRes.status === 404) {
            document.getElementById('hub-loading').innerHTML =
              '<p style="color:var(--color-text-secondary)">Your account is not yet associated with a member organization. ' +
              '<a href="/membership">Learn about membership</a>.</p>';
            return;
          }
          throw new Error('Failed to load engagement data');
        }

        const data = await engRes.json();
        const profileData = profileRes.ok ? await profileRes.json() : null;
        DashboardNav.init({
          showOrgSwitcher: orgs.length > 1,
          currentOrgName: currentOrg?.name || data.organization_name || 'My organization',
          showAdmin: meData?.user?.isAdmin || meData?.isAdmin || false,
          orgId: currentOrg?.id || null,
          orgRole: currentOrg?.role || 'member',
          isPersonal: currentOrg?.is_personal || false,
        });

        // Set up org switcher callback for multi-org users
        if (orgs.length > 1) {
          DashboardNav.setOrgOptions(orgs, currentOrg?.id, (newOrgId) => {
            localStorage.setItem('selectedOrgId', newOrgId);
            const url = new URL(window.location);
            url.searchParams.set('org', newOrgId);
            window.location.href = url.toString();
          });
        }

        // Fetch certification summary for this org (non-blocking)
        let certSummary = null;
        if (currentOrg?.id) {
          try {
            const certRes = await fetch(`/api/organizations/${currentOrg.id}/certification-summary`, { credentials: 'include' });
            if (certRes.ok) certSummary = await certRes.json();
          } catch (e) { /* ignore cert fetch errors */ }
        }

        // Fetch compliance data for org's agents
        const agentCompliance = new Map();
        const agents = profileData?.profile?.agents || [];
        if (agents.length > 0) {
          const results = await Promise.allSettled(
            agents.map(async (agent) => {
              const encoded = encodeURIComponent(agent.url);
              const [statusRes, historyRes] = await Promise.all([
                fetch(`/api/registry/agents/${encoded}/compliance`, { credentials: 'include' }),
                fetch(`/api/registry/agents/${encoded}/compliance/history?limit=10`, { credentials: 'include' }),
              ]);
              const status = statusRes.ok ? await statusRes.json() : null;
              const history = historyRes.ok ? await historyRes.json() : null;
              return { url: agent.url, status, history };
            }),
          );
          for (const r of results) {
            if (r.status === 'fulfilled' && r.value.status) {
              agentCompliance.set(r.value.url, r.value);
            }
          }
        }

        const healthData = healthRes.ok ? await healthRes.json() : null;

        currentOrgId = currentOrg?.id || null;
        renderHub(data, profileData?.profile || null, currentOrgId, certSummary, agentCompliance, healthData);
      } catch (err) {
        console.error('Hub load error:', err);
        document.getElementById('hub-loading').innerHTML =
          '<p>Failed to load. <a href="/organization">Try again</a></p>';
      }
    }

    // =========================================================================
    // Constants
    // =========================================================================

    const STAGES = [
      'aware', 'evaluating', 'joined', 'onboarding',
      'participating', 'contributing', 'leading', 'advocating',
    ];

    const STAGE_DESCS = {
      aware:         'Just getting started',
      evaluating:    'Exploring what\'s possible',
      joined:        'Welcome to AAO',
      onboarding:    'Getting oriented',
      participating: 'Active in working groups',
      contributing:  'Creating content and sharing expertise',
      leading:       'Taking on leadership',
      advocating:    'Championing the community externally',
    };

    // What earns you the NEXT stage transition — tied to milestone checks in journey-computation.ts
    const NEXT_LEVEL_REQUIREMENTS = {
      aware:         'Learn about AAO membership plans',
      evaluating:    'Subscribe to a membership plan to join',
      joined:        'Join a working group to become a Participant',
      onboarding:    'Join a working group before your onboarding window closes',
      participating: 'Propose or publish content to become a Contributor',
      contributing:  'Become a working group chair or vice-chair to become a Leader',
      leading:       'Introduce a colleague to AAO to become an Advocate',
      advocating:    'Thank you for leading and growing the community',
    };

    const PERSONA_CFG = {
      molecule_builder:     { label: 'Molecular Gastronomist', desc: 'Building and integrating ad tech components',              icon: '⚙' },
      data_decoder:         { label: 'Data Denizen',            desc: 'Driven by data, measurement, and optimization',           icon: '📈' },
      pureblood_protector:  { label: 'Mold Breaker',            desc: 'Champions brand safety, quality, and trust',              icon: '🛡' },
      resops_integrator:    { label: 'RevOps Integrator',       desc: 'Streamlines operations and revenue workflows',             icon: '🔄' },
      ladder_climber:       { label: 'Positionless Marketer',   desc: 'Seeking strategic industry visibility and leadership',     icon: '🎯' },
      simple_starter:       { label: 'Early Explorer',          desc: 'Getting started with agentic advertising',                icon: '🌱' },
      pragmatic_builder:    { label: 'Pragmatic Builder',       desc: 'Cross-functional generalist with test-and-learn culture',  icon: '🔨' },
    };

    const SOURCE_LABELS = {
      user_reported: 'Self-reported',
      admin_set:     'Set by admin',
      diagnostic:    'From diagnostic',
      enrichment:    'Based on your activity',
      addie_inferred:'Based on your activity',
    };

    const TRIGGER_LABELS = {
      milestone_achieved:   'Milestone achieved',
      milestone_lost:       'Milestone lost',
      admin_override:       'Updated by admin',
      recomputation:        'Periodic review',
      initial:              'Initial assessment',
      membership_change:    'Group membership changed',
      leadership_change:    'Leadership role changed',
      content_contribution: 'Content contribution',
    };

    // =========================================================================
    // Render
    // =========================================================================

    var TIER_DETAILS = {
      'individual_professional': { label: 'Professional', contributor: 1, community: 0, price: '$250/yr' },
      'company_standard':        { label: 'Builder',      contributor: 5, community: 5, price: '$2,500/yr' },
      'company_icl':             { label: 'Partner',      contributor: 10, community: 50, price: '$10,000/yr' },
      'company_leader':          { label: 'Leader',       contributor: 20, community: -1, price: '$50,000/yr' },
    };
    var DEFAULT_TIER = { label: 'Explorer', contributor: 0, community: 1, price: 'Free' };

    function renderTeamCertProgress(summary) {
      if (!summary || !summary.total_members || summary.members_with_credentials == null) return '';
      const pct = Math.round((summary.members_with_credentials / summary.total_members) * 100);
      return `
        <div style="border-left: 1px solid var(--color-border); padding-left: var(--space-6);">
          <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${pct}%</div>
          <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Team certified</div>
          <div style="font-size: 10px; color: var(--color-text-muted); margin-top: var(--space-1);">${Number(summary.members_with_credentials)} of ${Number(summary.total_members)} members</div>
        </div>`;
    }

    function renderHub(data, profile, orgId, certSummary, agentCompliance, healthData) {
      const {
        organization_name,
        membership_tier, team_size,
        seat_usage,
        persona, persona_source, persona_aspiration,
      } = data;

      document.getElementById('hub-loading').style.display = 'none';
      const el = document.getElementById('hub-content');
      el.style.display = 'block';

      const tier = TIER_DETAILS[membership_tier] || DEFAULT_TIER;
      const usage = seat_usage || { contributor: 0, community_only: 0 };
      const communityLimit = tier.community === -1 ? '&infin;' : tier.community;
      const isFreeTier = !membership_tier || membership_tier === 'individual_academic';

      // Build team cert progress if available
      const teamCertHtml = certSummary ? renderTeamCertProgress(certSummary) : '';

      el.innerHTML = `
        <!-- Header -->
        <div class="hub-header">
          <div class="hub-header-left">
            <h1>${escapeHtml(organization_name || 'Your organization')}</h1>
            <div class="hub-header-meta">
              <span class="level-badge">${escapeHtml(tier.label)}</span>
              ${profile?.is_founding_member ? '<span class="level-badge level-badge-founding">Founding Member</span>' : ''}
              <span class="stage-desc">${escapeHtml(tier.price)}</span>
            </div>
          </div>
        </div>

        ${healthData ? renderHealthScore(healthData) : ''}

        <!-- ===== Membership ===== -->
        <section id="membership" class="dashboard-section">
          <div class="hub-grid">
            <div class="hub-card">
              <div class="hub-card-header">
                <span class="hub-card-title">Membership</span>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-5);">
                <div style="padding: var(--space-4); background: var(--color-primary-50); border-radius: var(--radius-lg);">
                  <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${usage.contributor} / ${tier.contributor}</div>
                  <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Contributor seats</div>
                  <div style="font-size: 10px; color: var(--color-text-muted); margin-top: var(--space-1);">Slack, working groups, councils</div>
                </div>
                <div style="padding: var(--space-4); background: var(--color-success-50); border-radius: var(--radius-lg);">
                  <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${usage.community_only} / ${communityLimit}</div>
                  <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Community seats</div>
                  <div style="font-size: 10px; color: var(--color-text-muted); margin-top: var(--space-1);">Addie, certification, training</div>
                </div>
              </div>
              ${isFreeTier ? `
                <button onclick="openBillingPortal('${escapeHtml(orgId)}')" class="btn btn-primary" style="width: 100%; text-align: center; cursor: pointer;">Upgrade membership</button>
              ` : `
                <div style="display: flex; align-items: center; gap: var(--space-3);">
                  <button onclick="openBillingPortal('${escapeHtml(orgId)}')" class="btn btn-ghost btn-sm" style="cursor: pointer;">Manage billing</button>
                  <a href="/aao-w9.pdf" download="AAO-W9.pdf" class="btn btn-ghost btn-sm" style="cursor: pointer;">Download W-9</a>
                </div>
              `}
            </div>

            <div class="hub-card">${renderPersona(persona, persona_source, persona_aspiration)}</div>
          </div>
        </section>

        <!-- ===== Team ===== -->
        <section id="team" class="dashboard-section">
          <div class="hub-card">
            <div class="hub-card-header">
              <span class="hub-card-title">Team</span>
              <a href="/dashboard/team?org=${encodeURIComponent(orgId)}" class="hub-card-link">Manage team &rarr;</a>
            </div>
            <div style="display: flex; align-items: center; gap: var(--space-6); padding: var(--space-2) 0;">
              <div>
                <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${team_size || 0}</div>
                <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Team members</div>
              </div>
              ${teamCertHtml}
            </div>
            ${healthData?.people ? renderPeopleTable(healthData.people) : ''}
            ${healthData?.champions?.length ? renderChampions(healthData.champions) : ''}
          </div>
        </section>

        <!-- ===== Directory listing ===== -->
        <section id="directory" class="dashboard-section">
          <div class="hub-card">
            <div class="hub-card-header">
              <span class="hub-card-title">Directory listing</span>
              <div style="display: flex; gap: var(--space-3);">
                ${profile?.slug ? `<a href="/members/${escapeHtml(profile.slug)}" class="hub-card-link" target="_blank">View public listing &rarr;</a>` : ''}
                <a href="${orgId ? '/member-profile?org=' + encodeURIComponent(orgId) : '/member-profile'}" class="hub-card-link">Edit &rarr;</a>
              </div>
            </div>
            ${renderProfileCard(profile, orgId)}
          </div>
        </section>

        <!-- ===== Agents ===== -->
        <section id="agents" class="dashboard-section">
          <div class="hub-card">
            <div class="hub-card-header">
              <span class="hub-card-title">Agents</span>
              <a href="/chat?prompt=${encodeURIComponent('I want to add an agent for compliance monitoring.')}" class="hub-card-link">+ Add agent</a>
            </div>
            ${renderAgentsSection(profile?.agents || [], agentCompliance, orgId)}
          </div>
        </section>
      `;
    }

    // -------------------------------------------------------------------------

    function renderTrajectory(trajectory) {
      if (!trajectory || trajectory.previous === null) return '';
      const delta = trajectory.current - trajectory.previous;
      if (delta === 0) return '';
      const arrow = delta > 0 ? '↑' : '↓';
      const color = delta > 0 ? 'var(--color-success-500)' : 'var(--color-warning-500)';
      const prevDate = trajectory.previous_date
        ? new Date(trajectory.previous_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        : '';
      return `<div style="font-size: var(--text-xs); color: ${color}; margin-top: var(--space-1);">${arrow} ${Math.abs(delta)} since ${prevDate}</div>`;
    }

    function renderHealthScore(health) {
      const score = health.health_score || 0;
      const bd = health.health_breakdown || {};

      const signals = [
        { label: 'Certified', value: `${bd.certification_pct || 0}%`, color: bd.certification_pct >= 50 ? 'var(--color-success-500)' : 'var(--color-warning-500)' },
        { label: 'In working groups', value: `${bd.working_group_pct || 0}%`, color: bd.working_group_pct >= 30 ? 'var(--color-success-500)' : 'var(--color-warning-500)' },
        { label: 'Active (30d)', value: `${bd.active_pct || 0}%`, color: bd.active_pct >= 50 ? 'var(--color-success-500)' : 'var(--color-warning-500)' },
        { label: 'Contributions', value: bd.content_contributions || 0, color: bd.content_contributions > 0 ? 'var(--color-success-500)' : 'var(--color-gray-400)' },
        { label: 'Leadership roles', value: bd.leadership_roles || 0, color: bd.leadership_roles > 0 ? 'var(--color-success-500)' : 'var(--color-gray-400)' },
        { label: 'Agents registered', value: bd.tech_integration?.agents_registered || 0, color: bd.tech_integration?.agents_registered > 0 ? 'var(--color-success-500)' : 'var(--color-gray-400)' },
      ];

      const signalCards = signals.map(s => `
        <div class="health-signal-card">
          <div class="health-signal-value" style="color: ${s.color};">${s.value}</div>
          <div class="health-signal-label">${s.label}</div>
        </div>
      `).join('');

      const actionsHtml = (health.suggested_actions || []).map(a => `
        <div class="health-action-item">
          <div style="flex: 1;">
            <div class="health-action-label">${escapeHtml(a.label)}</div>
            <div class="health-action-impact">${escapeHtml(a.impact)}</div>
          </div>
          ${a.url ? `<a href="${a.url}" class="btn btn-ghost btn-sm">Do this</a>` : ''}
        </div>
      `).join('');

      let scoreColor, statusLabel;
      if (score < 30)      { scoreColor = 'var(--color-gray-400)';    statusLabel = 'Getting started'; }
      else if (score < 60) { scoreColor = 'var(--color-warning-500)'; statusLabel = 'Building momentum'; }
      else                 { scoreColor = 'var(--color-success-500)'; statusLabel = 'Healthy'; }

      return `
        <section class="dashboard-section">
          <div class="hub-grid">
            <div class="hub-card">
              <div class="hub-card-header">
                <span class="hub-card-title">Organization health</span>
              </div>
              <div class="health-score-layout">
                <div class="health-score-number">
                  <div class="health-score-value" style="color: ${scoreColor};">${score}</div>
                  <div class="health-score-label">Health score</div>
                  <div class="health-score-status" style="color: ${scoreColor};">${statusLabel}</div>
                  ${renderTrajectory(health.health_trajectory)}
                </div>
                <div class="health-signal-grid">
                  ${signalCards}
                </div>
              </div>
            </div>
            ${actionsHtml ? `
              <div class="hub-card">
                <div class="hub-card-header">
                  <span class="hub-card-title">Suggested actions</span>
                </div>
                ${actionsHtml}
              </div>
            ` : ''}
          </div>
        </section>
      `;
    }

    function renderPeopleTable(people) {
      if (!people || people.length === 0) return '';

      function timeAgo(dateStr) {
        if (!dateStr) return 'Never';
        const d = new Date(dateStr);
        const now = new Date();
        const days = Math.floor((now - d) / 86400000);
        if (days === 0) return 'Today';
        if (days === 1) return 'Yesterday';
        if (days < 30) return days + 'd ago';
        if (days < 365) return Math.floor(days / 30) + 'mo ago';
        return Math.floor(days / 365) + 'y ago';
      }

      const emptyCell = '<span style="color: var(--color-text-muted);">—</span>';

      const rows = people.map(p => {
        const isInactive = !p.last_active || (new Date() - new Date(p.last_active)) > 14 * 86400000;
        const nudgeBtn = isInactive
          ? `<button class="btn btn-ghost btn-sm nudge-btn" data-user-id="${escapeHtml(p.workos_user_id)}" title="Ask Addie to reach out">Nudge</button>`
          : '';
        return `
          <tr>
            <td data-label="Person" style="font-weight: var(--font-medium);">${escapeHtml(p.name)}</td>
            <td data-label="Certified">${p.credentials.length > 0 ? escapeHtml(p.credentials.join(', ')) : emptyCell}</td>
            <td data-label="Working groups">${p.working_groups.length > 0 ? escapeHtml(p.working_groups.join(', ')) : emptyCell}</td>
            <td data-label="Last active">${timeAgo(p.last_active)}</td>
            <td data-label="Content">${p.contribution_count > 0 ? p.contribution_count : emptyCell}</td>
            <td data-label="">${nudgeBtn}</td>
          </tr>
        `;
      }).join('');

      return `
        <div style="margin-top: var(--space-5); overflow-x: auto;">
          <table class="people-table">
            <thead>
              <tr>
                <th>Person</th>
                <th>Certified</th>
                <th>Working groups</th>
                <th>Last active</th>
                <th>Content</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderChampions(champions) {
      if (!champions || champions.length === 0) return '';

      const cards = champions.map(c => `
        <div class="champion-card">
          <div style="font-size: var(--text-lg);">⭐</div>
          <div>
            <div class="champion-name">${escapeHtml(c.name)}</div>
            <div class="champion-highlights">${c.highlights.map(h => escapeHtml(h)).join(' · ')}</div>
          </div>
        </div>
      `).join('');

      return `
        <div style="margin-top: var(--space-5);">
          <div style="font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-text-heading); margin-bottom: var(--space-3);">Champions</div>
          <div class="champion-grid">
            ${cards}
          </div>
        </div>
      `;
    }

    // -------------------------------------------------------------------------

    function renderAgentsSection(agents, complianceMap, orgId) {
      if (!agents || agents.length === 0) {
        return `
          <div style="text-align: center; padding: var(--space-6); color: var(--color-text-secondary);">
            <p>No agents registered yet.</p>
            <p style="font-size: var(--text-sm);"><a href="/chat?prompt=${encodeURIComponent('I want to add an agent for compliance monitoring.')}">Ask Addie</a> to connect your agent and start compliance monitoring.</p>
          </div>
        `;
      }

      return agents.map(agent => {
        const data = complianceMap?.get(agent.url);
        const cs = data?.status;
        const history = data?.history;
        const hostname = (() => { try { return new URL(agent.url).hostname; } catch { return agent.url; } })();
        const hasData = cs && cs.status && cs.status !== 'unknown';
        const hasAuth = cs?.has_compliance_auth;

        const cardId = 'agent-' + encodeURIComponent(agent.url).replace(/%/g, '_');

        // No compliance data yet — show onboarding state
        if (!hasData) {
          return `
          <div class="agent-compliance-card" id="${cardId}">
            <div class="agent-compliance-header">
              <div style="display: flex; align-items: center; gap: var(--space-2); min-width: 0;">
                <span class="agent-status-dot agent-status-dot--unknown"></span>
                <span class="agent-hostname">${escapeHtml(hostname)}</span>
                <span class="agent-status-label" style="color: var(--color-text-secondary);">not yet checked</span>
              </div>
            </div>
            <div style="padding: var(--space-4) 0; color: var(--color-text-secondary); font-size: var(--text-sm);">
              ${hasAuth
                ? 'Auth configured. Compliance check will run on the next heartbeat cycle.'
                : 'Connect this agent through <a href="/chat?prompt=' + encodeURIComponent('Connect my agent at ' + agent.url + ' for compliance monitoring.') + '">Addie</a> to save credentials and start compliance monitoring.'}
            </div>
          </div>`;
        }

        // Has compliance data — show full card
        const statusClass = cs.status;
        const statusLabel = cs.status;
        const tracks = cs.tracks || {};

        const clickableTrackPills = Object.entries(tracks)
          .filter(([, status]) => status !== 'skip' && status !== 'expected')
          .map(([track, status]) => {
          const cls = status === 'pass' ? 'agent-track--pass'
            : status === 'fail' ? 'agent-track--fail'
            : status === 'partial' ? 'agent-track--partial'
            : 'agent-track--skip';
          return '<button class="agent-track ' + cls + '" data-track="' + escapeHtml(track) + '" data-agent-url="' + escapeHtml(agent.url) + '">' + escapeHtml(track) + '</button>';
        }).join('');

        const runs = history?.runs || [];
        const sparkline = runs.length > 0 ? '<div class="agent-sparkline">' +
          runs.slice().reverse().map(r => {
            const color = r.overall_status === 'passing' ? 'var(--color-success-500)'
              : r.overall_status === 'failing' ? 'var(--color-error-500)'
              : 'var(--color-warning-500)';
            return '<div class="agent-sparkline-bar" style="background:' + color + ';" title="' + escapeHtml(r.overall_status) + ' — ' + new Date(r.tested_at).toLocaleDateString() + '"></div>';
          }).join('') + '</div>' : '';

        const lastChecked = cs.last_checked_at
          ? timeAgo(new Date(cs.last_checked_at))
          : 'never';

        const isPublic = !(cs.compliance_opt_out ?? false);

        return `
          <div class="agent-compliance-card" id="${cardId}">
            <div class="agent-compliance-header">
              <div style="display: flex; align-items: center; gap: var(--space-2); min-width: 0;">
                <span class="agent-status-dot agent-status-dot--${escapeHtml(statusClass)}"></span>
                <span class="agent-hostname">${escapeHtml(hostname)}</span>
                <span class="agent-status-label">${escapeHtml(statusLabel)}</span>
                ${cs.streak_days > 0 ? '<span class="agent-streak">' + parseInt(cs.streak_days, 10) + 'd streak</span>' : ''}
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0;">
                <label class="agent-toggle" title="Show compliance on public registry">
                  <input type="checkbox" ${isPublic ? 'checked' : ''} data-agent-url="${escapeHtml(agent.url)}">
                  <span class="agent-toggle-label">Show on registry</span>
                </label>
              </div>
            </div>
            ${cs.headline ? '<div class="agent-headline">' + escapeHtml(cs.headline) + '</div>' : ''}
            ${clickableTrackPills ? '<div class="agent-tracks">' + clickableTrackPills + '</div>' : ''}
            <div class="agent-track-detail" id="${cardId}-track-detail" style="display:none;"></div>
            ${sparkline}
            <div class="agent-meta-row">
              <span>Last checked: ${escapeHtml(lastChecked)}</span>
              <div style="display: flex; gap: var(--space-3); align-items: center;">
                ${!hasAuth ? '<a href="/chat?prompt=' + encodeURIComponent('Connect my agent at ' + agent.url + ' for compliance monitoring.') + '" class="agent-action-link" title="Connect through Addie to save credentials">Connect agent</a>' : ''}
                <button class="agent-history-btn" data-agent-url="${escapeHtml(agent.url)}" data-card-id="${cardId}">View history</button>
              </div>
            </div>
            <div class="agent-history-panel" id="${cardId}-history" style="display:none;"></div>
          </div>
        `;
      }).join('');
    }

    function timeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + 'm ago';
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      return days + 'd ago';
    }

    function renderLevelProgress(stage, stageIdx, levelNum, nextReq, milestones) {
      const steps = STAGES.map((s, i) => {
        let cls = 'level-step';
        if (i < stageIdx) cls += ' level-step--completed';
        else if (i === stageIdx) cls += ' level-step--current';
        const icon = i < stageIdx ? '✓' : (i === stageIdx ? levelNum : i + 1);
        return `
          <div class="${cls}">
            <div class="level-step-dot">${icon}</div>
            <span class="level-step-label">${escapeHtml(s)}</span>
          </div>`;
      }).join('');

      const ms = milestones || {};
      const achievements = [
        { key: 'has_working_groups',      icon: '👥', label: 'Working group member',    desc: 'Joined at least one working group',      stage: 'Participant',   href: '/committees?type=working_group', action: 'Browse groups' },
        { key: 'has_content_proposals',   icon: '✍',  label: 'Content contributor',     desc: 'Proposed or published content',           stage: 'Contributor',   href: '/my-content',              action: 'Propose content' },
        { key: 'has_leadership',          icon: '⭐',  label: 'Group leader',            desc: 'Chair or vice-chair of a working group', stage: 'Leader',        href: '/committees?type=working_group', action: 'View openings' },
        { key: 'has_recruiting_activity', icon: '📣',  label: 'Community advocate',      desc: 'Introduced a colleague to AAO',          stage: 'Advocate',      href: '/community/people',             action: 'Introduce a colleague' },
      ];

      const achHtml = achievements.map(a => {
        const earned = !!ms[a.key];
        return `
          <div class="achievement achievement--${earned ? 'earned' : 'locked'}">
            <div class="achievement-icon">${a.icon}</div>
            <div class="achievement-body">
              <div class="achievement-name">${a.label}</div>
              <div class="achievement-desc">${a.desc}</div>
              ${!earned ? `<div class="achievement-unlocks">Unlocks: ${a.stage}</div>` : ''}
            </div>
            ${!earned ? `<a href="${a.href}" class="achievement-action">${a.action} →</a>` : ''}
          </div>`;
      }).join('');

      return `
        <div class="journey-card">
          <div class="journey-card-header">
            <span class="journey-card-title">Membership journey</span>
            ${nextReq ? `<span class="next-level-hint">${escapeHtml(nextReq)}</span>` : ''}
          </div>
          <div class="level-stepper">${steps}</div>
          <div class="achievements-grid">${achHtml}</div>
        </div>`;
    }

    // -------------------------------------------------------------------------

    function renderPersona(persona, source, aspiration) {
      if (!persona) {
        return `
          <div class="hub-card-header"><span class="hub-card-title">Organization type</span></div>
          <div class="persona-cta">
            <div class="persona-cta-icon">?</div>
            <p>Discover your organization's type to unlock tailored group recommendations.</p>
            <a href="/persona-assessment" class="btn btn-ghost btn-sm">Take the assessment &rarr;</a>
          </div>`;
      }
      const cfg = PERSONA_CFG[persona] || { label: persona, desc: '', icon: '?' };
      const srcLabel = SOURCE_LABELS[source] || '';
      const aspCfg = aspiration && aspiration !== persona ? PERSONA_CFG[aspiration] : null;
      return `
        <div class="hub-card-header">
          <span class="hub-card-title">Organization type</span>
          <a href="/persona-assessment" class="hub-card-link">Retake quiz &rarr;</a>
        </div>
        <div class="persona-display persona--${escapeHtml(persona)}">
          <div class="persona-icon">${cfg.icon}</div>
          <div class="persona-name">${escapeHtml(cfg.label)}</div>
          <div class="persona-desc">${escapeHtml(cfg.desc)}</div>
          ${srcLabel ? `<div class="persona-source">${escapeHtml(srcLabel)}</div>` : ''}
          ${aspCfg ? `<div class="persona-aspiration">Aspiring toward: ${escapeHtml(aspCfg.label)}</div>` : ''}
        </div>`;
    }

    // -------------------------------------------------------------------------

    function renderGroups(groups, currentCount) {
      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Recommended groups</span>
          <a href="/committees?type=working_group" class="hub-card-link">View all →</a>
        </div>`;
      const countLine = currentCount > 0
        ? `<div class="group-rec-count">You're in ${currentCount} working group${currentCount !== 1 ? 's' : ''}</div>`
        : '';

      if (!groups || groups.length === 0) {
        return `${hdr}${countLine}
          <div class="hub-empty">
            <p>No recommendations right now.</p>
            <a href="/committees?type=working_group">Browse all working groups →</a>
          </div>`;
      }

      const items = groups.slice(0, 5).map(g => `
        <div class="group-rec-item">
          <div class="group-rec-info">
            <div class="group-rec-name">${escapeHtml(g.name)}</div>
            <div class="group-rec-reason">${escapeHtml(g.reason || '')}</div>
          </div>
          ${g.committee_type ? `<span class="group-rec-badge">${escapeHtml(g.committee_type)}</span>` : ''}
          <a href="/working-groups/${encodeURIComponent(g.slug)}" class="group-rec-link">Learn more →</a>
        </div>`).join('');

      return `${hdr}${countLine}${items}`;
    }

    // -------------------------------------------------------------------------

    function renderProfileCard(profile, orgId) {
      const profileUrl = orgId ? `/member-profile?org=${encodeURIComponent(orgId)}` : '/member-profile';
      const hdr = '';

      if (!profile) {
        return `${hdr}
          <div class="hub-empty">
            <p>Your directory listing isn't set up yet.</p>
            <a href="${profileUrl}">Create your listing →</a>
          </div>`;
      }

      // Calculate completeness
      let pts = 0;
      if (profile.display_name)  pts += 15;
      if (profile.description)   pts += 20;
      if (profile.logo_light_url || profile.logo_url) pts += 15;
      if (profile.offerings?.length > 0) pts += 15;
      if (profile.contact_email) pts += 10;
      if (profile.contact_website) pts += 10;
      if (profile.linkedin_url)  pts += 10;
      if (profile.tags?.length > 0) pts += 5;

      const pct = Math.min(pts, 100);
      const fillClass = pct === 100 ? 'profile-completeness-fill--full' : '';

      const logoUrl = profile.logo_light_url || profile.logo_url || null;
      const logoHtml = logoUrl
        ? `<img src="${escapeHtml(logoUrl)}" alt="Logo">`
        : `<div class="profile-logo-placeholder">No logo</div>`;

      const desc = profile.description
        ? profile.description.substring(0, 80) + (profile.description.length > 80 ? '…' : '')
        : null;

      const offeringsHtml = profile.offerings?.length > 0
        ? `<div class="profile-offerings">${profile.offerings.slice(0, 4).map(o =>
            `<span class="profile-offering-tag">${escapeHtml(o)}</span>`
          ).join('')}${profile.offerings.length > 4 ? `<span class="profile-offering-tag">+${profile.offerings.length - 4}</span>` : ''}</div>`
        : `<span class="profile-field-value profile-field-value--empty">None added</span>`;

      return `
        ${hdr}
        <div class="profile-card-body">
          <div class="profile-completeness">
            <div class="profile-completeness-label">
              <span>Profile completeness</span>
              <span>${pct}%</span>
            </div>
            <div class="profile-completeness-bar">
              <div class="profile-completeness-fill ${fillClass}" style="width: ${pct}%"></div>
            </div>
          </div>

          <div class="profile-field">
            <span class="profile-field-label">Logo</span>
            <div class="profile-logo-preview">${logoHtml}</div>
          </div>

          <div class="profile-field">
            <span class="profile-field-label">Name</span>
            <span class="profile-field-value">${escapeHtml(profile.display_name || '')}</span>
          </div>

          <div class="profile-field">
            <span class="profile-field-label">About</span>
            <span class="profile-field-value ${desc ? '' : 'profile-field-value--empty'}">
              ${desc ? escapeHtml(desc) : 'No description yet'}
            </span>
          </div>

          <div class="profile-field">
            <span class="profile-field-label">Offers</span>
            ${offeringsHtml}
          </div>
        </div>`;
    }

    // -------------------------------------------------------------------------

    function renderActivity(activity) {
      const a = activity || {};
      const hdr = `<div class="hub-card-header"><span class="hub-card-title">Activity</span></div>`;
      return `
        ${hdr}
        <div class="activity-grid">
          <div class="activity-metric">
            <div class="activity-value">${a.dashboard_logins_30d != null ? a.dashboard_logins_30d : '—'}</div>
            <div class="activity-label">Logins (30d)</div>
          </div>
          <div class="activity-metric">
            <div class="activity-value">${a.working_group_count != null ? a.working_group_count : '—'}</div>
            <div class="activity-label">Working groups</div>
          </div>
          <div class="activity-metric">
            <div class="activity-value">${a.email_clicks_30d != null ? a.email_clicks_30d : '—'}</div>
            <div class="activity-label">Email clicks (30d)</div>
          </div>
          <div class="activity-metric">
            <div class="activity-value">${a.last_active ? relDate(a.last_active) : '—'}</div>
            <div class="activity-label">Last active</div>
          </div>
        </div>`;
    }

    // -------------------------------------------------------------------------

    function renderTimeline(history) {
      const hdr = `<div class="hub-card-header"><span class="hub-card-title">Journey history</span></div>`;
      if (!history || history.length === 0) {
        return `${hdr}<div class="timeline-empty">Your journey starts here</div>`;
      }
      const entries = history.slice(0, 6).map(e => {
        const fromBadge = e.from_stage
          ? `<span class="stage-badge">${escapeHtml(e.from_stage)}</span>`
          : `<span class="stage-badge" style="background:var(--color-gray-100);color:var(--color-gray-500)">start</span>`;
        return `
          <div class="timeline-entry">
            <div class="timeline-dot"></div>
            <div class="timeline-date">${e.transitioned_at ? fmtDate(e.transitioned_at) : ''}</div>
            <div class="timeline-transition">${fromBadge} → <span class="stage-badge">${escapeHtml(e.to_stage)}</span></div>
            <div class="timeline-trigger">${escapeHtml(TRIGGER_LABELS[e.trigger_type] || e.trigger_type)}</div>
          </div>`;
      }).join('');
      return `${hdr}<div class="timeline">${entries}</div>`;
    }

    // -------------------------------------------------------------------------

    function renderContent(contributions) {
      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Content from your org</span>
          <a href="/my-content" class="hub-card-link">Manage →</a>
        </div>`;

      if (!contributions || contributions.length === 0) {
        return `${hdr}
          <div class="hub-empty">
            <p>No content yet.</p>
            <a href="/my-content">Propose content →</a>
          </div>`;
      }

      const statusCls = s => s === 'published' ? 'status-badge--published' : s === 'pending_review' ? 'status-badge--pending_review' : 'status-badge--draft';
      const statusLbl = s => s === 'published' ? 'Published' : s === 'pending_review' ? 'In review' : 'Draft';
      const typeLbl = t => t === 'link' ? 'Link' : 'Article';

      const rows = contributions.map(c => `
        <tr>
          <td data-label="Title">
            <span class="content-title">${escapeHtml(c.title)}</span>
            <span class="group-rec-badge" style="margin-left:var(--space-2)">${typeLbl(c.content_type)}</span>
          </td>
          <td data-label="Author">${escapeHtml(c.author || '')}</td>
          <td data-label="Date">${c.date ? fmtDate(c.date) : ''}</td>
          <td data-label="Status"><span class="status-badge ${statusCls(c.status)}">${statusLbl(c.status)}</span></td>
        </tr>`).join('');

      return `
        ${hdr}
        <table class="content-table">
          <thead><tr><th>Title</th><th>Author</th><th>Date</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderCertificationSummary(summary) {
      const { total_members = 0, members_with_credentials = 0, credentials_earned = [], members = [] } = summary;

      const hdr = `
        <div class="hub-card-header">
          <span class="hub-card-title">Team certification</span>
          <a href="/certification" class="hub-card-link">View portal →</a>
        </div>`;

      if (members_with_credentials === 0 && members.every(m => m.modules_completed === 0)) {
        return `${hdr}
          <div class="hub-empty">
            <p>No team members have started certification yet.</p>
            <a href="/certification">Explore AdCP Academy →</a>
          </div>`;
      }

      // Summary stats
      const statsHtml = `
        <div style="display: flex; gap: var(--space-6); margin-bottom: var(--space-4); padding: 0 var(--space-4);">
          <div style="text-align: center;">
            <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${members_with_credentials}</div>
            <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Members with credentials</div>
          </div>
          <div style="text-align: center;">
            <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-text-heading);">${total_members}</div>
            <div style="font-size: var(--text-xs); color: var(--color-text-secondary);">Total members</div>
          </div>
        </div>`;

      // Credential breakdown
      const credBreakdown = credentials_earned.length > 0 ? `
        <div style="display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); padding: 0 var(--space-4);">
          ${credentials_earned.map(c => `
            <span style="padding: var(--space-1) var(--space-2); background: var(--credential-tier-${c.tier || 1}-bg); color: var(--credential-tier-${c.tier || 1}-color); border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: var(--font-medium);">${escapeHtml(c.credential)} (${c.count})</span>
          `).join('')}
        </div>
      ` : '';

      // Member rows
      const memberRows = members
        .filter(m => m.modules_completed > 0 || (m.credentials && m.credentials.length > 0))
        .map(m => `
          <tr>
            <td data-label="Name">${escapeHtml(((m.first_name || '') + ' ' + (m.last_name || '')).trim() || 'Unknown')}</td>
            <td data-label="Credentials">${(m.credentials || []).map(c => `<span class="group-rec-badge">${escapeHtml(typeof c === 'string' ? c : c.name)}</span>`).join(' ') || '<span style="color:var(--color-text-muted);">None</span>'}</td>
            <td data-label="Progress">${m.modules_completed} completed${m.modules_in_progress > 0 ? `, ${m.modules_in_progress} in progress` : ''}</td>
          </tr>
        `).join('');

      const tableHtml = memberRows ? `
        <table class="content-table" style="font-size: 13px;">
          <thead><tr><th>Member</th><th>Credentials</th><th>Progress</th></tr></thead>
          <tbody>${memberRows}</tbody>
        </table>
      ` : '';

      return `${hdr}${statsHtml}${credBreakdown}${tableHtml}`;
    }

    // =========================================================================
    // Utilities
    // =========================================================================

    // Agent compliance controls — event delegation to avoid inline JS with URLs
    document.addEventListener('change', async function(e) {
      const select = e.target.closest('.agent-lifecycle-select');
      if (select) {
        const agentUrl = select.dataset.agentUrl;
        const previousValue = select.dataset.previousValue || 'production';
        try {
          const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/lifecycle`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ lifecycle_stage: select.value }),
          });
          if (!res.ok) {
            select.value = previousValue;
          } else {
            select.dataset.previousValue = select.value;
          }
        } catch {
          select.value = previousValue;
        }
        return;
      }

      const checkbox = e.target.closest('.agent-toggle input[type="checkbox"]');
      if (checkbox) {
        const agentUrl = checkbox.dataset.agentUrl;
        try {
          const res = await fetch(`/api/registry/agents/${encodeURIComponent(agentUrl)}/compliance/opt-out`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ opt_out: !checkbox.checked }),
          });
          if (!res.ok) {
            checkbox.checked = !checkbox.checked;
          }
        } catch {
          checkbox.checked = !checkbox.checked;
        }
      }
    });

    // Track pill click — fetch history and show scenario details for that track
    document.addEventListener('click', async function(e) {
      const trackBtn = e.target.closest('.agent-track[data-track]');
      if (trackBtn) {
        const track = trackBtn.dataset.track;
        const agentUrl = trackBtn.dataset.agentUrl;
        const card = trackBtn.closest('.agent-compliance-card');
        const detailEl = card?.querySelector('.agent-track-detail');
        if (!detailEl) return;

        // Toggle off if already showing this track
        if (trackBtn.classList.contains('active')) {
          trackBtn.classList.remove('active');
          detailEl.style.display = 'none';
          return;
        }

        // Remove active from siblings
        card.querySelectorAll('.agent-track').forEach(b => b.classList.remove('active'));
        trackBtn.classList.add('active');
        detailEl.style.display = 'block';
        detailEl.innerHTML = '<em>Loading...</em>';

        try {
          const res = await fetch('/api/registry/agents/' + encodeURIComponent(agentUrl) + '/compliance/history?limit=1', { credentials: 'include' });
          const data = await res.json();
          const run = data.runs?.[0];
          if (!run || !run.tracks_json) {
            detailEl.innerHTML = '<em>No detailed data available for this run.</em>';
            return;
          }
          const trackData = run.tracks_json.find(t => t.track === track);
          if (!trackData) {
            detailEl.innerHTML = '<em>Track "' + escapeHtml(track) + '" not found in latest run.</em>';
            return;
          }

          const statusLabel = trackData.status === 'pass' ? 'Passing'
            : trackData.status === 'fail' ? 'Failing'
