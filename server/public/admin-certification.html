<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/AAo.svg" type="image/svg+xml">
  <title>Certification - AdCP Admin</title>
  <link rel="stylesheet" href="/design-system.css">
  <script src="/nav.js"></script>
  <script src="/admin-sidebar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--color-bg-page);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      width: 100%;
    }
    h1 {
      color: var(--color-text-heading);
      margin-bottom: 30px;
      font-size: 28px;
    }
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .metric-card {
      background: var(--color-bg-card);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-md);
    }
    .metric-label {
      color: var(--color-text-secondary);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .metric-value {
      color: var(--color-text-heading);
      font-size: 32px;
      font-weight: 700;
    }
    .metric-sub {
      color: var(--color-text-muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .section {
      background: var(--color-bg-card);
      border-radius: 12px;
      padding: 30px;
      box-shadow: var(--shadow-md);
      margin-bottom: 30px;
    }
    .section h2 {
      color: var(--color-text-heading);
      font-size: 20px;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px;
      border-bottom: 2px solid var(--color-border);
      color: var(--color-text-secondary);
      font-weight: 600;
      font-size: 14px;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text-heading);
    }
    tr:hover { background-color: var(--color-bg-subtle); }
    .text-right { text-align: right; }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--color-gray-200);
      border-top: 4px solid var(--color-brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      background-color: var(--color-error-50);
      color: var(--color-error-800);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-tier-1 { background: var(--color-tier-1-bg, var(--color-success-100)); color: var(--color-tier-1-text, var(--color-success-800)); }
    .badge-tier-2 { background: var(--color-tier-2-bg, var(--color-primary-100)); color: var(--color-tier-2-text, var(--color-primary-800)); }
    .badge-tier-3 { background: var(--color-tier-3-bg, var(--color-warning-100)); color: var(--color-tier-3-text, var(--color-warning-800)); }
    .badge-active { background: var(--color-success-100); color: var(--color-success-800); }
    .badge-stuck { background: var(--color-warning-100); color: var(--color-warning-800); }
    .badge-abandoned { background: var(--color-error-100); color: var(--color-error-800); }
    .progress-bar-container {
      width: 100%;
      background: var(--color-gray-100);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--color-brand);
      transition: width 0.3s ease;
    }
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--color-bg-card);
      color: var(--color-text-heading);
    }
    .search-bar select {
      padding: 10px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--color-bg-card);
      color: var(--color-text-heading);
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 8px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg-card);
      color: var(--color-text-heading);
      cursor: pointer;
      font-size: 14px;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination button:hover:not(:disabled) {
      background: var(--color-bg-subtle);
    }
    .dimension-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .dimension-chip {
      font-size: 12px;
      padding: 2px 8px;
      background: var(--color-bg-subtle);
      border-radius: 8px;
      color: var(--color-text-secondary);
    }
    table a {
      color: var(--color-brand);
      text-decoration: none;
    }
    table a:hover { text-decoration: underline; }
    .learner-detail-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .learner-detail-panel {
      background: var(--color-bg-card);
      border-radius: 16px;
      padding: 32px;
      max-width: 800px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .learner-detail-panel h3 {
      color: var(--color-text-heading);
      margin-bottom: 8px;
    }
    .learner-detail-panel .email {
      color: var(--color-text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .detail-section {
      margin-bottom: 24px;
    }
    .detail-section h4 {
      color: var(--color-text-heading);
      font-size: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 8px;
    }
    .close-btn {
      float: right;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--color-text-secondary);
      line-height: 1;
    }
    .close-btn:hover { color: var(--color-text-heading); }
    .score-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      font-size: 13px;
    }
    .score-grid .dim-name { color: var(--color-text-secondary); }
    .score-grid .dim-score { font-weight: 600; color: var(--color-text-heading); }
    .checkpoint-item {
      padding: 12px;
      background: var(--color-bg-subtle);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .checkpoint-item .phase {
      font-weight: 600;
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .checkpoint-item .meta {
      color: var(--color-text-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="adcp-nav"></div>

  <div class="container">
    <h1>AdCP Academy</h1>

    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Loading certification data...</p>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <div id="content" style="display: none;">
      <!-- Overview metrics -->
      <div class="metrics-grid" id="metrics-grid"></div>

      <!-- Credentials by tier -->
      <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h2 style="margin-bottom:0;">Credentials issued</h2>
          <button id="backfill-btn" onclick="backfillBadges()" style="padding:8px 16px;border:1px solid var(--color-border);border-radius:8px;background:var(--color-bg-card);color:var(--color-text-heading);cursor:pointer;font-size:14px;">Issue missing badges</button>
        </div>
        <div id="backfill-result" style="display:none;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>
        <table id="credentials-table">
          <thead>
            <tr>
              <th>Credential</th>
              <th>Tier</th>
              <th class="text-right">Issued</th>
              <th class="text-right">Badges</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Module health -->
      <div class="section">
        <h2>Module health</h2>
        <table id="module-table">
          <thead>
            <tr>
              <th>Module</th>
              <th class="text-right">Started</th>
              <th class="text-right">Completed</th>
              <th class="text-right">Rate</th>
              <th class="text-right">Avg score</th>
              <th class="text-right">Avg time</th>
              <th class="text-right">Abandoned</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Learners -->
      <div class="section">
        <h2>Learners</h2>
        <div class="search-bar">
          <input type="text" id="learner-search" placeholder="Search by name or email..." />
          <select id="learner-status">
            <option value="all">All learners</option>
            <option value="active">Active (last 7 days)</option>
            <option value="stuck">Stuck (inactive 7+ days)</option>
            <option value="completed">Certified</option>
          </select>
        </div>
        <table id="learner-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th class="text-right">Completed</th>
              <th class="text-right">In progress</th>
              <th>Credentials</th>
              <th>Last active</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Learner detail modal -->
  <div id="learner-modal" class="learner-detail-modal" style="display: none;" onclick="if(event.target===this)closeDetail()">
    <div class="learner-detail-panel" id="learner-detail"></div>
  </div>

  <script>
    let currentPage = 1;
    let currentSearch = '';
    let currentStatus = 'all';
    let searchTimeout = null;

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      return new Date(dateString).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
      });
    }

    function formatDateRelative(dateString) {
      if (!dateString) return 'Never';
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
      return formatDate(dateString);
    }

    function tierBadge(tier) {
      const labels = { 1: 'Basics', 2: 'Practitioner', 3: 'Specialist' };
      return `<span class="badge badge-tier-${tier}">${labels[tier] || `Tier ${tier}`}</span>`;
    }

    async function loadOverview() {
      try {
        const response = await AdminSidebar.fetch('/api/admin/certification/overview');
        if (!response.ok) throw new Error('Failed to load overview');
        const data = await response.json();

        // Metrics cards
        const grid = document.getElementById('metrics-grid');
        grid.innerHTML = `
          <div class="metric-card">
            <div class="metric-label">Total learners</div>
            <div class="metric-value">${data.totals.learners}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Credentials issued</div>
            <div class="metric-value">${data.totals.credentials_issued}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Modules completed</div>
            <div class="metric-value">${data.totals.modules_completed}</div>
            <div class="metric-sub">${data.totals.modules_started} started</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Abandoned</div>
            <div class="metric-value">${data.totals.abandoned}</div>
            <div class="metric-sub">Inactive 7+ days</div>
          </div>
        `;

        // Credentials by tier
        const credBody = document.querySelector('#credentials-table tbody');
        if (data.credentials_by_tier.length === 0) {
          credBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--color-text-secondary);">No credentials issued yet</td></tr>';
        } else {
          credBody.innerHTML = data.credentials_by_tier.map(c => {
            const missing = c.count - c.badges_issued;
            const badgeCell = missing > 0
              ? `${c.badges_issued} <span style="color:var(--color-warning-600);font-size:12px;">(${missing} missing)</span>`
              : `${c.badges_issued}`;
            return `
              <tr>
                <td>${escapeHtml(c.name)}</td>
                <td>${tierBadge(c.tier)}</td>
                <td class="text-right">${c.count}</td>
                <td class="text-right">${badgeCell}</td>
              </tr>
            `;
          }).join('');
        }

        // Module health
        const modBody = document.querySelector('#module-table tbody');
        if (data.module_completion.length === 0) {
          modBody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--color-text-secondary);">No module data yet</td></tr>';
        } else {
          modBody.innerHTML = data.module_completion.map(m => {
            const rate = m.rate !== null ? `${Math.round(m.rate)}%` : '-';
            const avgScore = m.avg_score !== null ? Math.round(m.avg_score) : '-';
            const avgTime = m.avg_duration_minutes !== null ? `${Math.round(m.avg_duration_minutes)}m` : '-';
            const dimensions = m.dimensions && m.dimensions.length > 0
              ? `<div class="dimension-list">${m.dimensions.map(d =>
                  `<span class="dimension-chip">${escapeHtml(d.name)}: ${Math.round(d.avg_score)}</span>`
                ).join('')}</div>`
              : '';
            return `
              <tr>
                <td>
                  <strong>${escapeHtml(m.module_id)}</strong> ${escapeHtml(m.title)}
                  ${dimensions}
                </td>
                <td class="text-right">${m.started}</td>
                <td class="text-right">${m.completed}</td>
                <td class="text-right">${rate}</td>
                <td class="text-right">${avgScore}</td>
                <td class="text-right">${avgTime}</td>
                <td class="text-right">${m.abandoned > 0 ? `<span class="badge badge-abandoned">${m.abandoned}</span>` : '0'}</td>
              </tr>
            `;
          }).join('');
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        console.error('Error loading overview:', err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = 'Error loading certification data. Please try again.';
        document.getElementById('error').style.display = 'block';
      }
    }

    async function loadLearners(page = 1) {
      currentPage = page;
      const params = new URLSearchParams({ page: String(page), limit: '20' });
      if (currentSearch) params.set('search', currentSearch);
      if (currentStatus !== 'all') params.set('status', currentStatus);

      const body = document.querySelector('#learner-table tbody');
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--color-text-secondary);padding:20px;">Loading...</td></tr>';

      try {
        const response = await AdminSidebar.fetch(`/api/admin/certification/learners?${params}`);
        if (!response.ok) throw new Error('Failed to load learners');
        const data = await response.json();

        if (data.learners.length === 0) {
          body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--color-text-secondary);">No learners found</td></tr>';
        } else {
          body.innerHTML = data.learners.map(l => `
            <tr style="cursor:pointer;" onclick="showDetail('${escapeHtml(l.workos_user_id)}')">
              <td>${escapeHtml(l.name)}</td>
              <td>${escapeHtml(l.email)}</td>
              <td class="text-right">${l.modules_completed}</td>
              <td class="text-right">${l.modules_in_progress}</td>
              <td>${l.credentials.map(c => `<span class="badge badge-tier-${c.tier}">${escapeHtml(c.name)}</span>`).join(' ')}</td>
              <td>${formatDateRelative(l.last_active)}</td>
            </tr>
          `).join('');
        }

        // Pagination
        const totalPages = Math.ceil(data.total / data.limit);
        const pag = document.getElementById('pagination');
        if (totalPages <= 1) {
          pag.innerHTML = data.total > 0 ? `<span style="color:var(--color-text-muted);font-size:14px;">${data.total} learner${data.total === 1 ? '' : 's'}</span>` : '';
        } else {
          pag.innerHTML = `
            <button onclick="loadLearners(${page - 1})" ${page <= 1 ? 'disabled' : ''}>Previous</button>
            <span style="color:var(--color-text-secondary);font-size:14px;">Page ${page} of ${totalPages} (${data.total} total)</span>
            <button onclick="loadLearners(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Next</button>
          `;
        }
      } catch (err) {
        console.error('Error loading learners:', err);
        body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--color-error-500);">Error loading learners</td></tr>';
      }
    }

    async function showDetail(userId) {
      const modal = document.getElementById('learner-modal');
      const panel = document.getElementById('learner-detail');
      panel.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading...</p></div>';
      modal.style.display = 'flex';

      try {
        const response = await AdminSidebar.fetch(`/api/admin/certification/learners/${encodeURIComponent(userId)}`);
        if (!response.ok) throw new Error('Failed to load detail');
        const data = await response.json();

        const progressRows = data.progress.map(p => {
          const statusBadge = p.status === 'completed' || p.status === 'tested_out'
            ? '<span class="badge badge-active">completed</span>'
            : p.status === 'in_progress'
              ? '<span class="badge badge-stuck">in progress</span>'
              : `<span class="badge">${escapeHtml(p.status)}</span>`;

          let scoreHtml = '';
          if (p.score && typeof p.score === 'object') {
            scoreHtml = '<div class="score-grid">' +
              Object.entries(p.score).map(([dim, val]) =>
                `<span class="dim-name">${escapeHtml(dim)}</span><span class="dim-score">${Math.round(val)}</span>`
              ).join('') +
              '</div>';
          }

          return `
            <tr>
              <td><strong>${escapeHtml(p.module_id)}</strong> ${escapeHtml(p.title)}</td>
              <td>${statusBadge}</td>
              <td>${formatDate(p.started_at)}</td>
              <td>${formatDate(p.completed_at)}</td>
              <td>${scoreHtml || '-'}</td>
            </tr>
          `;
        }).join('');

        const credentialRows = data.credentials.map(c => {
          const badgeStatus = c.certifier_credential_id
            ? '<span class="badge badge-active">issued</span>'
            : '<span class="badge badge-stuck">pending</span>';
          return `
            <tr>
              <td>${escapeHtml(c.name)}</td>
              <td>${tierBadge(c.tier)}</td>
              <td>${formatDate(c.awarded_at)}</td>
              <td>${badgeStatus}</td>
            </tr>
          `;
        }).join('');

        const checkpointItems = (data.checkpoints || []).map(cp => `
          <div class="checkpoint-item">
            <div class="phase">${escapeHtml(cp.module_id)} - ${escapeHtml(cp.current_phase)}</div>
            ${cp.concepts_covered.length > 0 ? `<div>Covered: ${cp.concepts_covered.map(c => escapeHtml(c)).join(', ')}</div>` : ''}
            ${cp.concepts_remaining.length > 0 ? `<div>Remaining: ${cp.concepts_remaining.map(c => escapeHtml(c)).join(', ')}</div>` : ''}
            ${cp.notes ? `<div style="margin-top:4px;font-style:italic;">${escapeHtml(cp.notes)}</div>` : ''}
            <div class="meta">${formatDate(cp.created_at)}</div>
          </div>
        `).join('');

        panel.innerHTML = `
          <button class="close-btn" onclick="closeDetail()">&times;</button>
          <h3>${escapeHtml(data.user.name)}</h3>
          <div class="email">${escapeHtml(data.user.email)}</div>

          ${data.credentials.length > 0 ? `
            <div class="detail-section">
              <h4>Credentials</h4>
              <table>
                <thead><tr><th>Credential</th><th>Tier</th><th>Awarded</th><th>Badge</th></tr></thead>
                <tbody>${credentialRows}</tbody>
              </table>
            </div>
          ` : ''}

          <div class="detail-section">
            <h4>Module progress</h4>
            <table>
              <thead><tr><th>Module</th><th>Status</th><th>Started</th><th>Completed</th><th>Scores</th></tr></thead>
              <tbody>${progressRows || '<tr><td colspan="5" style="text-align:center;color:var(--color-text-secondary);">No progress yet</td></tr>'}</tbody>
            </table>
          </div>

          ${checkpointItems ? `
            <div class="detail-section">
              <h4>Teaching checkpoints</h4>
              ${checkpointItems}
            </div>
          ` : ''}
        `;
      } catch (err) {
        console.error('Error loading detail:', err);
        panel.innerHTML = '<button class="close-btn" onclick="closeDetail()">&times;</button><p class="error">Error loading learner detail.</p>';
      }
    }

    function closeDetail() {
      document.getElementById('learner-modal').style.display = 'none';
    }

    // Search with debounce
    document.getElementById('learner-search').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentSearch = e.target.value.trim();
        loadLearners(1);
      }, 300);
    });

    document.getElementById('learner-status').addEventListener('change', (e) => {
      currentStatus = e.target.value;
      loadLearners(1);
    });

    // Escape key closes modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();
    });

    async function backfillBadges() {
      const btn = document.getElementById('backfill-btn');
      const result = document.getElementById('backfill-result');
      btn.disabled = true;
      btn.textContent = 'Issuing...';
      result.style.display = 'none';

      try {
        const response = await AdminSidebar.fetch('/api/admin/certification/backfill-badges', { method: 'POST' });
        const data = await response.json();

        if (!response.ok) {
          result.style.background = 'var(--color-error-50)';
          result.style.color = 'var(--color-error-800)';
          result.textContent = data.error || 'Failed to backfill badges';
        } else if (data.total === 0) {
          result.style.background = 'var(--color-success-50, #f0fdf4)';
          result.style.color = 'var(--color-success-800, #166534)';
          result.textContent = 'All badges are up to date.';
        } else {
          result.style.background = data.errors.length > 0 ? 'var(--color-warning-100)' : 'var(--color-success-50, #f0fdf4)';
          result.style.color = data.errors.length > 0 ? 'var(--color-warning-800)' : 'var(--color-success-800, #166534)';
          result.textContent = `Updated ${data.updated}/${data.total} badges.` +
            (data.errors.length > 0 ? ` ${data.errors.length} errors.` : '');
        }
        result.style.display = 'block';
        loadOverview();
      } catch (err) {
        result.style.background = 'var(--color-error-50)';
        result.style.color = 'var(--color-error-800)';
        result.textContent = 'Network error issuing badges.';
        result.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Issue missing badges';
      }
    }

    // Load data
    loadOverview();
    loadLearners();
  </script>
</body>
</html>
