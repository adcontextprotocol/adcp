<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties | AgenticAdvertising.org</title>
  <meta name="description" content="Publisher properties and domains in the AdCP ecosystem.">
  <link rel="icon" href="/addie-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/design-system.css">
  <link rel="stylesheet" href="/layout.css">
  <style>
    body {
      background: #fff;
      padding-top: var(--nav-height);
    }

    .container {
      max-width: var(--container-xl);
      margin: 0 auto;
      padding: var(--space-8) var(--space-4);
    }

    /* Stats row */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
    }
    .stats-bar .stat { text-align: center; }
    .stats-bar .stat span {
      display: block;
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-heading);
      line-height: var(--leading-tight);
    }
    .stats-bar .stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Search and filters */
    .search-section {
      background: var(--color-bg-card);
      border-radius: var(--card-radius);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
      box-shadow: var(--shadow-sm);
    }
    .search-box { margin-bottom: var(--space-4); }
    .search-box input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: var(--border-2) solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: var(--text-base);
      transition: var(--transition-colors);
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }
    .filter-row {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group label {
      font-weight: var(--font-semibold);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .filter-btn {
      padding: var(--space-2) var(--space-4);
      background: var(--color-gray-100);
      border: var(--border-2) solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: var(--text-sm);
      transition: var(--transition-all);
    }
    .filter-btn:hover {
      border-color: var(--color-brand);
    }
    .filter-btn.active {
      background: var(--color-primary-100);
      border-color: var(--color-brand);
      color: var(--color-brand);
    }

    /* Publisher grid */
    .publisher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(350px, 100%), 1fr));
      gap: var(--space-6);
    }
    .result-context {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
    }
    .publisher-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      border: 1px solid var(--color-border);
      transition: border-color 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      cursor: pointer;
    }
    .publisher-card:hover {
      border-color: var(--color-brand);
    }
    .publisher-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: var(--space-3);
    }
    .publisher-domain {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
      word-break: break-all;
      min-width: 0;
    }
    .status-badge {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-badge.valid {
      background: var(--color-success-100);
      color: var(--color-success-700);
    }
    .status-badge.neutral {
      background: var(--color-gray-100);
      color: var(--color-gray-600);
    }
    .publisher-meta {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .stat-value {
      font-weight: var(--font-semibold);
      color: var(--color-text-heading);
    }

    /* Add publisher CTA */
    .add-publisher-cta {
      text-align: center;
      margin-top: var(--space-6);
    }
    .add-publisher-cta button {
      padding: var(--space-3) var(--space-6);
      background: var(--color-brand);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      cursor: pointer;
      transition: var(--transition-colors);
    }
    .add-publisher-cta button:hover {
      background: var(--color-brand-hover);
    }

    .hidden { display: none; }
    .loading { text-align: center; padding: var(--space-12); color: var(--color-text-muted); }
    .empty-state { text-align: center; padding: var(--space-12); color: var(--color-text-muted); }
    .empty-state__title { font-size: var(--text-xl); font-weight: var(--font-semibold); margin-bottom: var(--space-2); }

    /* Skeleton animation */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton-bg {
      background: linear-gradient(90deg, var(--color-bg-subtle) 25%, var(--color-border-light) 50%, var(--color-bg-subtle) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @media (max-width: 768px) {
      .publisher-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: var(--space-4); padding: var(--space-4); }
    }
  </style>
</head>
<body>

<div id="adcp-nav"></div>
<script src="/nav.js"></script>
<script src="/registry-nav.js"></script>

<header class="page-header">
  <h1>Properties</h1>
  <p>Publisher properties and domains in the AdCP ecosystem</p>
  <div style="margin-top: var(--space-4);">
    <a href="/adagents/builder" style="font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--color-brand); text-decoration: none;">Build an adagents.json &rarr;</a>
  </div>
</header>

<div class="container">
  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat"><span id="stat-total">0</span> <div class="stat-label">Total</div></div>
    <div class="stat"><span id="stat-community">0</span> <div class="stat-label">Community</div></div>
    <div class="stat"><span id="stat-adagents-json">0</span> <div class="stat-label">adagents.json</div></div>
  </div>

  <!-- Search and filters -->
  <div class="search-section">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by domain, app name, or identifier..." aria-label="Search properties">
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>Source:</label>
        <button class="filter-btn active" data-source="all" aria-pressed="true" onclick="setSourceFilter('all')">All</button>
        <button class="filter-btn" data-source="community" aria-pressed="false" onclick="setSourceFilter('community')">Community</button>
        <button class="filter-btn" data-source="adagents_json" aria-pressed="false" onclick="setSourceFilter('adagents_json')">adagents.json</button>
      </div>
    </div>
  </div>

  <!-- Result context -->
  <div id="result-context" class="result-context"></div>

  <!-- Publisher grid -->
  <div id="publishers-grid" class="publisher-grid">
    <div class="loading">Loading properties...</div>
  </div>

  <!-- Add publisher CTA (hidden by default, shown for members) -->
  <div id="add-publisher-cta" class="add-publisher-cta hidden">
    <button onclick="window.location.href='/property/view/new?edit=true'">+ Add property</button>
  </div>
</div>

<div id="adcp-footer"></div>

<script type="module">
  const PAGE_SIZE = 100;
  let properties = [];
  let totalCount = 0;
  let filters = { source: 'all', search: '' };
  let debounceTimer = null;
  let currentOffset = 0;
  let loading = false;

  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.getElementById('search-input').value = q;
      filters.search = q;
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        filters.search = e.target.value.trim();
        fetchProperties(true);
      }, 300);
    });

    await fetchProperties(true);

    const config = window.__APP_CONFIG__;
    if (config?.user?.isMember) {
      const cta = document.getElementById('add-publisher-cta');
      if (cta) cta.classList.remove('hidden');
    }
  });

  async function fetchProperties(reset = false) {
    if (loading) return;
    loading = true;

    const grid = document.getElementById('publishers-grid');
    if (reset) {
      currentOffset = 0;
      properties = [];
      grid.innerHTML = renderLoadingSkeleton(6);
    }

    try {
      const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(currentOffset) });
      if (filters.search) params.set('search', filters.search);
      if (filters.source !== 'all') params.set('source', filters.source);

      const response = await fetch(`/api/properties/registry?${params}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();

      const newProperties = data.properties || [];
      if (reset) {
        properties = newProperties;
      } else {
        properties = properties.concat(newProperties);
      }

      const stats = data.stats || {};
      totalCount = stats.total || 0;
      document.getElementById('stat-total').textContent = totalCount.toLocaleString();
      document.getElementById('stat-community').textContent = ((stats.community || 0) + (stats.enriched || 0)).toLocaleString();
      document.getElementById('stat-adagents-json').textContent = (stats.adagents_json || 0).toLocaleString();

      renderProperties();
      currentOffset += newProperties.length;
    } catch (error) {
      console.error('Failed to load properties:', error);
      if (reset) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state__title">Failed to load properties</div></div>';
      }
    } finally {
      loading = false;
    }
  }

  function renderLoadingSkeleton(count = 6) {
    return Array(count).fill(0).map(() => `
      <div class="publisher-card" style="pointer-events: none; opacity: 0.6;">
        <div class="publisher-header">
          <div style="flex: 1;">
            <div class="skeleton-bg" style="height: 20px; border-radius: var(--radius-sm); width: 60%; margin-bottom: var(--space-2);"></div>
            <div class="skeleton-bg" style="height: 14px; border-radius: var(--radius-sm); width: 40%;"></div>
          </div>
          <div class="skeleton-bg" style="height: 24px; width: 80px; border-radius: var(--radius-full);"></div>
        </div>
        <div class="publisher-meta">
          <div class="skeleton-bg" style="height: 16px; border-radius: var(--radius-sm); width: 100px;"></div>
        </div>
      </div>
    `).join('');
  }

  function getPrimaryIdentifier(pub) {
    if (!pub.identifiers || pub.identifiers.length === 0) return { type: 'unknown', value: pub.property_rid };
    const domain = pub.identifiers.find(i => i.type === 'domain');
    if (domain) return domain;
    return pub.identifiers[0];
  }

  function identifierLabel(type) {
    const labels = {
      domain: 'Domain',
      ios_bundle: 'iOS Bundle',
      android_package: 'Android',
      apple_app_store_id: 'App Store',
      google_play_store_id: 'Play Store',
    };
    return labels[type] || type;
  }

  function renderProperties() {
    const grid = document.getElementById('publishers-grid');
    const context = document.getElementById('result-context');

    if (properties.length === 0) {
      context.textContent = '';
      const isSearch = filters.search || filters.source !== 'all';
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-state__title">${isSearch ? 'No properties found' : 'No properties registered yet.'}</div>
        ${isSearch ? '<p style="margin-top: var(--space-2);">Try a different search term, or <a href="/adagents/builder">build an adagents.json</a> to get listed.</p>' : ''}
      </div>`;
      return;
    }

    // Result count context
    if (filters.search) {
      context.textContent = `${properties.length.toLocaleString()} propert${properties.length !== 1 ? 'ies' : 'y'} matching "${filters.search}"` +
        (totalCount > 0 ? ` (of ${totalCount.toLocaleString()} total)` : '');
    } else {
      context.textContent = `Showing ${properties.length.toLocaleString()} of ${totalCount.toLocaleString()} properties`;
    }

    grid.innerHTML = properties.map(pub => {
      const sourceLabel = {
        'adagents_json': 'adagents.json',
        'community': 'Community',
        'enriched': 'Community',
      }[pub.source] || pub.source;

      const isAuthoritative = pub.source === 'adagents_json';
      const primary = getPrimaryIdentifier(pub);
      const linkDomain = pub.identifiers?.find(i => i.type === 'domain')?.value;
      const href = linkDomain ? `/property/view/${encodeURIComponent(linkDomain)}` : null;
      const showTypeLabel = primary.type !== 'domain';

      // Show up to 3 additional identifiers beyond the primary
      const otherIds = (pub.identifiers || []).filter(i => i.value !== primary.value).slice(0, 3);

      const tag = href ? 'a' : 'div';
      const hrefAttr = href ? ` href="${href}"` : '';
      const clickable = href ? '' : ' style="cursor: default;"';

      return `
        <${tag} class="publisher-card"${hrefAttr}${clickable}>
          <div class="publisher-header">
            <div style="min-width: 0;">
              <div class="publisher-domain">${escapeHtml(primary.value)}</div>
              ${showTypeLabel ? `<div style="font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px;">${escapeHtml(identifierLabel(primary.type))}</div>` : ''}
            </div>
            <span class="status-badge ${isAuthoritative ? 'valid' : 'neutral'}">
              ${escapeHtml(sourceLabel)}
            </span>
          </div>
          <div class="publisher-meta">
            ${otherIds.map(id => `<div class="stat-item" style="font-size: var(--text-xs);">${escapeHtml(identifierLabel(id.type))}: ${escapeHtml(id.value)}</div>`).join('')}
            ${pub.verified ? '<div class="stat-item" style="color: var(--color-success-700);">&#x2713; Verified</div>' : ''}
          </div>
        </${tag}>
      `;
    }).join('');

    // "Load more" button if there are more results
    if (properties.length < totalCount && properties.length >= PAGE_SIZE) {
      grid.insertAdjacentHTML('afterend',
        `<div id="load-more" style="text-align: center; margin-top: var(--space-6);">
          <button onclick="window.loadMore()" style="padding: var(--space-3) var(--space-6); background: var(--color-gray-100); border: var(--border-2) solid var(--color-border); border-radius: var(--radius-lg); cursor: pointer; font-size: var(--text-sm);">
            Load more properties
          </button>
        </div>`
      );
    } else {
      const existing = document.getElementById('load-more');
      if (existing) existing.remove();
    }
  }

  window.setSourceFilter = function(source) {
    filters.source = source;
    document.querySelectorAll('.filter-btn[data-source]').forEach(btn => {
      const isActive = btn.dataset.source === source;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-pressed', String(isActive));
    });
    fetchProperties(true);
  };

  window.loadMore = function() {
    const btn = document.getElementById('load-more');
    if (btn) btn.remove();
    fetchProperties(false);
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }
</script>
</body>
</html>
