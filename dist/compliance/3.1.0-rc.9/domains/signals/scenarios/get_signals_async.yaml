id: signals_baseline/get_signals_async
version: "1.0.0"
introduced_in: "3.1"
title: "Signals agent returns and completes async get_signals discovery tasks"
category: signals_baseline
summary: "Forces semantic get_signals discovery into the submitted arm, verifies task visibility, completes it deterministically, and observes the terminal webhook result."
track: signals
required_tools:
  - get_signals
  - get_task_status
  - list_tasks
  - comply_test_controller

narrative: |
  Semantic signal discovery can take longer than a single request budget when
  an agent needs slow catalog queries, enrichment, or review. In that case
  get_signals returns a task envelope, not terminal signals:
  status='submitted', task_id present, and no signals[] on the initial
  response.

  This scenario makes that path deterministic. The runner uses
  comply_test_controller.force_get_signals_arm to force the next brief-mode
  get_signals call into the submitted arm with a known task_id. The storyboard
  then checks that the same task is visible through list_tasks, resolves the
  task with force_task_completion, polls get_task_status with include_result,
  and observes the terminal webhook payload registered on the original
  push_notification_config.

  Wholesale signal feeds are intentionally out of scope. A
  discovery_mode='wholesale' request is feed access and MUST NOT consume this
  directive or enter the Submitted arm.

agent:
  interaction_model: owned_signals
  capabilities:
    - supports_test_controller
    - supports_async_discovery
  examples:
    - "Owned signal agents that enrich first-party segments asynchronously"
    - "Signal marketplaces that query multiple provider catalogs"

caller:
  role: compliance_runner
  example: "AdCP Verified runner with webhook receiver capability"

prerequisites:
  description: |
    Signals agent exposes comply_test_controller in sandbox mode and supports
    force_get_signals_arm plus force_task_completion. The runner also hosts a
    webhook receiver so the submitted discovery request can register a terminal
    completion callback.
  test_kit: "test-kits/nova-motors.yaml"
  controller_seeding: true

phases:
  - id: force_submitted_discovery
    title: "Drive next get_signals into submitted arm"
    narrative: |
      Register a one-shot directive for the caller's sandbox account. The next
      brief-mode get_signals call must return the submitted task envelope with
      the deterministic task_id.

    steps:
      - id: force_get_signals_submitted
        title: "Force submitted arm on next get_signals"
        task: comply_test_controller
        schema_ref: "compliance/comply-test-controller-request.json"
        response_schema_ref: "compliance/comply-test-controller-response.json"
        doc_ref: "/building/implementation/comply-test-controller"
        comply_scenario: get_signals_async
        stateful: true
        context_outputs:
          - name: forced_signals_task_id
            path: "forced.task_id"
        expected: |
          Return a successful directive:
          - success: true
          - forced.arm: submitted
          - forced.task_id: deterministic task handle the next get_signals will return
        sample_request:
          account:
            brand:
              domain: "novamotors.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          scenario: "force_get_signals_arm"
          params:
            arm: "submitted"
            task_id: "task_async_signals_nova_ev"
            message: "Signal discovery queued; typical turnaround 10 minutes"
          context:
            correlation_id: "get_signals_async--force_submitted"
        validations:
          - check: response_schema
            description: "Response matches comply-test-controller-response.json"
          - check: field_value
            path: "success"
            allowed_values: [true]
            description: "Controller accepts the directive"
          - check: field_value
            path: "forced.arm"
            value: "submitted"
            description: "Controller echoes the forced arm"
          - check: field_value
            path: "forced.task_id"
            value: "task_async_signals_nova_ev"
            description: "Controller echoes the deterministic discovery task_id"

  - id: submitted_discovery_response
    title: "get_signals returns submitted task envelope"
    narrative: |
      The buyer sends a normal semantic signal-discovery request with a webhook
      registration. The initial response is only the task envelope. The
      terminal signals must be retrieved from task completion.

    steps:
      - id: get_signals_submitted
        title: "Call get_signals and observe the submitted envelope"
        task: get_signals
        schema_ref: "signals/get-signals-request.json"
        response_schema_ref: "signals/get-signals-async-response-submitted.json"
        doc_ref: "/signals/tasks/get_signals"
        comply_scenario: get_signals_async
        stateful: true
        context_outputs:
          - name: signals_task_id
            path: "task_id"
        expected: |
          Return the submitted task envelope:
          - status: submitted
          - task_id: task_async_signals_nova_ev
          - no signals[] on the initial envelope
          - terminal signals are delivered through task completion
        sample_request:
          discovery_mode: "brief"
          account:
            brand:
              domain: "novamotors.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          signal_spec: "In-market EV buyers near dealerships with high purchase intent"
          pagination:
            max_results: 5
          push_notification_config:
            url: "{{runner.webhook_url:get_signals_submitted}}"
            operation_id: "op_get_signals_async_terminal"
          context:
            correlation_id: "get_signals_async--get_signals_submitted"
        validations:
          - check: response_schema
            description: "Response matches get-signals-async-response-submitted.json"
          - check: field_value
            path: "status"
            value: "submitted"
            description: "Initial response is a task-level submitted envelope"
          - check: field_value
            path: "task_id"
            value: "$context.forced_signals_task_id"
            description: "Submitted task_id matches the controller directive"
          - check: field_absent
            path: "signals"
            description: "Terminal signals are not returned on the submitted envelope"
          - check: field_absent
            path: "result"
            description: "Terminal result is not returned on the submitted envelope"

      - id: list_signals_task
        title: "Find submitted discovery task in list_tasks"
        task: list_tasks
        schema_ref: "protocol/list-tasks-request.json"
        response_schema_ref: "protocol/list-tasks-response.json"
        doc_ref: "/protocol/list_tasks"
        comply_scenario: get_signals_async
        stateful: true
        expected: |
          Return the submitted get_signals task with signals domain and
          has_webhook=true because the original request registered a webhook.
        sample_request:
          account:
            brand:
              domain: "novamotors.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          filters:
            task_ids:
              - "$context.signals_task_id"
            task_type: "get_signals"
            has_webhook: true
          pagination:
            max_results: 1
          context:
            correlation_id: "get_signals_async--list_signals_task"
        validations:
          - check: response_schema
            description: "Response matches list-tasks-response.json"
          - check: field_value
            path: "query_summary.total_matching"
            value: 1
            description: "Task-id filter matches exactly one task in this account"
          - check: field_value
            path: "query_summary.returned"
            value: 1
            description: "Task-id filter returns exactly one task"
          - check: field_value
            path: "tasks[0].task_id"
            value: "$context.signals_task_id"
            description: "list_tasks returns the submitted discovery task"
          - check: field_value
            path: "tasks[0].task_type"
            value: "get_signals"
            description: "Task type identifies get_signals"
          - check: field_value
            path: "tasks[0].domain"
            value: "signals"
            description: "Task is classified under the signals domain"
          - check: field_value
            path: "tasks[0].status"
            value: "submitted"
            description: "Task remains submitted before deterministic completion"
          - check: field_value
            path: "tasks[0].has_webhook"
            value: true
            description: "Task records the webhook registration"

      - id: list_signals_task_wrong_account
        title: "Do not list get_signals task from another account"
        task: list_tasks
        schema_ref: "protocol/list-tasks-request.json"
        response_schema_ref: "protocol/list-tasks-response.json"
        doc_ref: "/protocol/list_tasks"
        comply_scenario: get_signals_async
        stateful: true
        expected: |
          Return an empty task list for the same task_id under a different
          sandbox account. Sellers MUST scope task reconciliation to the
          authenticated account + principal pair.
        sample_request:
          account:
            brand:
              domain: "otherbrand.example"
            operator: "other-operator.example"
            sandbox: true
          filters:
            task_ids:
              - "$context.signals_task_id"
            task_type: "get_signals"
          pagination:
            max_results: 1
          context:
            correlation_id: "get_signals_async--wrong_account_list_tasks"
        validations:
          - check: response_schema
            description: "Response matches list-tasks-response.json"
          - check: field_value
            path: "query_summary.total_matching"
            value: 0
            description: "Cross-account task-id filter matches no tasks"
          - check: field_value
            path: "query_summary.returned"
            value: 0
            description: "Cross-account task-id filter returns no tasks"

  - id: completed_discovery_result
    title: "Task completion carries signals and webhook result"
    narrative: |
      Complete the task through the controller, then verify both polling path
      and webhook delivery expose the terminal get_signals result.

    steps:
      - id: complete_signals_task
        title: "Force get_signals task completion"
        task: comply_test_controller
        schema_ref: "compliance/comply-test-controller-request.json"
        response_schema_ref: "compliance/comply-test-controller-response.json"
        doc_ref: "/building/implementation/comply-test-controller"
        comply_scenario: get_signals_async
        stateful: true
        expected: |
          Transition the submitted get_signals task to completed with a
          schema-valid get-signals result payload.
        sample_request:
          account:
            brand:
              domain: "novamotors.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          scenario: "force_task_completion"
          params:
            task_id: "$context.signals_task_id"
            result:
              signals:
                - signal_id:
                    source: "agent_native"
                    id: "likely_ev_buyers"
                  signal_agent_segment_id: "seg_async_likely_ev_buyers"
                  name: "Likely EV buyers"
                  description: "Modeled audience of consumers likely to consider an electric vehicle in the next 90 days."
                  value_type: "binary"
                  signal_type: "owned"
                  deployments:
                    - type: "platform"
                      platform: "example-dsp"
                      is_live: false
                  pricing_options:
                    - pricing_option_id: "ev_buyers_cpm"
                      model: "cpm"
                      cpm: 1.5
                      currency: "USD"
              cache_scope: "public"
              context:
                correlation_id: "get_signals_async--terminal_result"
          context:
            correlation_id: "get_signals_async--complete_signals_task"
        validations:
          - check: response_schema
            description: "Response matches comply-test-controller-response.json"
          - check: field_value
            path: "success"
            allowed_values: [true]
            description: "Controller completed the task"
          - check: field_value
            path: "current_state"
            value: "completed"
            description: "Task is now completed"

      - id: get_signals_task_status_wrong_account
        title: "Reject get_signals task lookup from another account"
        task: get_task_status
        expect_error: true
        negative_path: payload_well_formed
        schema_ref: "protocol/get-task-status-request.json"
        response_schema_ref: "protocol/get-task-status-response.json"
        doc_ref: "/protocol/get_task_status"
        comply_scenario: get_signals_async
        stateful: true
        expected: |
          Return REFERENCE_NOT_FOUND when the same task_id is polled from a
          different sandbox account. Sellers MUST NOT reveal whether the task
          exists under another account or principal.
        sample_request:
          task_id: "$context.signals_task_id"
          include_result: true
          account:
            brand:
              domain: "otherbrand.example"
            operator: "other-operator.example"
            sandbox: true
          context:
            correlation_id: "get_signals_async--wrong_account_task_status"
        validations:
          - check: error_code
            allowed_values: ["REFERENCE_NOT_FOUND"]
            description: "Cross-account task lookup is hidden as REFERENCE_NOT_FOUND"

      - id: get_signals_task_status_completed
        title: "Poll completed get_signals task with result"
        task: get_task_status
        schema_ref: "protocol/get-task-status-request.json"
        response_schema_ref: "protocol/get-task-status-response.json"
        doc_ref: "/protocol/get_task_status"
        comply_scenario: get_signals_async
        stateful: true
        expected: |
          Return completed task status with the terminal get_signals result.
        sample_request:
          task_id: "$context.signals_task_id"
          include_result: true
          account:
            brand:
              domain: "novamotors.example"
            operator: "pinnacle-agency.example"
            sandbox: true
          context:
            correlation_id: "get_signals_async--get_task_status_completed"
        validations:
          - check: response_schema
            description: "Response matches get-task-status-response.json"
          - check: field_value
            path: "task_id"
            value: "$context.signals_task_id"
            description: "Polling returns the same task"
          - check: field_value
            path: "task_type"
            value: "get_signals"
            description: "Task type remains get_signals"
          - check: field_value
            path: "protocol"
            value: "signals"
            description: "Task protocol is signals"
          - check: field_value
            path: "status"
            value: "completed"
            description: "Task is completed"
          - check: field_value
            path: "has_webhook"
            value: true
            description: "Task status retains webhook registration state"
          - check: field_value
            path: "result.signals[0].signal_agent_segment_id"
            value: "seg_async_likely_ev_buyers"
            description: "Terminal signals are available from task completion, not the submitted envelope"
          - check: field_value
            path: "result.cache_scope"
            value: "public"
            description: "Terminal result keeps get_signals response shape"

      - id: expect_signals_terminal_webhook
        title: "Assert terminal get_signals webhook"
        task: expect_webhook
        triggered_by: get_signals_submitted
        filter:
          body:
            operation_id: "op_get_signals_async_terminal"
            task_id: "task_async_signals_nova_ev"
            task_type: "get_signals"
            protocol: "signals"
            status: "completed"
            result.signals.0.signal_agent_segment_id: "seg_async_likely_ev_buyers"
            result.cache_scope: "public"
            result.context.correlation_id: "get_signals_async--terminal_result"
        timeout_seconds: 30
        expect_idempotency_key: true
        webhook_payload_schema_ref: "core/mcp-webhook-payload.json"
        requires_contract: webhook_receiver_runner
        stateful: true
        expected: |
          Terminal webhook arrives for the original push_notification_config.
          Payload validates against mcp-webhook-payload.json and carries the
          expected operation_id, task_id, task_type, protocol, completed
          status, and get_signals result shape.
