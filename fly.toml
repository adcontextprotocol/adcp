# fly.toml app configuration file generated for adcp-docs on 2025-09-10T17:46:00Z
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'adcp-docs'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

# Run migrations ONCE before deployment, not on every machine startup
# If this fails, the deployment is rolled back automatically
[deploy]
  release_command = "node dist/db/migrate.js"
  release_command_timeout = "15m"
  strategy = "rolling"

[processes]
  web = "node dist/index.js"
  worker = "node dist/index.js"

[env]
  PORT = "8080"
  BASE_URL = "https://agenticadvertising.org"
  # Disabled - migrations now run via release_command
  RUN_MIGRATIONS = "false"
  # Use pre-cloned repos from Docker build, skip runtime git fetch.
  # Production image has no git binary — unsetting this degrades gracefully
  # (repos skip indexing) but does not crash.
  SKIP_REPO_SYNC = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["web"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "20s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

    [http_service.checks.headers]
      User-Agent = "Fly Health Check"

# Worker process group config.
#
# `[[services]]` (rather than a bare `[[checks]]`) opts the worker process
# group into Fly's auto_start_machines + min_machines_running lifecycle —
# the same mechanism `[http_service]` uses for web. Without this, workers
# created by a rolling deploy stay in `stopped` state forever (no
# auto_start path) and the periodic crawler / scheduled jobs don't run.
#
# No `[[services.ports]]` block: no external traffic. The internal_port
# is only used by the health check below.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["worker"]
  auto_start_machines = true
  auto_stop_machines = "off"
  # Workers run scheduled jobs only — no external traffic, no HA story.
  # One worker is plenty; brief gaps during deploys are invisible.
  min_machines_running = 1

  [[services.http_checks]]
    interval = "15s"
    timeout = "20s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

[[vm]]
  processes = ["web"]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2

[[vm]]
  processes = ["worker"]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2

