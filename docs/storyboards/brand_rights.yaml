id: brand_rights
version: "1.0.0"
title: "Brand rights management"
category: brand
summary: "Buyer discovers brand identity, acquires usage rights, and manages creative approvals."

narrative: |
  Before running campaigns with a brand's assets, buyer agents need to understand the
  brand's identity guidelines and acquire proper usage rights. This storyboard covers
  the brand protocol — discovering brand identity, negotiating rights, and getting
  creative approval.

  Think of brand agents as representing the brand owner (e.g., Nova Motors' brand ops
  team). They control identity guidelines, manage who can use the brand, and approve
  creative executions before they go live.

agent:
  interaction_model: brand_guardian
  capabilities:
    - brand_identity
    - rights_management
  examples:
    - "Nova Motors brand agent"
    - "Brand safety platform"

caller:
  role: buyer_agent
  example: "Pinnacle Agency (buyer)"

prerequisites:
  description: |
    The buyer has a campaign brief that requires using a specific brand's assets
    and identity. The brand agent controls access to brand guidelines, logos, colors,
    and creative approval workflows.

phases:
  - id: identity_discovery
    title: "Discover brand identity"
    narrative: |
      The buyer connects to the brand agent to learn about the brand's visual identity,
      tone guidelines, and available assets. This is the starting point for any
      brand-compliant creative work.

    steps:
      - id: get_identity
        title: "Get brand identity and guidelines"
        narrative: |
          The buyer calls get_brand_identity to retrieve the brand's visual identity,
          tone guidelines, logo assets, and color palette. This information drives
          creative production and compliance checks.
        task: get_brand_identity
        schema_ref: "brand/get-brand-identity-request.json"
        response_schema_ref: "brand/get-brand-identity-response.json"
        doc_ref: "/brand/task-reference/get_brand_identity"
        comply_scenario: brand_identity
        stateful: false
        expected: |
          Return brand identity information including:
          - Brand name and description
          - Visual guidelines (colors, logos, typography)
          - Tone and voice guidelines
          - Available asset references

        validations:
          - check: response_schema
            description: "Response matches brand identity schema"

  - id: rights_acquisition
    title: "Acquire usage rights"
    narrative: |
      The buyer needs permission to use the brand's assets in their campaign. They
      check existing rights, acquire new ones if needed, and manage the lifecycle
      of their usage agreements.

    steps:
      - id: check_rights
        title: "Check existing rights"
        narrative: |
          The buyer calls get_rights to see what usage rights they already hold
          for this brand. This might return active licenses, expired agreements,
          or indicate no existing relationship.
        task: get_rights
        schema_ref: "brand/get-rights-request.json"
        response_schema_ref: "brand/get-rights-response.json"
        doc_ref: "/brand/task-reference/get_rights"
        comply_scenario: brand_rights_flow
        stateful: false
        expected: |
          Return current rights status for the requesting agent, including:
          - Active rights with scope and expiration
          - Any restrictions or conditions

        validations:
          - check: response_schema
            description: "Response matches rights schema"

      - id: acquire_new_rights
        title: "Acquire usage rights"
        narrative: |
          The buyer requests new usage rights for a campaign. The brand agent
          evaluates the request against its policies and grants or denies access.
        task: acquire_rights
        schema_ref: "brand/acquire-rights-request.json"
        response_schema_ref: "brand/acquire-rights-response.json"
        doc_ref: "/brand/task-reference/acquire_rights"
        comply_scenario: brand_rights_flow
        stateful: true
        expected: |
          Return a rights grant with:
          - Rights ID for future reference
          - Scope of permitted usage
          - Expiration or renewal terms
          - Any conditions or restrictions

        validations:
          - check: response_schema
            description: "Response matches acquire rights schema"

      - id: update_existing_rights
        title: "Update rights scope"
        narrative: |
          The buyer needs to modify existing rights — perhaps extending the duration,
          adding channels, or changing the campaign scope.
        task: update_rights
        schema_ref: "brand/update-rights-request.json"
        response_schema_ref: "brand/update-rights-response.json"
        doc_ref: "/brand/task-reference/update_rights"
        comply_scenario: brand_rights_flow
        stateful: true
        expected: |
          Return the updated rights with new scope, reflecting the requested changes.

        validations:
          - check: response_schema
            description: "Response matches update rights schema"
